<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valuation Screener</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#090c14;--cd:#0f1320;--bd:#1a2234;--ib:#141a28;--ibd:#232d3f;--dm:#4a5568;--lb:#7a8494;--br:#f0f4f8;--bl:#38bdf8;--pu:#818cf8;--gn:#22c55e;--rd:#ef4444;--yw:#eab308;--tl:#34d399;--f:'DM Sans',system-ui,sans-serif;--m:'JetBrains Mono',monospace}
body.light{--bg:#f8fafc;--cd:#ffffff;--bd:#e2e8f0;--ib:#f0f4f8;--ibd:#dbeafe;--dm:#64748b;--lb:#475569;--br:#0f172a;--bl:#0284c7;--pu:#6366f1;--gn:#16a34a;--rd:#dc2626;--yw:#ca8a04;--tl:#0d9488}
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:var(--bg);font-family:var(--f);color:#c8d0dc;transition:background .3s,color .3s}
body.light{color:#1e293b}
.w{max-width:980px;margin:0 auto;padding:24px 16px}
.hbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
h1{font-size:20px;font-weight:800;color:var(--br)}
.tmbtn{padding:6px 14px;border-radius:6px;border:1px solid var(--bd);background:var(--ib);color:var(--lb);font-size:11px;cursor:pointer;font-weight:600}
.sb{display:flex;gap:6px;margin-bottom:10px;background:var(--cd);border-radius:8px;padding:5px;border:1px solid var(--bd)}
.sb input{flex:1;background:0 0;border:none;outline:none;color:var(--br);font-size:14px;padding:8px 10px;font-family:var(--f)}
.sb button{background:linear-gradient(135deg,var(--bl),var(--pu));border:none;border-radius:6px;padding:8px 20px;color:#fff;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap}
.sb button:disabled{background:var(--bd);cursor:wait}
.cb{display:flex;gap:6px;margin-bottom:20px;align-items:center}
.cb label{font-size:11px;color:var(--lb);white-space:nowrap}
.cb input{width:180px;background:var(--ib);border:1px solid var(--ibd);border-radius:6px;padding:6px 10px;color:var(--br);font-size:12px;font-family:var(--m);outline:none}
.cb button{background:var(--bd);border:none;border-radius:6px;padding:6px 14px;color:var(--lb);font-weight:600;font-size:12px;cursor:pointer}
.card{background:var(--cd);border-radius:8px;border:1px solid var(--bd);margin-bottom:12px;overflow:hidden}
.ci{display:flex;padding:12px 16px}.cm{flex:1;min-width:0}
.cs{width:230px;flex-shrink:0;padding-left:14px;border-left:1px solid var(--bd);margin-left:12px;font-size:10px;color:var(--dm);line-height:1.5}
.ct{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.rw{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0}
.bt{border-top:1px solid var(--bd)}
.ei{display:flex;align-items:center;justify-content:space-between;padding:3px 0}
.ei label{font-size:12px;color:var(--lb)}
.ei input{width:100px;background:var(--ib);border:1px solid var(--ibd);border-radius:4px;padding:3px 6px;color:var(--br);font-size:12px;font-family:var(--m);outline:none;text-align:right}
.ei .u{font-size:10px;color:var(--dm);width:28px;margin-left:3px}
.bg{padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;display:inline-block}
.sp{width:28px;height:28px;border:3px solid var(--bd);border-top-color:var(--bl);border-radius:50%;margin:0 auto 12px;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
table.t{width:100%;border-collapse:collapse;font-size:10px}
table.t th{text-align:right;padding:3px 6px;font-weight:700;font-family:var(--m);border-bottom:2px solid var(--bd);color:var(--lb);white-space:nowrap}
table.t th:first-child{text-align:left;min-width:130px}
table.t td{text-align:right;padding:3px 6px;font-family:var(--m);border-bottom:1px solid var(--ib);color:#a0aab8;white-space:nowrap}
body.light table.t td{color:#475569}
table.t td:first-child{text-align:left;font-family:var(--f);color:var(--lb)}
table.t tr.sep td{border-top:2px solid var(--bd);padding-top:6px;font-weight:700;color:var(--br)}
table.t tr.yoy td{font-size:9px;color:var(--dm);border-bottom:1px solid var(--ib)}
table.t input.ei2{width:54px;background:var(--ib);border:1px solid var(--ibd);border-radius:2px;padding:2px 3px;color:var(--br);font-size:9px;font-family:var(--m);outline:none;text-align:right}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.mc{background:var(--ib);border-radius:5px;padding:10px 12px;border:1px solid var(--bd)}
.val-box{background:var(--ib);border-radius:5px;padding:10px;border:1px solid var(--bd);text-align:center}
.val-label{font-size:9px;color:var(--dm);font-weight:600;text-transform:uppercase;margin-bottom:4px}
.val-num{font-size:16px;font-weight:800;font-family:var(--m);color:var(--bl);margin-bottom:2px}
.val-note{font-size:9px;color:var(--dm)}
.tog{display:inline-block;padding:4px 10px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--ib);color:var(--lb)}
.tog.on{background:var(--bl)22;color:var(--bl);border-color:var(--bl)44}
b.s{color:var(--lb)}
@media(max-width:640px){.cs{display:none}}
</style>
</head>
<body>
<div class="w">
  <div class="hbar">
    <div><div style="font-size:9px;font-weight:800;letter-spacing:3px;color:var(--bl)">VALUATION SCREENER</div><h1>Comprehensive Analysis</h1></div>
    <button class="tmbtn" onclick="toggleTheme()" id="thbtn">☀️ Day</button>
  </div>
  <div class="sb"><input id="qi" placeholder="Ticker (e.g. AAPL, MSFT)"/><button id="gb" onclick="go()">Analyze</button></div>
  <div class="cb"><label>Competitors:</label><input id="ci2" placeholder="MSFT, GOOG, META"/><button onclick="addComps()">Load Comps</button></div>
  <div id="ld" style="display:none;text-align:center;padding:50px 0;color:var(--dm)"><div class="sp"></div><div>Fetching…</div></div>
  <div id="er" style="display:none;background:#450a0a;border:1px solid #dc2626;border-radius:6px;padding:12px;color:#fca5a5;font-size:13px;margin-bottom:16px"></div>
  <div id="out"></div>
  <div id="es" style="text-align:center;padding:60px 20px;color:#1e2a3a"><div style="font-size:36px;margin-bottom:10px">⬡</div><div style="font-size:13px;color:var(--dm)">Enter a ticker to begin</div></div>
</div>
<script>
var AK='zT4AbJZ4WU2SMLjcOQ98PMqIa3NErK3J',BASE='https://financialmodelingprep.com/stable/';

// ── Theme ──────────────────────────────────────────────────────────
function toggleTheme(){var l=document.body.classList.toggle('light');localStorage.setItem('vtheme',l?'light':'dark');document.getElementById('thbtn').textContent=l?'🌙 Dark':'☀️ Day';}
if(localStorage.getItem('vtheme')==='light'){document.body.classList.add('light');document.getElementById('thbtn').textContent='🌙 Dark';}

// ── API ────────────────────────────────────────────────────────────
async function fmp(ep,req){var u=BASE+ep+(ep.includes('?')?'&':'?')+'apikey='+AK;var r=await fetch(u);if(r.status===402||r.status===403){if(req)throw new Error('FMP '+r.status);return null;}if(!r.ok)throw new Error('FMP '+r.status);return r.json();}

// ── Formatting ─────────────────────────────────────────────────────
function cm(x){return(''+Math.round(x)).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function D(n){if(n==null||isNaN(n))return'—';var a=Math.abs(n),s=n<0?'-':'';if(a>=1e6)return s+'$'+(a/1e6).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',')+'T';if(a>=1e3)return s+'$'+(a/1e3).toFixed(1).replace(/\B(?=(\d{3})+(?!\d))/g,',')+'B';return s+'$'+cm(a)+'M';}
function SH(n){if(n==null||isNaN(n)||n===0)return'—';var a=Math.abs(n);if(a>=1e3)return(a/1e3).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',')+'B';return cm(a)+'M';}
function pc(n){return n==null||isNaN(n)?'—':(n*100).toFixed(1)+'%';}
function pr(n){return n==null||isNaN(n)?'—':'$'+(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function fx(n){return n==null||isNaN(n)?'—':n.toFixed(1)+'x';}
function gf(o){for(var i=1;i<arguments.length;i++){if(o&&o[arguments[i]]!=null)return o[arguments[i]];}return 0;}
function av(a){var v=a.filter(function(x){return x!=null&&!isNaN(x)&&x!==0;});return v.length?v.reduce(function(s,x){return s+x;},0)/v.length:null;}
function cg(s,e,y){return(s>0&&e>0&&y>0)?Math.pow(e/s,1/y)-1:null;}
function colG(v){return v==null?'—':'<span style="color:'+(v>=0?'var(--tl)':'var(--rd)')+'">'+pc(v)+'</span>';}
function colS(v){return v==null?'—':'<span style="color:'+(v>0.15?'var(--rd)':v>0.08?'var(--yw)':'var(--gn)')+'">'+pc(v)+'</span>';}

// KEY FIX: extract year reliably from date field, fallback to calendarYear
function yrOf(o){
  if(o.calendarYear&&o.calendarYear!='0'&&o.calendarYear!=0)return''+o.calendarYear;
  if(o.date)return o.date.substring(0,4);
  if(o.fillingDate)return o.fillingDate.substring(0,4);
  return'';
}

// ── State ──────────────────────────────────────────────────────────
var ST={d:null,co:[],indMult:15,showDCF:false,showPath:false,showFS:false,showBS:false,showTri:false,
  dcf:{r1:12,r2:10,r3:9,r4:8,r5:7,fm:15,wacc:9,tg:3,sc:-1.5}};

function gv(id){var e=document.getElementById(id);return e?parseFloat(e.value)||0:0;}
function mkEI(id,lb,val,unit){return'<div class="ei"><label>'+lb+'</label><div style="display:flex;align-items:center;gap:3px"><input id="'+id+'" type="number" step="any" value="'+(val||0)+'" oninput="reCalc()"/><span class="u">'+unit+'</span></div></div>';}
function mkRo(lb,val,bold,sym,bt){return'<div class="rw'+(bt?' bt':'')+'"><span style="font-size:12px;color:var(--lb)">'+(sym?'<span style="font-family:var(--m);color:'+(sym==='-'?'var(--rd)':'var(--bl)');font-weight:700;margin-right:4px">'+sym+'</span>':'')+lb+'</span><span style="font-family:var(--m);font-size:12px;font-weight:'+(bold?700:400)+';color:'+(bold?'var(--br)':'#a0aab8')+'">'+val+'</span></div>';}

function calcM(d){
  var sp=d.p||0,sh=d.sh||0,mc=sp*sh,ca=d.ca||0,de=d.de||0;
  var nd=de-ca,ev=mc+nd,iNC=nd<0,ncP=mc>0?Math.abs(nd)/mc:0;
  var cfo=d.cfo||0,sbc=d.sbc||0,tc=d.cx||0,mp=d.mp||50;
  var mce=tc*(mp/100),af=cfo-sbc-mce,fy=ev>0?af/ev:0;
  var revs=d.rv||[],rc=null;
  if(revs.length>=2)rc=cg(revs[revs.length-1],revs[0],revs.length-1);
  var qr=(fy||0)+(rc||0);
  var fh=d.fcf||[];
  var a3y=av(fh.slice(0,3).map(function(x){return ev>0?x/ev:null;}));
  var a5y=av(fh.slice(0,5).map(function(x){return ev>0?x/ev:null;}));
  var evF=af>0?ev/af:null;
  var a3f=av(fh.slice(0,3)),a5f=av(fh.slice(0,5));
  var evF3=a3f>0?ev/a3f:null,evF5=a5f>0?ev/a5f:null;
  var sbcP=(revs[0]>0)?sbc/revs[0]:0;
  return{sp:sp,sh:sh,mc:mc,ca:ca,de:de,nd:nd,ev:ev,iNC:iNC,ncP:ncP,cfo:cfo,sbc:sbc,tc:tc,mp:mp,mce:mce,af:af,fy:fy,rc:rc,qr:qr,sbcP:sbcP,a3y:a3y,a5y:a5y,evF:evF,evF3:evF3,evF5:evF5,a3f:a3f,a5f:a5f};
}

function reCalc(){var d=ST.d;if(!d)return;d.p=gv('fp');d.sh=gv('fsh');d.ca=gv('fca');d.de=gv('fde');d.cfo=gv('fcfo');d.sbc=gv('fsbc');d.cx=gv('fcx');d.mp=gv('fmp2');render();}
function updDCF(){ST.dcf={r1:gv('dr1'),r2:gv('dr2'),r3:gv('dr3'),r4:gv('dr4'),r5:gv('dr5'),fm:gv('dfm'),wacc:gv('dwacc'),tg:gv('dtg'),sc:gv('dsc')};render();}
function togS(k){ST['show'+k]=!ST['show'+k];render();}

// ── Build company data ─────────────────────────────────────────────
async function buildCo(tk){
  var[prof,cfs,bss,incs]=await Promise.all([
    fmp('profile?symbol='+tk,true),
    fmp('cash-flow-statement?symbol='+tk+'&period=annual&limit=5',true),
    fmp('balance-sheet-statement?symbol='+tk+'&period=annual&limit=5',true),
    fmp('income-statement?symbol='+tk+'&period=annual&limit=5',true)
  ]);
  var p=(Array.isArray(prof)?prof[0]:prof)||{};
  var cfA=Array.isArray(cfs)?cfs:[];var cf0=cfA[0]||{};
  var bsA=Array.isArray(bss)?bss:[];var bs0=bsA[0]||{};
  var incA=Array.isArray(incs)?incs:[];
  var sec=p.sector||'',isL=!!sec.match(/tech|software|communication|media/i);
  var mcap=gf(p,'marketCap','mktCap'),px=gf(p,'price');
  var mpct=isL?50:70;

  // All arrays positional: index 0 = most recent, stored REVERSED for display (oldest→newest)
  // We build newest-first, then reverse for table display
  var N=Math.min(incA.length,cfA.length,5);

  var yrs=[],rv=[],ni=[],gm=[],cfoA=[],sbcA=[],capexA=[],fcfA=[],soA=[],divA=[],buyA=[];

  for(var i=0;i<N;i++){
    var inc=incA[i]||{},cf=cfA[i]||{};
    var yr=yrOf(inc)||yrOf(cf);yrs.push(yr);
    var rev=+(gf(inc,'revenue')/1e6).toFixed(1);rv.push(rev);
    ni.push(+(gf(inc,'netIncome')/1e6).toFixed(1));
    var r=gf(inc,'revenue');gm.push(r>0?gf(inc,'grossProfit')/r:0);
    var ocf=gf(cf,'operatingCashFlow','netCashProvidedByOperatingActivities');
    var sbc2=gf(cf,'stockBasedCompensation');
    var cx=Math.abs(gf(cf,'capitalExpenditure'));
    var mce2=cx*(mpct/100);
    cfoA.push(+(ocf/1e6).toFixed(1));
    sbcA.push(+(sbc2/1e6).toFixed(1));
    capexA.push(+(cx/1e6).toFixed(1));
    fcfA.push(+((ocf-sbc2-mce2)/1e6).toFixed(1));
    var so2=gf(inc,'weightedAverageShsOut')||gf(inc,'weightedAverageShsOutDil');
    soA.push(so2>0?+(so2/1e6).toFixed(1):null);
    divA.push(+(Math.abs(gf(cf,'dividendsPaid'))/1e6).toFixed(1));
    buyA.push(+(Math.abs(gf(cf,'commonStockRepurchased'))/1e6).toFixed(1));
  }

  // Reverse for table (left=old, right=recent)
  yrs=yrs.reverse();rv=rv.reverse();ni=ni.reverse();gm=gm.reverse();
  cfoA=cfoA.reverse();sbcA=sbcA.reverse();capexA=capexA.reverse();fcfA=fcfA.reverse();soA=soA.reverse();divA=divA.reverse();buyA=buyA.reverse();

  var fyEnd=cf0.date?(cf0.date.substring(5)):'';
  var bsDebt=+((gf(bs0,'shortTermDebt')+gf(bs0,'longTermDebt'))/1e6).toFixed(1);
  var bsCash=+((gf(bs0,'cashAndShortTermInvestments')||gf(bs0,'cashAndCashEquivalents'))/1e6).toFixed(1);

  return{
    t:p.symbol||tk,n:p.companyName||tk,p:px,pd:new Date().toISOString().split('T')[0],
    sh:mcap&&px?+(mcap/px/1e6).toFixed(1):0,
    ca:bsCash,de:bsDebt,
    cfo:cfoA[cfoA.length-1]||0,sbc:sbcA[sbcA.length-1]||0,
    cx:capexA[capexA.length-1]||0,mp:mpct,
    fy:'FY'+(yrs[yrs.length-1]||''),fyEnd:fyEnd,bsDate:(bs0.date||'').slice(0,10),
    filingLink:cf0.finalLink||cf0.link||'',
    // All arrays [0]=oldest [N-1]=newest (for table display left→right)
    yrs:yrs,rv:rv,ni:ni,gm:gm,cfoA:cfoA,sbcA:sbcA,capexA:capexA,fcfA:fcfA,soA:soA,divA:divA,buyA:buyA,
    sec:sec,exch:p.exchangeFullName||p.exchange||'',industry:p.industry||'',
  };
}

// ── DCF calc ───────────────────────────────────────────────────────
function calcDCF(){
  var d=ST.d,v=ST.dcf;if(!d||!d.rv.length)return null;
  var latRev=d.rv[d.rv.length-1],latShares=d.soA[d.soA.length-1]||d.sh;
  var rates=[v.r1/100,v.r2/100,v.r3/100,v.r4/100,v.r5/100];
  var fm=v.fm/100,wacc=v.wacc/100,tg=v.tg/100,sc=v.sc/100;

  var pRevs=[],pFcf=[],pSh=[],pPv=[];
  var cRev=latRev,cSh=latShares;
  for(var i=0;i<5;i++){
    cRev=cRev*(1+rates[i]);pRevs.push(cRev);
    var f=cRev*fm;pFcf.push(f);
    cSh=cSh*(1+sc);pSh.push(cSh);
    pPv.push(f/Math.pow(1+wacc,i+1));
  }
  var tvFcf=pFcf[4]*(1+tg),tv=tvFcf/(wacc-tg),tvPv=tv/Math.pow(1+wacc,5);
  var sumPv=pPv.reduce(function(a,b){return a+b;},0);
  var totPv=sumPv+tvPv;
  var eq=totPv-d.de+d.ca;if(eq<0)eq=0;
  var iv=pSh[4]>0?eq/pSh[4]:0;
  var mos=d.p>0?(iv-d.p)/d.p:0;
  return{pRevs:pRevs,pFcf:pFcf,pSh:pSh,pPv:pPv,tv:tv,tvPv:tvPv,sumPv:sumPv,totPv:totPv,iv:iv,mos:mos};
}

// ── Render ─────────────────────────────────────────────────────────
function render(){
  var d=ST.d;if(!d)return;
  var c=calcM(d),dcf=calcDCF();
  var qC=c.qr>=0.25?'var(--gn)':c.qr>=0.20?'var(--yw)':'var(--rd)';
  var qB=c.qr>=0.25?'#052e1688':c.qr>=0.20?'#42200688':'#450a0a88';
  var qL=c.qr>=0.25?'Ready to Invest':c.qr>=0.20?'Watchlist':'Below Threshold';

  var h='';

  // ── HEADER ────────────────────────────────────────────────────
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;background:var(--cd);border-radius:8px;padding:14px 16px;border:1px solid var(--bd);margin-bottom:12px">';
  h+='<div><div style="font-size:18px;font-weight:800;color:var(--br)">'+d.n+'</div>';
  h+='<div style="font-size:11px;color:var(--dm)">'+d.t+' · '+d.exch+' · '+d.sec+' · '+d.industry+'</div>';
  h+='<div style="font-size:10px;color:var(--dm);margin-top:2px">FY ends '+d.fyEnd+' · Latest: '+d.fy+'</div></div>';
  h+='<div style="text-align:right"><div style="font-size:24px;font-weight:800;font-family:var(--m);color:var(--bl)">'+pr(d.p)+'</div><div style="font-size:10px;color:var(--dm)">'+d.pd+'</div></div></div>';

  // ── QUALITY RATIO ─────────────────────────────────────────────
  h+='<div style="background:'+qB+';border-radius:8px;padding:14px 16px;margin-bottom:12px;border:1px solid '+qC+'33"><div style="display:flex;justify-content:space-between;align-items:center">';
  h+='<div><div style="font-size:9px;color:var(--lb);text-transform:uppercase;letter-spacing:1px">Quality Ratio</div>';
  h+='<div style="font-size:28px;font-weight:800;font-family:var(--m);color:var(--br)">'+pc(c.qr)+'</div>';
  h+='<div style="font-size:10px;color:var(--lb)">FCF/EV '+pc(c.fy)+' + Rev CAGR '+pc(c.rc)+'</div></div>';
  h+='<span class="bg" style="background:'+qC+'22;color:'+qC+'">'+qL+'</span></div></div>';

  // ── SECTION 2: MktCap → EV (original style) ──────────────────
  h+='<div class="card"><div class="ci"><div class="cm">';
  h+='<div class="ct" style="color:var(--bl)">Market Cap → Enterprise Value</div>';
  h+=mkEI('fp','Stock Price',d.p,'USD');
  h+=mkEI('fsh','Shares Outstanding',d.sh,'M');
  h+=mkRo('Market Cap',D(c.mc),true,null,true);
  h+=mkEI('fca','Cash & Equivalents',d.ca,'$M');
  h+=mkEI('fde','Total Debt',d.de,'$M');
  h+=mkRo('Enterprise Value',D(c.ev),true,null,true);
  h+='<div style="margin-top:6px;padding:6px 8px;border-radius:4px;background:'+(c.iNC?'#052e1644':'#450a0a44')+';border:1px solid '+(c.iNC?'#22c55e':'#ef4444')+'22;display:flex;justify-content:space-between;font-size:11px">';
  h+='<span style="color:'+(c.iNC?'#86efac':'#fca5a5')+'">'+(c.iNC?'✦ Net Cash':'⚠ Net Debt')+'</span>';

    h+='</div>';
    var wfv=null;if(m1v&&m2v){var w1=33,w2=50,w3=17;wfv=(m1v*w1+m2v*w2)/100;}
    h+='<div id="tri-result" style="padding:10px;background:var(--ib);border-radius:4px;border:1px solid var(--bd);font-size:11px">';
    h+='<b>Weighted Fair Value:</b> <span style="font-family:var(--m);color:var(--bl);font-weight:600">'+(wfv?pr(wfv):'TBD (complete DCF first)')+'</span>';
    if(wfv&&d.p){var ups=(wfv-d.p)/d.p;h+=' | <b>Upside:</b> <span style="color:'+(ups>0?'var(--gn)':'var(--rd)')+';font-weight:600">'+pc(ups)+'</span>';}
    h+='</div>';
  }
  h+='</div></div></div>';

  h+='<div style="font-size:9px;color:#2a3040;padding-top:8px;border-top:1px solid var(--bd)">Quality ≥25% 🟢 | Adj FCF = CFO − SBC − Maint CapEx | EV = MCap + Net Debt | 3 valuation methods to triangulate fair value. Data: FMP API (SEC 10-K)</div>';
  document.getElementById('out').innerHTML=h;
}

document.getElementById('qi').addEventListener('keydown',function(e){if(e.key==='Enter')go();});
document.getElementById('ci2').addEventListener('keydown',function(e){if(e.key==='Enter')addComps();});

async function addComps(){
  var inp=document.getElementById('ci2').value.trim();if(!inp||!ST.d)return;
  document.getElementById('ld').style.display='block';
  try{
    var tks=inp.split(/[,\s]+/).map(function(x){return x.toUpperCase();}).filter(Boolean);
    ST.co=await Promise.all(tks.map(function(x){return buildCo(x).catch(function(){return null;});}));
    ST.co=ST.co.filter(Boolean);render();
  }catch(e){}finally{document.getElementById('ld').style.display='none';}
}

async function go(){
  var t=document.getElementById('qi').value.trim().toUpperCase();if(!t)return;
  document.getElementById('gb').disabled=true;document.getElementById('gb').textContent='…';
  document.getElementById('ld').style.display='block';
  document.getElementById('er').style.display='none';
  document.getElementById('out').innerHTML='';
  document.getElementById('es').style.display='none';
  try{
    ST.d=await buildCo(t);ST.co=[];
    var peers=await fmp('stock-peers?symbol='+t).catch(function(){return null;});
    if(peers){
      var pA=Array.isArray(peers)?peers:[peers];
      var pL=((pA[0]||{}).peersList||[]).slice(0,3);
      if(pL&&pL.length){
        ST.co=await Promise.all(pL.map(function(x){return buildCo(x).catch(function(){return null;});}));
        ST.co=ST.co.filter(Boolean);
      }
    }
    render();
    if(!ST.co.length)document.getElementById('ci2').placeholder='Type competitors: MSFT, GOOG';
  }catch(e){
    document.getElementById('er').textContent=e.message;
    document.getElementById('er').style.display='block';
  }finally{
    document.getElementById('ld').style.display='none';
    document.getElementById('gb').disabled=false;
    document.getElementById('gb').textContent='Analyze';
  }
}
</script>
