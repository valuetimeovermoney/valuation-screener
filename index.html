<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Valuation Screener</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#090c14;--cd:#0f1320;--bd:#1a2234;--ib:#141a28;--ibd:#232d3f;--dm:#4a5568;--lb:#7a8494;--br:#f0f4f8;--bl:#38bdf8;--pu:#818cf8;--gn:#22c55e;--rd:#ef4444;--yw:#eab308;--tl:#34d399;--f:'DM Sans',system-ui,sans-serif;--m:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;background:var(--bg);font-family:var(--f);color:#c8d0dc}
.w{max-width:960px;margin:0 auto;padding:24px 16px}
h1{font-size:20px;font-weight:800;color:var(--br);margin:2px 0 0}
.sb{display:flex;gap:6px;margin-bottom:10px;background:var(--cd);border-radius:8px;padding:5px;border:1px solid var(--bd)}
.sb input{flex:1;background:0 0;border:none;outline:none;color:var(--br);font-size:14px;padding:8px 10px;font-family:var(--f)}
.sb button{background:linear-gradient(135deg,var(--bl),var(--pu));border:none;border-radius:6px;padding:8px 20px;color:#fff;font-weight:700;font-size:13px;cursor:pointer;font-family:var(--f);white-space:nowrap}
.sb button:disabled{background:var(--bd);cursor:wait}
.cb{display:flex;gap:6px;margin-bottom:20px;align-items:center}
.cb label{font-size:11px;color:var(--lb);white-space:nowrap}
.cb input{width:180px;background:var(--ib);border:1px solid var(--ibd);border-radius:6px;padding:6px 10px;color:var(--br);font-size:12px;font-family:var(--m);outline:none}
.cb button{background:var(--bd);border:none;border-radius:6px;padding:6px 14px;color:var(--lb);font-weight:600;font-size:12px;cursor:pointer}
.card{background:var(--cd);border-radius:8px;border:1px solid var(--bd);margin-bottom:12px;overflow:hidden}
.ci{display:flex;padding:12px 16px}.cm{flex:1;min-width:0}
.cs{width:230px;flex-shrink:0;padding-left:14px;border-left:1px solid var(--bd);margin-left:12px;font-size:10px;color:var(--dm);line-height:1.5}
.ct{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.rw{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0}
.bt{border-top:1px solid #1e2a3a}
.ei{display:flex;align-items:center;justify-content:space-between;padding:3px 0}
.ei label{font-size:12px;color:var(--lb)}
.ei input{width:100px;background:var(--ib);border:1px solid var(--ibd);border-radius:4px;padding:3px 6px;color:#e0e7f0;font-size:12px;font-family:var(--m);outline:none;text-align:right}
.ei .u{font-size:10px;color:var(--dm);width:28px;margin-left:3px}
.bg{padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;display:inline-block}
.sp{width:28px;height:28px;border:3px solid var(--bd);border-top-color:var(--bl);border-radius:50%;margin:0 auto 12px;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
table.t{width:100%;border-collapse:collapse;font-size:10px}
table.t th{text-align:right;padding:3px 5px;font-weight:700;font-family:var(--m);font-size:10px;border-bottom:1px solid #1e2a3a;color:var(--lb);white-space:nowrap}
table.t th:first-child{text-align:left}
table.t td{text-align:right;padding:3px 5px;font-family:var(--m);font-size:10px;border-bottom:1px solid #131a28;color:#a0aab8;white-space:nowrap}
table.t td:first-child{text-align:left;font-family:var(--f);color:var(--lb)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mc{background:#0a0e18;border-radius:5px;padding:10px 12px;border:1px solid var(--bd)}
.tog{display:inline-block;padding:4px 10px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--ib);color:var(--lb);margin:2px}
.tog.on{background:var(--bl)22;color:var(--bl);border-color:var(--bl)44}
b.s{color:var(--lb)}
@media(max-width:640px){.cs{display:none}.ci{padding:10px 12px}}
</style>
</head>
<body>
<div class="w">
  <div style="margin-bottom:20px"><div style="font-size:9px;font-weight:800;letter-spacing:3px;color:var(--bl)">QUICK VALUATION</div><h1>Company Screener</h1></div>
  <div class="sb"><input id="qi" placeholder="Ticker (e.g. AAPL, MSFT, GOOG)"/><button id="gb" onclick="go()">Analyze</button></div>
  <div class="cb"><label>Competitors:</label><input id="ci2" placeholder="e.g. MSFT, GOOG, META"/><button onclick="addComps()">Load Comps</button></div>
  <div id="ld" style="display:none;text-align:center;padding:50px 0;color:var(--dm)"><div class="sp"></div><div>Fetching…</div></div>
  <div id="er" style="display:none;background:#450a0a;border:1px solid #dc2626;border-radius:6px;padding:12px;color:#fca5a5;font-size:13px;margin-bottom:16px"></div>
  <div id="out"></div>
  <div id="es" style="text-align:center;padding:60px 20px;color:#1e2a3a"><div style="font-size:36px;margin-bottom:10px">⬡</div><div style="font-size:13px;color:var(--dm)">Enter a ticker</div></div>
</div>
<script>
var AK='zT4AbJZ4WU2SMLjcOQ98PMqIa3NErK3J',BASE='https://financialmodelingprep.com/stable/';
async function fmp(ep,req){var u=BASE+ep+(ep.includes('?')?'&':'?')+'apikey='+AK;var r=await fetch(u);if(r.status===402||r.status===403){if(req)throw new Error('FMP '+r.status);return null;}if(!r.ok)throw new Error('FMP '+r.status);return r.json();}

function getYr(o){return o.calendarYear?''+o.calendarYear:o.date?o.date.substring(0,4):'';}
function cm(x){return(''+x).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
// Format $M values: show as $X.XB if >=1000M, $X.XM if <1000M, $X.XT if >=1000000M
function D(n){if(n==null||isNaN(n))return'—';var a=Math.abs(n),s=n<0?'-':'';if(a>=1000000)return s+'$'+cm((a/1000000).toFixed(2))+'T';if(a>=1000)return s+'$'+cm((a/1000).toFixed(1))+'B';if(a>=1)return s+'$'+cm(Math.round(a))+'M';return s+'$'+a.toFixed(1)+'M';}
// Format share counts in millions: show as X.XB if >=1000M, else X,XXXM
function SH(n){if(n==null||isNaN(n)||n===0)return'—';var a=Math.abs(n);if(a>=1000)return cm((a/1000).toFixed(2))+'B';return cm(Math.round(a))+'M';}
function pc(n){return n==null||isNaN(n)?'—':(n*100).toFixed(1)+'%';}
function pr(n){return n==null||isNaN(n)?'—':'$'+cm(n.toFixed(2));}
function fx(n){return n==null||isNaN(n)?'—':n.toFixed(1)+'x';}
function gf(o){for(var i=1;i<arguments.length;i++){if(o[arguments[i]]!=null)return o[arguments[i]];}return 0;}
function av(a){var v=a.filter(function(x){return x!=null&&!isNaN(x);});return v.length?v.reduce(function(s,x){return s+x;},0)/v.length:null;}
function cagr(s,e,y){return(s>0&&e>0&&y>0)?Math.pow(e/s,1/y)-1:null;}
function colG(v){return v==null?'—':'<span style="color:'+(v>=0?'var(--tl)':'var(--rd)')+'">'+pc(v)+'</span>';}
function colS(v){return v==null?'—':'<span style="color:'+(v>0.15?'var(--rd)':v>0.08?'var(--yw)':'var(--gn)')+'">'+pc(v)+'</span>';}

function calcM(d){
  var sp=d.p||0,sh=d.sh||0,mc=sp*sh,ca=d.ca||0,de=d.de||0;
  var nd=de-ca,ev=mc+nd,iNC=nd<0,ncP=mc>0?Math.abs(nd)/mc:0;
  var cfo=d.cfo||0,sbc=d.sbc||0,tc=d.cx||0,mp=d.mp||50;
  var mce=tc*(mp/100),af=cfo-sbc-mce,fy=ev>0?af/ev:0;
  var tev=af/0.10,tmc=tev-nd,tp=sh>0?tmc/sh:null,pdif=tp!=null?tp-sp:null;
  var revs=d.rev||[];var rc=null,ny=0;
  if(revs.length>=2){ny=revs.length-1;rc=cagr(revs[revs.length-1].v,revs[0].v,ny);}
  var qr=(fy||0)+(rc||0),gap=0.25-qr;
  var np=null,nr=null;
  if(gap>0){var nf=0.25-(rc||0);if(nf>0)np=sh>0?(af/nf-nd)/sh:null;nr=(0.25-fy)*100;}
  var sbcP=(revs[0]&&revs[0].v>0)?sbc/revs[0].v:0;
  var fh=d.fcf||[];
  var fya=fh.map(function(x){return ev>0?x.v/ev:0;});
  var a3y=av(fya.slice(0,3)),a5y=av(fya.slice(0,5));
  var evF=af>0?ev/af:null;
  var a3f=av(fh.slice(0,3).map(function(x){return x.v;}));
  var a5f=av(fh.slice(0,5).map(function(x){return x.v;}));
  var evF3=a3f>0?ev/a3f:null,evF5=a5f>0?ev/a5f:null;
  return{sp:sp,sh:sh,mc:mc,ca:ca,de:de,nd:nd,ev:ev,iNC:iNC,ncP:ncP,cfo:cfo,sbc:sbc,tc:tc,mp:mp,mce:mce,af:af,fy:fy,tp:tp,pdif:pdif,rc:rc,ny:ny,qr:qr,gap:gap,np:np,nr:nr,sbcP:sbcP,a3y:a3y,a5y:a5y,evF:evF,evF3:evF3,evF5:evF5,a3f:a3f,a5f:a5f};
}

async function buildCo(tk){
  var[prof,cfs,bss,incs]=await Promise.all([
    fmp('profile?symbol='+tk,true),
    fmp('cash-flow-statement?symbol='+tk+'&period=annual&limit=5',true),
    fmp('balance-sheet-statement?symbol='+tk+'&period=annual&limit=5',true),
    fmp('income-statement?symbol='+tk+'&period=annual&limit=5',true)]);
  var p=(Array.isArray(prof)?prof[0]:prof)||{};
  var cfA=Array.isArray(cfs)?cfs:[];var cf0=cfA[0]||{};
  var bsA=Array.isArray(bss)?bss:[];var bs0=bsA[0]||{};
  var incA=Array.isArray(incs)?incs:[];
  var sec=p.sector||'';var isL=sec.match(/tech|software|communication|media/i);
  var mcap=gf(p,'marketCap','mktCap');var px=gf(p,'price');
  var capex=Math.abs(gf(cf0,'capitalExpenditure'));var mpct=isL?50:70;

  // Build arrays indexed by position (0=most recent)
  var years=incA.map(function(y){return getYr(y);}).filter(Boolean);
  var rev=incA.map(function(y){return{y:getYr(y),v:+(gf(y,'revenue')/1e6).toFixed(1)};});
  var gm=incA.map(function(y){var r=gf(y,'revenue');return{y:getYr(y),v:r>0?gf(y,'grossProfit')/r:0};});
  var cfoH=cfA.map(function(y){return{y:getYr(y),v:+(gf(y,'operatingCashFlow','netCashProvidedByOperatingActivities')/1e6).toFixed(1)};});
  var fcfH=cfA.map(function(y){var o=gf(y,'operatingCashFlow','netCashProvidedByOperatingActivities');var s=gf(y,'stockBasedCompensation');var cx=Math.abs(gf(y,'capitalExpenditure'));return{y:getYr(y),v:+((o-s-cx*(mpct/100))/1e6).toFixed(1)};});
  var sbcH=cfA.map(function(y){return{y:getYr(y),v:+(gf(y,'stockBasedCompensation')/1e6).toFixed(1)};});
  var divH=cfA.map(function(y){return{y:getYr(y),v:+(Math.abs(gf(y,'dividendsPaid'))/1e6).toFixed(1)};});
  var buyH=cfA.map(function(y){return{y:getYr(y),v:+(Math.abs(gf(y,'commonStockRepurchased'))/1e6).toFixed(1)};});
  // Shares: use weighted average from income statement (more reliable)
  var soH=incA.map(function(y){var s=gf(y,'weightedAverageShsOut');if(!s)s=gf(y,'weightedAverageShsOutDil');return{y:getYr(y),v:s>0?+(s/1e6).toFixed(1):null};});

  // Fiscal year end
  var fyEnd=cf0.date?(cf0.date.substring(5)):''; // MM-DD

  return{
    t:p.symbol||tk,n:p.companyName||tk,p:px,pd:new Date().toISOString().split('T')[0],
    sh:mcap&&px?+(mcap/px/1e6).toFixed(1):0,
    ca:+((gf(bs0,'cashAndShortTermInvestments')||gf(bs0,'cashAndCashEquivalents'))/1e6).toFixed(1),
    de:+((gf(bs0,'shortTermDebt')+gf(bs0,'longTermDebt'))/1e6).toFixed(1),
    cfo:+(gf(cf0,'operatingCashFlow','netCashProvidedByOperatingActivities')/1e6).toFixed(1),
    sbc:+(gf(cf0,'stockBasedCompensation')/1e6).toFixed(1),
    cx:+(capex/1e6).toFixed(1),mp:mpct,
    fy:'FY'+(getYr(cf0)||''),fyFull:(cf0.date||'').slice(0,10),fyEnd:fyEnd,
    bsDate:(bs0.date||'').slice(0,10),
    filingLink:cf0.finalLink||cf0.link||'',
    years:years,rev:rev,gm:gm,cfoH:cfoH,fcf:fcfH,sbcH:sbcH,soH:soH,divH:divH,buyH:buyH,
    sec:sec,exch:p.exchangeFullName||p.exchange||'',industry:p.industry||'',
  };
}

var ST={d:null,co:[],indMult:15,showPath:true};
function gv(id){var e=document.getElementById(id);return e?parseFloat(e.value)||0:0;}
function reCalc(){var d=ST.d;if(!d)return;d.p=gv('fp');d.sh=gv('fsh');d.ca=gv('fca');d.de=gv('fde');d.cfo=gv('fcfo');d.sbc=gv('fsbc');d.cx=gv('fcx');d.mp=gv('fmp2');ST.indMult=gv('indm')||15;render();}
function togPath(){ST.showPath=!ST.showPath;render();}
function mkEI(id,lb,val,unit){return'<div class="ei"><label>'+lb+'</label><div style="display:flex;align-items:center;gap:3px"><input id="'+id+'" type="number" step="any" value="'+(val||'')+'" oninput="reCalc()"/><span class="u">'+unit+'</span></div></div>';}
function mkRo(lb,val,bold,op,bt){var oH=op?'<span style="margin-right:4px;font-weight:700;font-family:var(--m);color:'+(op==='+'?'var(--bl)':'var(--rd)')+'">'+op+'</span>':'';return'<div class="rw'+(bt?' bt':'')+'"><span style="font-size:12px;color:var(--lb)">'+oH+lb+'</span><span style="font-family:var(--m);font-size:12px;color:'+(bold?'var(--br)':'#a0aab8')+';font-weight:'+(bold?700:400)+'">'+val+'</span></div>';}

async function addComps(){
  var inp=document.getElementById('ci2').value.trim();if(!inp||!ST.d)return;
  document.getElementById('ld').style.display='block';
  try{var tks=inp.split(/[,\s]+/).map(function(x){return x.toUpperCase();}).filter(Boolean);
    var pd=await Promise.all(tks.map(function(x){return buildCo(x).catch(function(){return null;});}));
    ST.co=pd.filter(Boolean);render();
  }catch(e){}finally{document.getElementById('ld').style.display='none';}
}

function render(){
  var d=ST.d,co=ST.co;if(!d)return;
  var c=calcM(d);
  var qC=c.qr>=0.25?'var(--gn)':c.qr>=0.20?'var(--yw)':'var(--rd)';
  var qB=c.qr>=0.25?'#052e1688':c.qr>=0.20?'#42200688':'#450a0a88';
  var qL=c.qr>=0.25?'Ready to Invest':c.qr>=0.20?'Watchlist':'Below Threshold';
  var all=[d].concat(co);
  var cms=all.map(function(x){var m=calcM(x);return{t:x.t,mc:m.mc,ev:m.ev,iNC:m.iNC,ncP:m.ncP,af:m.af,fy:m.fy,rc:m.rc,qr:m.qr,sbcP:m.sbcP,evF:m.evF};});
  var yrs=d.years||[];

  var h='';
  // Header
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;background:var(--cd);border-radius:8px;padding:14px 16px;border:1px solid var(--bd);margin-bottom:12px"><div><div style="font-size:18px;font-weight:800;color:var(--br)">'+d.n+'</div><div style="font-size:11px;color:var(--dm)">'+d.t+' · '+d.exch+' · '+d.sec+' · '+d.industry+'</div><div style="font-size:10px;color:var(--dm);margin-top:2px">Fiscal year ends: '+d.fyEnd+' · Latest: '+d.fy+' ('+d.fyFull+')</div></div><div style="text-align:right"><div style="font-size:24px;font-weight:800;font-family:var(--m);color:var(--bl)">'+pr(d.p)+'</div><div style="font-size:10px;color:var(--dm)">'+d.pd+'</div></div></div>';

  // Quality
  h+='<div style="background:'+qB+';border-radius:8px;padding:14px 16px;margin-bottom:12px;border:1px solid '+qC+'33"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--lb)">Quality Ratio</div><div style="font-size:28px;font-weight:800;font-family:var(--m);color:var(--br)">'+pc(c.qr)+'</div><div style="font-size:10px;color:var(--lb)">FCF/EV '+pc(c.fy)+' + Rev CAGR '+pc(c.rc)+'</div></div><span class="bg" style="background:'+qC+'22;color:'+qC+'">'+qL+'</span></div></div>';

  // MktCap→EV
  h+='<div class="card"><div class="ci"><div class="cm"><div class="ct" style="color:var(--bl)">Market Cap → Enterprise Value</div>'+mkEI('fp','Stock Price',d.p,'USD')+mkEI('fsh','Shares Out.',d.sh,'M')+mkRo('Market Cap',D(c.mc),1,null,1)+mkEI('fca','Cash & Equiv.',d.ca,'$M')+mkEI('fde','Total Debt',d.de,'$M')+mkRo('Enterprise Value',D(c.ev),1,null,1)+'<div style="margin-top:6px;padding:6px 8px;border-radius:4px;background:'+(c.iNC?'#052e1644':'#450a0a44')+';border:1px solid '+(c.iNC?'#22c55e':'#ef4444')+'22;display:flex;justify-content:space-between;font-size:11px"><span style="color:'+(c.iNC?'#86efac':'#fca5a5')+'">'+(c.iNC?'✦ Net Cash':'⚠ Net Debt')+'</span><span style="font-family:var(--m);color:'+(c.iNC?'#86efac':'#fca5a5')+';font-weight:600">'+D(Math.abs(c.nd))+' ('+pc(c.ncP)+' MCap)</span></div></div><div class="cs"><b class="s">Filing:</b> 10-K ('+d.fy+')'+(d.filingLink?'<br><a href="'+d.filingLink+'" target="_blank" style="color:var(--bl);font-size:9px">View Filing →</a>':'')+'<br><b class="s">Price:</b> '+d.pd+'<br><b class="s">BS:</b> '+d.bsDate+'</div></div></div>';

  // Adj FCF
  h+='<div class="card"><div class="ci"><div class="cm"><div class="ct" style="color:var(--pu)">Adjusted FCF ('+d.fy+')</div>'+mkEI('fcfo','CFO',d.cfo,'$M')+mkEI('fsbc','SBC',d.sbc,'$M')+mkEI('fcx','Total CapEx',d.cx,'$M')+mkEI('fmp2','Maint %',d.mp,'%')+mkRo('Maint CapEx',D(c.mce),0,'−')+mkRo('Adjusted FCF',D(c.af),1,null,1)+'</div><div class="cs"><b class="s">10-K cash flow stmt</b><br>Maint CapEx: '+c.mp+'% of total. D&A floor. 40–60% SW, 60–80% ind, 80%+ util.</div></div></div>';

  // FCF/EV
  h+='<div class="card"><div class="ci"><div class="cm"><div class="ct" style="color:var(--pu)">FCF / EV Yield</div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:22px;font-weight:800;font-family:var(--m);color:'+(c.fy>=0.10?'var(--gn)':'var(--rd)')+'">'+pc(c.fy)+'</span><span class="bg" style="background:'+(c.fy>=0.10?'#052e1688':'#450a0a88')+';color:'+(c.fy>=0.10?'var(--gn)':'var(--rd)')+'">'+(c.fy>=0.10?'≥10%':'<10%')+'</span></div>';
  h+='<div style="font-size:11px;color:var(--lb);margin-bottom:6px">'+D(c.af)+' ÷ '+D(c.ev)+' = '+pc(c.fy)+'</div>';
  h+='<div style="display:flex;gap:14px;margin-bottom:6px;font-size:11px"><div><span style="color:var(--dm)">3Y Avg:</span> <span style="font-family:var(--m);font-weight:600">'+pc(c.a3y)+'</span></div><div><span style="color:var(--dm)">5Y Avg:</span> <span style="font-family:var(--m);font-weight:600">'+pc(c.a5y)+'</span></div></div>';
  if(c.tp!=null)h+='<div class="mc"><div style="font-size:10px;color:var(--dm);margin-bottom:3px">Price for 10%:</div><span style="font-size:16px;font-weight:700;font-family:var(--m);color:var(--pu)">'+pr(c.tp)+'</span><span style="font-size:12px;font-family:var(--m);color:'+(c.pdif>=0?'var(--rd)':'var(--gn)')+';margin-left:6px">'+(c.pdif>=0?'▲':'▼')+' '+pr(Math.abs(c.pdif))+'</span></div>';
  h+='</div><div class="cs">≥10% strong. 3Y/5Y avg smooths cycles.</div></div></div>';

  // ──── FINANCIALS TABLE ────
  h+='<div class="card"><div class="ci"><div class="cm"><div class="ct" style="color:var(--tl)">Financial Summary — '+d.t+' ('+d.fy+')</div>';
  h+='<div style="overflow-x:auto"><table class="t"><thead><tr><th></th>';
  yrs.forEach(function(y){h+='<th>'+y+'</th>';});
  h+='<th>Avg</th><th>CAGR</th></tr></thead><tbody>';

  function addR(label,arr,bold,doCagr){
    var vals=arr.map(function(x){return x.v;});
    h+='<tr><td'+(bold?' style="color:var(--bl);font-weight:600"':'')+'>'+label+'</td>';
    vals.forEach(function(v){h+='<td'+(bold?' style="font-weight:600"':'')+'>'+D(v)+'</td>';});
    h+='<td style="font-weight:600">'+D(av(vals))+'</td>';
    if(doCagr&&vals.length>=2){var vf=vals.filter(function(x){return x>0;});h+='<td style="color:var(--tl)">'+(vf.length>=2?pc(cagr(vf[vf.length-1],vf[0],vf.length-1)):'—')+'</td>';}
    else h+='<td></td>';h+='</tr>';
  }
  function addYoY(arr){
    var vals=arr.map(function(x){return x.v;});
    h+='<tr style="font-size:9px"><td style="color:var(--dm)">  YoY</td>';
    vals.forEach(function(v,i){h+='<td>'+(i<vals.length-1&&vals[i+1]>0?colG(v/vals[i+1]-1):'')+'</td>';});
    h+='<td></td><td></td></tr>';
  }

  addR('Revenue',d.rev,true,true);addYoY(d.rev);
  // Gross Margin (already ratios)
  h+='<tr><td>Gross Margin</td>';d.gm.forEach(function(x){h+='<td>'+pc(x.v)+'</td>';});
  h+='<td>'+pc(av(d.gm.map(function(x){return x.v;})))+'</td><td></td></tr>';

  addR('CFO',d.cfoH,false,true);addYoY(d.cfoH);
  addR('Adj FCF',d.fcf,true,true);addYoY(d.fcf);
  addR('SBC',d.sbcH,false,false);

  // SBC/Rev
  h+='<tr><td>SBC / Rev</td>';
  d.sbcH.forEach(function(x,i){var rv=d.rev[i];h+='<td>'+colS(rv&&rv.v>0?x.v/rv.v:null)+'</td>';});
  var sbcA=d.sbcH.map(function(x,i){var rv=d.rev[i];return rv&&rv.v>0?x.v/rv.v:null;});
  h+='<td>'+colS(av(sbcA))+'</td><td></td></tr>';

  // Shares outstanding
  h+='<tr><td>Shares Out.</td>';
  d.soH.forEach(function(x){h+='<td>'+SH(x.v)+'</td>';});
  var soVals=d.soH.map(function(x){return x.v;}).filter(function(x){return x>0;});
  h+='<td>'+SH(av(soVals))+'</td>';
  if(soVals.length>=2){var sc=cagr(soVals[soVals.length-1],soVals[0],soVals.length-1);h+='<td style="color:'+(sc>0?'var(--rd)':'var(--tl)')+'">'+pc(sc)+'</td>';}
  else h+='<td></td>';h+='</tr>';

  // Dividends + buybacks
  if(d.divH.some(function(x){return x.v>0;})){addR('Dividends',d.divH,false,false);}
  if(d.buyH.some(function(x){return x.v>0;})){addR('Buybacks',d.buyH,false,false);}

  h+='</tbody></table></div>';
  h+='</div><div class="cs"><b class="s">10-K filing</b><br><br><b class="s">Shares CAGR:</b> +ve = dilution 🔴, −ve = buybacks 🟢<br><br><b class="s">SBC/Rev:</b><br>🟢 &lt;8%<br>🟡 8–15%<br>🔴 &gt;15%<br>S&P 500 ~2–3%</div></div></div>';

  // ──── COMPETITIVE LANDSCAPE ────
  if(co.length>0){
    var crs=[{l:'Market Cap',f:function(m){return D(m.mc)}},{l:'EV',f:function(m){return D(m.ev)}},{l:'Net Cash/Debt %',f:function(m){return(m.iNC?'':'-')+pc(m.ncP)}},{l:'Adj FCF',f:function(m){return D(m.af)}},{l:'FCF/EV',f:function(m){return pc(m.fy)}},{l:'Rev CAGR',f:function(m){return pc(m.rc)}},{l:'SBC/Rev',f:function(m){return colS(m.sbcP)}},{l:'EV/FCF',f:function(m){return m.evF?fx(m.evF):'—'}},{l:'Quality',f:function(m){return pc(m.qr)}}];
    var ths='<th></th>';cms.forEach(function(m,i){ths+='<th style="color:'+(i===0?'var(--bl)':'var(--lb)')+'">'+m.t+'</th>';});
    var trs='';crs.forEach(function(r){var td='<td>'+r.l+'</td>';cms.forEach(function(m,j){var v=r.f(m);var isQ=r.l==='Quality';var qc=isQ?(m.qr>=0.25?'var(--gn)':m.qr>=0.20?'var(--yw)':'var(--rd)'):null;td+='<td style="color:'+(qc||(j===0?'#e0e7f0':'#a0aab8'))+';font-weight:'+(j===0?600:400)+'">'+v+'</td>';});trs+='<tr>'+td+'</tr>';});

    h+='<div class="card"><div class="ci"><div class="cm"><div class="ct" style="color:var(--yw)">Competitive Landscape</div>';
    var bQ=cms.reduce(function(a,b){return a.qr>b.qr?a:b;});
    var bY=cms.reduce(function(a,b){return a.fy>b.fy?a:b;});
    var bG=cms.reduce(function(a,b){return(a.rc||0)>(b.rc||0)?a:b;});
    var pam=av(co.map(function(x){return calcM(x).evF;}).filter(Boolean));
    h+='<div style="font-size:11px;color:var(--lb);margin-bottom:10px;padding:8px 10px;background:#0a0e18;border-radius:5px;border:1px solid var(--bd);line-height:1.6">';
    h+='<b style="color:var(--br)">'+d.industry+'</b> — '+d.t+' at '+fx(c.evF)+' EV/FCF'+(pam?' vs peers '+fx(pam):'')+'. ';
    h+='Best quality: <span style="color:var(--tl)">'+bQ.t+' '+pc(bQ.qr)+'</span> · Best yield: <span style="color:var(--tl)">'+bY.t+' '+pc(bY.fy)+'</span> · Fastest: <span style="color:var(--tl)">'+bG.t+' '+pc(bG.rc)+'</span></div>';
    h+='<div style="overflow-x:auto"><table class="t"><thead><tr>'+ths+'</tr></thead><tbody>'+trs+'</tbody></table></div>';

    // Revenue + FCF + SBC comps
    ['Revenue','Adj FCF','SBC/Rev'].forEach(function(metric){
      h+='<div style="font-size:9px;font-weight:700;letter-spacing:1px;color:var(--dm);text-transform:uppercase;margin:10px 0 4px">'+metric+'</div><table class="t"><thead><tr><th></th>';
      yrs.forEach(function(y){h+='<th>'+y+'</th>';});
      h+='<th>'+(metric==='SBC/Rev'?'Avg':'CAGR')+'</th></tr></thead><tbody>';
      all.forEach(function(x,xi){
        h+='<tr><td style="color:'+(xi===0?'var(--bl)':'')+'">'+x.t+'</td>';
        var src=metric==='Revenue'?x.rev:metric==='Adj FCF'?x.fcf:null;
        if(metric==='SBC/Rev'){
          var pcts=[];
          yrs.forEach(function(y,yi){var s2=(x.sbcH||[])[yi];var r2=(x.rev||[])[yi];var p2=(s2&&r2&&r2.v>0)?s2.v/r2.v:null;pcts.push(p2);h+='<td>'+colS(p2)+'</td>';});
          h+='<td>'+colS(av(pcts))+'</td>';
        }else{
          var vals=(src||[]).slice(0,yrs.length);
          while(vals.length<yrs.length)vals.push({v:null});
          vals.forEach(function(v){h+='<td>'+D(v.v)+'</td>';});
          var vf=vals.map(function(a){return a.v;}).filter(function(a){return a>0;});
          h+='<td style="color:var(--tl)">'+(vf.length>=2?pc(cagr(vf[vf.length-1],vf[0],vf.length-1)):'—')+'</td>';
        }
        h+='</tr>';
      });
      if(metric==='SBC/Rev'){h+='<tr><td>S&P 500</td>';yrs.forEach(function(){h+='<td style="color:var(--dm)">~2-3%</td>';});h+='<td style="color:var(--dm)">~2-3%</td></tr>';}
      h+='</tbody></table>';
    });
    h+='</div></div></div>';
  }else{
    h+='<div style="background:var(--cd);border-radius:8px;border:1px solid var(--bd);padding:14px 16px;margin-bottom:12px;text-align:center;font-size:11px;color:var(--dm)">Add competitors above to see Competitive Landscape</div>';
  }

  // ──── PATH + UPSIDE (with toggle) ────
  h+='<div class="card"><div class="ci"><div class="cm"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div class="ct" style="color:var(--yw);margin-bottom:0">Path to 25% + Valuation</div><span class="tog'+(ST.showPath?' on':'')+'" onclick="togPath()">'+(ST.showPath?'▼ Expanded':'▶ Expand')+'</span></div>';

  if(ST.showPath){
    if(c.gap<=0)h+='<div style="color:var(--gn);font-size:12px;margin-bottom:10px">✦ Meets 25%.</div>';
    else{
      var pb=c.np!=null&&c.np>0?'<div style="font-size:16px;font-weight:800;font-family:var(--m);color:var(--yw)">'+pr(c.np)+'</div><div style="font-size:10px;color:var(--dm)">'+((c.np-c.sp)/c.sp*100).toFixed(1)+'%</div>':'<div style="font-size:10px;color:var(--dm)">Not via price alone</div>';
      h+='<div style="font-size:11px;color:var(--lb);margin-bottom:8px">Gap: <span style="color:var(--yw);font-weight:700;font-family:var(--m)">'+(c.gap*100).toFixed(1)+'pp</span></div><div class="g2" style="margin-bottom:12px"><div class="mc"><div style="font-size:9px;font-weight:700;color:var(--dm);text-transform:uppercase;margin-bottom:4px">Via Price</div>'+pb+'</div><div class="mc"><div style="font-size:9px;font-weight:700;color:var(--dm);text-transform:uppercase;margin-bottom:4px">Via Growth</div><div style="font-size:16px;font-weight:800;font-family:var(--m);color:var(--yw)">'+(c.nr!=null?c.nr.toFixed(1):'—')+'%</div><div style="font-size:10px;color:var(--dm)">vs '+((c.rc||0)*100).toFixed(1)+'%</div></div></div>';
    }
    h+='<div style="border-top:1px solid #1e2a3a;padding-top:10px"><div style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--pu);margin-bottom:6px">Valuation Multiples</div>';
    h+='<table class="t"><thead><tr><th>EV/FCF</th><th>Current</th><th>3Y</th><th>5Y</th>';
    if(co.length>0)h+='<th>Peers</th>';
    h+='<th>Industry</th></tr></thead><tbody><tr><td>Multiple</td><td style="font-weight:600;color:var(--br)">'+fx(c.evF)+'</td><td>'+fx(c.evF3)+'</td><td>'+fx(c.evF5)+'</td>';
    if(co.length>0)h+='<td>'+fx(av(co.map(function(x){return calcM(x).evF;}).filter(Boolean)))+'</td>';
    h+='<td><input id="indm" type="number" step="any" value="'+ST.indMult+'" oninput="reCalc()" style="width:42px;background:var(--ib);border:1px solid var(--ibd);border-radius:3px;padding:2px 3px;color:#e0e7f0;font-size:10px;font-family:var(--m);outline:none;text-align:right"/>x</td></tr></tbody></table>';

    var iM=ST.indMult||15;var cM=c.evF5||c.evF3||c.evF;
    if(cM&&cM>0&&iM>0){
      var uF=c.a5f||c.a3f||c.af;var fEV=uF*iM;var fMC=fEV-c.nd;
      var fP=c.sh>0?fMC/c.sh:null;var up=fP?((fP/c.sp)-1):null;
      var ry=gv('ryr')||5;var aR=up!=null?Math.pow(1+up,1/ry)-1:null;
      var tR=aR!=null?(aR+(c.fy||0)):null;
      h+='<div style="margin-top:8px;padding:8px 10px;background:#0a0e18;border-radius:5px;border:1px solid var(--bd)">';
      h+='<div style="font-size:10px;color:var(--dm)">Re-rate to '+fx(iM)+' over <input id="ryr" type="number" step="1" value="'+ry+'" oninput="reCalc()" style="width:28px;background:var(--ib);border:1px solid var(--ibd);border-radius:3px;padding:1px 3px;color:#e0e7f0;font-size:10px;font-family:var(--m);outline:none;text-align:center"/>yr:</div>';
      h+='<div style="display:flex;gap:12px;margin-top:4px;font-size:11px;flex-wrap:wrap">';
      h+='<div><span style="color:var(--dm)">Fair:</span> <span style="font-family:var(--m);font-weight:700;color:var(--br)">'+(fP?pr(fP):'—')+'</span></div>';
      h+='<div><span style="color:var(--dm)">Upside:</span> <span style="font-family:var(--m);font-weight:700;color:'+(up>=0?'var(--gn)':'var(--rd)')+'">'+pc(up)+'</span></div>';
      h+='<div><span style="color:var(--dm)">Ann.:</span> <span style="font-family:var(--m);font-weight:700;color:var(--pu)">'+pc(aR)+'</span></div></div>';
      h+='<div style="margin-top:6px;font-size:11px;color:var(--lb)">Total (rerate+yield): <span style="font-family:var(--m);font-weight:700;font-size:13px;color:'+(tR>=0.15?'var(--gn)':tR>=0.10?'var(--yw)':'var(--rd)')+'">'+pc(tR)+'</span></div></div>';
    }
    h+='</div>';
  }
  h+='</div></div></div>';

  h+='<div style="font-size:10px;color:#2a3040;line-height:1.5;padding-top:8px;border-top:1px solid var(--bd)">Adj FCF = CFO − SBC − Maint CapEx · EV = MCap + Net Debt · Quality = FCF/EV + Rev CAGR · ≥25% 🟢 20–25% 🟡 &lt;20% 🔴 · FMP (SEC 10-K)</div>';
  document.getElementById('out').innerHTML=h;
}

document.getElementById('qi').addEventListener('keydown',function(e){if(e.key==='Enter')go();});
document.getElementById('ci2').addEventListener('keydown',function(e){if(e.key==='Enter')addComps();});
async function go(){
  var t=document.getElementById('qi').value.trim().toUpperCase();if(!t)return;
  document.getElementById('gb').disabled=true;document.getElementById('gb').textContent='…';
  document.getElementById('ld').style.display='block';document.getElementById('er').style.display='none';
  document.getElementById('out').innerHTML='';document.getElementById('es').style.display='none';
  try{
    ST.d=await buildCo(t);ST.co=[];
    var peers=await fmp('stock-peers?symbol='+t).catch(function(){return null;});
    if(peers){var pA=Array.isArray(peers)?peers:[peers];var pL=((pA[0]||{}).peersList||[]).slice(0,3);
      if(pL.length>0){var pd=await Promise.all(pL.map(function(x){return buildCo(x).catch(function(){return null;});}));ST.co=pd.filter(Boolean);}}
    render();
    if(!ST.co.length)document.getElementById('ci2').placeholder='Type competitors e.g. MSFT, GOOG';
  }catch(e){document.getElementById('er').textContent=e.message;document.getElementById('er').style.display='block';
  }finally{document.getElementById('ld').style.display='none';document.getElementById('gb').disabled=false;document.getElementById('gb').textContent='Analyze';}
}
</script>
</body>
</html>
