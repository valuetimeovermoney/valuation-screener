<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Valuation Screener</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#090c14;--cd:#0f1320;--bd:#1a2234;--ib:#141a28;--ibd:#232d3f;--dm:#4a5568;--lb:#7a8494;--br:#f0f4f8;--bl:#38bdf8;--pu:#818cf8;--gn:#22c55e;--rd:#ef4444;--yw:#eab308;--tl:#34d399;--f:'DM Sans',system-ui,sans-serif;--m:'JetBrains Mono',monospace}
body.light{--bg:#f8fafc;--cd:#ffffff;--bd:#e2e8f0;--ib:#f0f4f8;--ibd:#dbeafe;--dm:#64748b;--lb:#475569;--br:#0f172a;--bl:#0284c7;--pu:#6366f1;--gn:#16a34a;--rd:#dc2626;--yw:#ca8a04;--tl:#0d9488}
*{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;background:var(--bg);font-family:var(--f);color:#c8d0dc;transition:background .3s}
body.light{color:#1e293b}
.w{max-width:980px;margin:0 auto;padding:24px 16px}
h1{font-size:20px;font-weight:800;color:var(--br);margin:2px 0 0}
.sb{display:flex;gap:6px;margin-bottom:10px;background:var(--cd);border-radius:8px;padding:5px;border:1px solid var(--bd)}
.sb input{flex:1;background:0 0;border:none;outline:none;color:var(--br);font-size:14px;padding:8px 10px;font-family:var(--f)}
.sb button{background:linear-gradient(135deg,var(--bl),var(--pu));border:none;border-radius:6px;padding:8px 20px;color:#fff;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap}
.sb button:disabled{background:var(--bd);cursor:wait}
.cb{display:flex;gap:6px;margin-bottom:20px;align-items:center}
.cb label{font-size:11px;color:var(--lb);white-space:nowrap}
.cb input{width:180px;background:var(--ib);border:1px solid var(--ibd);border-radius:6px;padding:6px 10px;color:var(--br);font-size:12px;font-family:var(--m);outline:none}
.cb button{background:var(--bd);border:none;border-radius:6px;padding:6px 14px;color:var(--lb);font-weight:600;font-size:12px;cursor:pointer;font-family:var(--f)}
.card{background:var(--cd);border-radius:8px;border:1px solid var(--bd);margin-bottom:12px;overflow:hidden}
.ci{display:flex;padding:12px 16px}.cm{flex:1;min-width:0}
.cs{width:230px;flex-shrink:0;padding-left:14px;border-left:1px solid var(--bd);margin-left:12px;font-size:10px;color:var(--dm);line-height:1.5}
.ct{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.rw{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0}
.bt{border-top:1px solid #1e2a3a}
.ei{display:flex;align-items:center;justify-content:space-between;padding:3px 0}
.ei label{font-size:12px;color:var(--lb)}.ei input{width:100px;background:var(--ib);border:1px solid var(--ibd);border-radius:4px;padding:3px 6px;color:#e0e7f0;font-size:12px;font-family:var(--m);outline:none;text-align:right}
.ei .u{font-size:10px;color:var(--dm);width:28px;margin-left:3px}
.bg{padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;display:inline-block}
.sp{width:28px;height:28px;border:3px solid var(--bd);border-top-color:var(--bl);border-radius:50%;margin:0 auto 12px;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
table.t{width:100%;border-collapse:collapse;font-size:10px}
table.t th{text-align:right;padding:3px 5px;font-weight:700;font-family:var(--m);font-size:10px;border-bottom:1px solid #1e2a3a;color:var(--lb);white-space:nowrap}
table.t th:first-child{text-align:left}
table.t td{text-align:right;padding:3px 5px;font-family:var(--m);font-size:10px;border-bottom:1px solid #131a28;color:#a0aab8;white-space:nowrap}
table.t td:first-child{text-align:left;font-family:var(--f);color:var(--lb)}
table.t tr.yoy td{font-size:9px;color:var(--dm);border-bottom:1px solid #0d1220}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.mc{background:#0a0e18;border-radius:5px;padding:10px 12px;border:1px solid var(--bd)}
.val-box{background:#0a0e18;border-radius:5px;padding:10px;border:1px solid #232d3f;text-align:center}
.val-label{font-size:9px;color:var(--dm);font-weight:600;text-transform:uppercase;margin-bottom:4px}
.val-num{font-size:16px;font-weight:800;font-family:var(--m);color:var(--bl);margin-bottom:2px}
.val-note{font-size:9px;color:var(--dm)}
.tog{display:inline-block;padding:4px 10px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--ib);color:var(--lb);margin:2px}
.tog.on{background:var(--bl)22;color:var(--bl);border-color:var(--bl)44}
b.s{color:var(--lb)}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.val-box{background:#0a0e18;border-radius:5px;padding:10px;border:1px solid #232d3f;text-align:center}
.val-label{font-size:9px;color:var(--dm);font-weight:600;text-transform:uppercase;margin-bottom:4px}
.val-num{font-size:16px;font-weight:800;font-family:var(--m);color:var(--bl);margin-bottom:2px}
.val-note{font-size:9px;color:var(--dm)}
@media(max-width:640px){.cs{display:none}.ci{padding:10px 12px}}

.chart-svg{overflow:visible;display:block}
.cl{font-size:9px;font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
<div class="w">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><div><div style="font-size:9px;font-weight:800;letter-spacing:3px;color:var(--bl)">VALUATION SCREENER</div><h1>Company Analysis</h1></div><button id="thbtn" onclick="toggleTheme()" style="padding:6px 14px;border-radius:6px;border:1px solid var(--bd);background:var(--ib);color:var(--lb);font-size:11px;cursor:pointer;font-weight:600">Day Mode</button></div>
  <div class="sb"><input id="qi" placeholder="Ticker (e.g. AAPL, MSFT, GOOG)"/><button id="gb" onclick="go()">Analyze</button></div>
  <div id="sr" style="display:none;background:var(--cd);border:1px solid var(--bd);border-radius:8px;margin-top:-14px;margin-bottom:12px;max-height:350px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,0.4)"></div>
  <div id="ld" style="display:none;text-align:center;padding:50px 0;color:var(--dm)"><div class="sp"></div><div>Fetching…</div></div>
  <div id="er" style="display:none;background:#450a0a;border:1px solid #dc2626;border-radius:6px;padding:12px;color:#fca5a5;font-size:13px;margin-bottom:16px"></div>
  <div id="out"></div>
  <div id="es" style="text-align:center;padding:60px 20px;color:#1e2a3a"><div style="font-size:36px;margin-bottom:10px">⬡</div><div style="font-size:13px;color:var(--dm)">Enter a ticker to auto-populate</div></div>
</div>
<script>
var AK='zT4AbJZ4WU2SMLjcOQ98PMqIa3NErK3J',BASE='https://financialmodelingprep.com/stable/';
async function fmpFlex(ep){
  // Try stable API first
  try{
    var r1=await fmp(ep);
    if(r1!=null){
      var isArr=Array.isArray(r1);
      if(isArr?r1.length>0:typeof r1==='object'&&Object.keys(r1).length>0)return r1;
    }
  }catch(e){}
  // Fallback: v3 API — symbol goes in URL path
  try{
    var qIdx=ep.indexOf('?');
    var path=qIdx>=0?ep.slice(0,qIdx):ep;
    var qs=qIdx>=0?ep.slice(qIdx+1):'';
    var params={};
    qs.split('&').forEach(function(p){var kv=p.split('=');if(kv[0]&&kv[1])params[kv[0]]=kv[1];});
    var sym=params.symbol||'';delete params.symbol;
    var v3p=path;
    if(v3p==='historical-price-eod/full')v3p='historical-price-full';
    var v3qs=Object.keys(params).map(function(k){return k+'='+params[k];}).join('&');
    var v3url='https://financialmodelingprep.com/api/v3/'+v3p+(sym?'/'+encodeURIComponent(sym):'')+'?'+(v3qs?v3qs+'&':'')+'apikey='+AK;
    var r2=await fetch(v3url);
    if(r2.ok){
      var d2=await r2.json();
      if(d2!=null){
        if(Array.isArray(d2))return d2;
        if(d2.historical)return d2;
        if(typeof d2==='object'&&Object.keys(d2).length>0)return[d2];
      }
    }
  }catch(e){}
  return null;
}

async function fmp(ep,req){var u=BASE+ep+(ep.includes('?')?'&':'?')+'apikey='+AK;var r=await fetch(u);if(r.status===402||r.status===403){if(req)throw new Error('FMP '+r.status);return null;}if(!r.ok)throw new Error('FMP '+r.status);return r.json();}
async function fmpSearch(q){
  var qu=q.toUpperCase().trim();
  var ql=q.toLowerCase().trim();
  var results=[];

  // Try every available FMP search/quote endpoint
  var endpoints=[
    BASE+'search?query='+encodeURIComponent(q)+'&limit=15',
    BASE+'search-name?name='+encodeURIComponent(q)+'&limit=15',
    BASE+'symbol-search?query='+encodeURIComponent(q)+'&limit=15',
    BASE+'quote-search?query='+encodeURIComponent(q)+'&limit=15',
    'https://financialmodelingprep.com/api/v3/search?query='+encodeURIComponent(q)+'&limit=15',
    'https://financialmodelingprep.com/api/v3/search-name?name='+encodeURIComponent(q)+'&limit=15',
    'https://financialmodelingprep.com/api/v3/symbol_search?query='+encodeURIComponent(q)+'&limit=15',
  ];
  for(var i=0;i<endpoints.length;i++){
    try{
      var r=await fetch(endpoints[i]+'&apikey='+AK);
      if(r.ok){
        var d=await r.json();
        if(Array.isArray(d)&&d.length>0){
          results=d.map(function(x){return{symbol:x.symbol||'',name:x.name||x.companyName||'',exchangeShortName:x.exchangeShortName||x.exchange||x.stockExchange||''};}).filter(function(x){return x.symbol&&x.name;});
          if(results.length>0)break;
        }
      }
    }catch(e){}
  }

  // If no search results, try probing with exchange suffixes
  if(!results.length){
    var suffixes=['','.TO','.V','.L','.MI','.AS','.PA','.DE','.F','.SW','.HK','.T','.SI','.ST','.OL','.CO','.HE','.BR','.LS','.MC','.WA','.JK','.AX','.NZ','.SA','.NS','.BO','.KQ','.KS'];
    async function probeOne(sym){
      var urls=[
        BASE+'profile?symbol='+encodeURIComponent(sym)+'&apikey='+AK,
        'https://financialmodelingprep.com/api/v3/profile/'+encodeURIComponent(sym)+'?apikey='+AK
      ];
      for(var ui=0;ui<urls.length;ui++){
        try{var r=await fetch(urls[ui]);if(r.ok){var d=await r.json();var p=Array.isArray(d)?d[0]:d;
          if(p&&p.symbol&&(p.companyName||p.name))return{symbol:p.symbol,name:p.companyName||p.name,exchangeShortName:p.exchangeShortName||p.exchange||''};
        }}catch(e){}
      }
      return null;
    }
    // Try: the raw input as ticker, first word as ticker, each word as ticker
    var words=qu.replace(/[^A-Z0-9 .]/g,'').split(/\s+/).filter(Boolean);
    var candidates=[qu];
    if(words.length>1)words.forEach(function(w){if(w.length>=2&&w.length<=6&&candidates.indexOf(w)<0)candidates.push(w);});
    // Also try input without spaces
    var joined=qu.replace(/\s+/g,'');if(joined!==qu&&candidates.indexOf(joined)<0)candidates.push(joined);
    var allProbes=[];
    candidates.forEach(function(c2){suffixes.forEach(function(sfx){allProbes.push(c2+sfx);});});
    // Run in batches of 15 for speed
    for(var bi=0;bi<allProbes.length&&!results.length;bi+=15){
      var batch=allProbes.slice(bi,bi+15);
      var hits=await Promise.all(batch.map(function(s2){return probeOne(s2);}));
      results=hits.filter(Boolean);
      // Deduplicate by symbol
      var seen={};results=results.filter(function(x){if(seen[x.symbol])return false;seen[x.symbol]=true;return true;});
    }
  }

  // Sort: exact symbol match first
  results.sort(function(a,b){
    var aE=a.symbol.toUpperCase()===qu?0:1,bE=b.symbol.toUpperCase()===qu?0:1;
    return aE-bE;
  });
  return results.slice(0,15);
}

function getYr(o){return o.calendarYear?''+o.calendarYear:o.date?o.date.substring(0,4):'';}
function cm(x){return(''+x).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function cs(){return(ST.d&&ST.d.cur&&ST.d.cur!=='USD')?ST.d.cur+' ':'$';}
function D(n){if(n==null||isNaN(n))return'—';var a=Math.abs(n),s=n<0?'-':'',c2=cs();if(a>=1000000)return s+c2+cm((a/1000000).toFixed(2))+'T';if(a>=1000)return s+c2+cm((a/1000).toFixed(1))+'B';if(a>=1)return s+c2+cm(Math.round(a))+'M';return s+c2+a.toFixed(1)+'M';}
function SH(n){if(n==null||isNaN(n)||n===0)return'—';var a=Math.abs(n);if(a>=1000)return cm((a/1000).toFixed(2))+'B';return cm(Math.round(a))+'M';}
function pc(n){return n==null||isNaN(n)?'—':(n*100).toFixed(1)+'%';}
function pr(n){return n==null||isNaN(n)?'—':cs()+cm(n.toFixed(2));}
function fx(n){return n==null||isNaN(n)?'—':n.toFixed(1)+'x';}
function gf(o){for(var i=1;i<arguments.length;i++){if(o[arguments[i]]!=null)return o[arguments[i]];}return 0;}
function yrOf(o){var y=o.calendarYear?''+o.calendarYear:'';if(y&&y!='0')return y;if(o.date&&o.date.length>=4)return o.date.substring(0,4);return '';}
function av(a){var v=(a||[]).filter(function(x){return x!=null&&!isNaN(x);});return v.length?(v||[]).reduce(function(s,x){return s+x;},0)/v.length:null;}
function cagr(s,e,y){return(s>0&&e>0&&y>0)?Math.pow(e/s,1/y)-1:null;}
function colG(v){return v==null?'—':'<span style="color:'+(v>=0?'var(--tl)':'var(--rd)')+'">'+pc(v)+'</span>';}
function colS(v){return v==null?'—':'<span style="color:'+(v>0.15?'var(--rd)':v>0.08?'var(--yw)':'var(--gn)')+'">'+pc(v)+'</span>';}
function lk(arr,yr,f){var x=(arr||[]).find(function(a){return a.y===yr;});return x?(x[f||'v']):null;}

function calcM(d){
  if(!d)return{sp:0,sh:0,mc:0,ca:0,de:0,nd:0,ev:0,iNC:false,ncP:0,cfo:0,sbc:0,tc:0,mp:50,mce:0,af:0,fy:0,tp:null,pd:null,revs:[],rc:null,yrs:0,yoy:[],qr:0,gap:0.25,np:null,nr:null,sbcP:0,evF:null,evF3:null,evF5:null,evF10:null,a3f:0,a5f:0,a10f:0};
  var sp=d.p||0,sh=d.sh||0,mc=sp*sh,ca=d.ca||0,de=d.de||0;
  var nd=de-ca,ev=mc+nd,iNC=nd<0,ncP=mc>0?Math.abs(nd)/mc:0;
  var cfo=d.cfo||0,sbc=d.sbc||0,tc=d.cx||0,mp=d.mp||50;
  var mce=tc*(mp/100),af=cfo-sbc-mce,fy=ev>0?af/ev:0;
  var tev=af/0.10,tmc=tev-nd,tp=sh>0?tmc/sh:null,pdif=tp!=null?tp-sp:null;
  var revs=d.rv||d.rev||[];var rc=null,ny=0;
  var _getR=function(x){return x?((x.r!=null?x.r:x.v)||0):0;};
  if(revs.length>=2){ny=revs.length-1;rc=cagr(_getR(revs[revs.length-1]),_getR(revs[0]),ny);}
  var qr=(fy||0)+(rc||0),gap=0.25-qr;
  var np=null,nr=null;
  if(gap>0){var nf=0.25-(rc||0);if(nf>0)np=sh>0?(af/nf-nd)/sh:null;nr=(0.25-fy)*100;}
  var sbcP=(_getR(revs[0])>0)?sbc/_getR(revs[0]):0;
  var fh=(d.fcf||d.fcfHist||[]).filter(function(x){return x!=null;});
  var fya=(fh||[]).map(function(x){return ev>0?(x.v||0)/ev:0;});
  var a3y=av((fya||[]).slice(0,3)),a5y=av((fya||[]).slice(0,5));
  var evF=af>0?ev/af:null;
  var a3f=av((fh||[]).slice(0,3).map(function(x){return x.v||0;}));
  var a5f=av((fh||[]).slice(0,5).map(function(x){return x.v||0;}));
  var a10f=av((fh||[]).slice(0,10).map(function(x){return x.v||0;}));
  var evF3=a3f>0?ev/a3f:null,evF5=a5f>0?ev/a5f:null,evF10=a10f>0?ev/a10f:null;
  return{sp:sp,sh:sh,mc:mc,ca:ca,de:de,nd:nd,ev:ev,iNC:iNC,ncP:ncP,cfo:cfo,sbc:sbc,tc:tc,mp:mp,mce:mce,af:af,fy:fy,tp:tp,pdif:pdif,rc:rc,ny:ny,qr:qr,gap:gap,np:np,nr:nr,sbcP:sbcP,a3y:a3y,a5y:a5y,evF:evF,evF3:evF3,evF5:evF5,evF10:evF10,a3f:a3f,a5f:a5f,a10f:a10f};
}

async function buildCo(tk){
  var[prof,cfs,bss,incs,qIncs,qCfs]=await Promise.all([
    fmpFlex('profile?symbol='+tk),fmpFlex('cash-flow-statement?symbol='+tk+'&period=annual&limit=10'),
    fmpFlex('balance-sheet-statement?symbol='+tk+'&period=annual&limit=5'),
    fmpFlex('income-statement?symbol='+tk+'&period=annual&limit=10'),
    fmpFlex('income-statement?symbol='+tk+'&period=quarter&limit=4').catch(function(){return null;}),
    fmpFlex('cash-flow-statement?symbol='+tk+'&period=quarter&limit=4').catch(function(){return null;}),
]);
  if(!prof||(Array.isArray(prof)&&prof.length===0)){throw new Error('No data found for '+tk+'. Try with exchange suffix (e.g. .TO for TSX, .L for London).');}
  var p=(Array.isArray(prof)?prof[0]:prof)||{};
  var cfA=Array.isArray(cfs)?cfs:cfs?[cfs]:[];var cf0=cfA[0]||{};
  var bsA=Array.isArray(bss)?bss:bss?[bss]:[];var bs0=bsA[0]||{};
  var inc5=(incA||[]).filter(Boolean).slice(0,5);
  var incA=Array.isArray(incs)?incs:incs?[incs]:[];
  var sec=p.sector||'';var isL=sec.match(/tech|software|communication|media/i);
  var mcap=gf(p,'marketCap','mktCap');var px=gf(p,'price');
  var capex=Math.abs(gf(cf0,'capitalExpenditure'));var mpct=isL?50:70;

  var years=(incA||[]).map(function(y){return getYr(y);}).filter(Boolean);
  var rev=(incA||[]).filter(Boolean).slice(0,5).map(function(y){return{y:yrOf(y),r:+((gf(y,'revenue'))/1e6).toFixed(1)};});
  var ni=(incA||[]).filter(Boolean).slice(0,5).map(function(y){return{y:yrOf(y),v:+((gf(y,'netIncome'))/1e6).toFixed(1)};});
  var gm=(incA||[]).filter(Boolean).slice(0,5).map(function(y){var r=gf(y,'revenue');var gp=gf(y,'grossProfit');return{y:yrOf(y),v:r>0?gp/r:0};});
  var cfoH=(cfA||[]).filter(Boolean).slice(0,5).map(function(y){return{y:yrOf(y),v:+((gf(y,'operatingCashFlow','netCashProvidedByOperatingActivities'))/1e6).toFixed(1)};});
  var cfiH=(cfA||[]).filter(Boolean).slice(0,5).map(function(y){return{y:yrOf(y),v:+((gf(y,'netCashUsedForInvestingActivites')||gf(y,'netCashUsedForInvestingActivities'))/1e6).toFixed(1)};});
  var cffH=(cfA||[]).filter(Boolean).slice(0,5).map(function(y){return{y:yrOf(y),v:+((gf(y,'netCashUsedProvidedByFinancingActivities')||gf(y,'netCashProvidedByFinancingActivities'))/1e6).toFixed(1)};});
  var ncH=(cfA||[]).filter(Boolean).slice(0,5).map(function(y){return{y:yrOf(y),v:+((gf(y,'netChangeInCash'))/1e6).toFixed(1)};});
  var fcfH=(cfA||[]).filter(Boolean).slice(0,5).map(function(y){var c2=gf(y,'operatingCashFlow','netCashProvidedByOperatingActivities');var s2=gf(y,'stockBasedCompensation');var cx2=Math.abs(gf(y,'capitalExpenditure'));return{y:yrOf(y),v:+((c2-s2-cx2*(isL?0.5:0.7))/1e6).toFixed(1)};});
  var sbcH=(cfA||[]).filter(Boolean).slice(0,5).map(function(y){return{y:yrOf(y),v:+((gf(y,'stockBasedCompensation'))/1e6).toFixed(1)};});
  var capexH=(cfA||[]).filter(Boolean).slice(0,5).map(function(y){return{y:yrOf(y),v:+(Math.abs(gf(y,'capitalExpenditure'))/1e6).toFixed(1)};});
  var divH=(cfA||[]).filter(Boolean).slice(0,5).map(function(y){return{y:yrOf(y),v:+(Math.abs(gf(y,'dividendsPaid'))/1e6).toFixed(1)};});
  var buyH=(cfA||[]).filter(Boolean).slice(0,5).map(function(y){return{y:yrOf(y),v:+(Math.abs(gf(y,'commonStockRepurchased'))/1e6).toFixed(1)};});
  var soH=(incA||[]).filter(Boolean).slice(0,5).map(function(y){var s=gf(y,'weightedAverageShsOut');if(!s)s=gf(y,'weightedAverageShsOutDil');return{y:yrOf(y),v:s>0?+(s/1e6).toFixed(1):null};});

// S&P 500 year-end closes (embedded — no API)
var SP500Y={'2000':1320,'2001':1148,'2002':880,'2003':1112,'2004':1212,'2005':1248,'2006':1418,'2007':1468,'2008':903,'2009':1115,'2010':1258,'2011':1258,'2012':1426,'2013':1848,'2014':2059,'2015':2044,'2016':2239,'2017':2674,'2018':2507,'2019':3231,'2020':3756,'2021':4766,'2022':3840,'2023':4770,'2024':5882,'2025':5880};

function renderStockChart(ticker, pts, spPts, ipoYear) {
  if (!pts || pts.length < 20) return '<div style="font-size:10px;color:var(--dm);padding:20px;text-align:center">Price history unavailable</div>';

  // Align S&P to stock dates via lookup map
  var spMap = {};
  (spPts||[]).forEach(function(p) { spMap[p.date] = p.close; });

  // Build aligned S&P series — for each stock date, find closest S&P date
  var spAligned = [];
  var lastSP = null;
  pts.forEach(function(p) {
    if (spMap[p.date]) { lastSP = spMap[p.date]; }
    else {
      // Find closest prior date
      for (var di = 1; di <= 5 && !spMap[p.date]; di++) {
        var dt = new Date(p.date);
        dt.setDate(dt.getDate() - di);
        var ds = dt.toISOString().slice(0,10);
        if (spMap[ds]) { lastSP = spMap[ds]; break; }
      }
    }
    spAligned.push(lastSP);
  });

  // Normalize both to $100 at start
  var s0 = pts[0].close;
  var sp0 = spAligned[0] || 1;
  var n = pts.length;
  var sN = pts.map(function(p) { return (p.close / s0) * 100; });
  var spN = spAligned.map(function(v) { return v ? (v / sp0) * 100 : null; });
  for (var fi = 1; fi < spN.length; fi++) { if (!spN[fi]) spN[fi] = spN[fi-1]; }

  var lastS = sN[n-1], lastSP2 = spN[n-1] || 100;
  var outperforming = lastS > lastSP2;
  var stockCol = outperforming ? '#22c55e' : '#38bdf8';

  // CAGR helper
  function _cagr(s, e, y) { return (s > 0 && e > 0 && y > 0.5) ? Math.pow(e/s, 1/y) - 1 : null; }
  function _findIdx(yrsBack) {
    var target = new Date(pts[n-1].date);
    target.setFullYear(target.getFullYear() - yrsBack);
    var ts = target.toISOString().slice(0,10);
    for (var i = 0; i < n; i++) { if (pts[i].date >= ts) return i; }
    return 0;
  }

  var totalYrs = (new Date(pts[n-1].date) - new Date(pts[0].date)) / (365.25*86400000);

  var i1 = _findIdx(1), i5 = _findIdx(5), i10 = _findIdx(10);
  var c1 = _cagr(pts[i1].close, pts[n-1].close, 1);
  var c5 = _cagr(pts[i5].close, pts[n-1].close, 5);
  var c10 = i10 < n-100 ? _cagr(pts[i10].close, pts[n-1].close, 10) : null;
  var cIPO = _cagr(pts[0].close, pts[n-1].close, totalYrs);

  var s1 = spAligned[i1] && spAligned[n-1] ? _cagr(spAligned[i1], spAligned[n-1], 1) : null;
  var s5 = spAligned[i5] && spAligned[n-1] ? _cagr(spAligned[i5], spAligned[n-1], 5) : null;
  var s10 = spAligned[i10] && spAligned[n-1] && c10 != null ? _cagr(spAligned[i10], spAligned[n-1], 10) : null;
  var sIPO = spAligned[0] && spAligned[n-1] ? _cagr(spAligned[0], spAligned[n-1], totalYrs) : null;

  // Downsample to ~400 points
  var step2 = Math.max(1, Math.floor(n / 400));
  var dS = [], dSP = [], dL = [];
  for (var di = 0; di < n; di += step2) { dS.push(sN[di]); dSP.push(spN[di]); dL.push(pts[di].date); }
  if ((n-1) % step2 !== 0) { dS.push(sN[n-1]); dSP.push(spN[n-1]); dL.push(pts[n-1].date); }
  var dn = dS.length;

  // SVG
  var W=600, H=220, pl=40, pr2=10, pt=32, pb=24;
  var cw=W-pl-pr2, ch=H-pt-pb;
  var allV = dS.concat(dSP.filter(function(v){return v!=null;}));
  var minV = Math.max(0, Math.min.apply(null, allV) * 0.92);
  var maxV = Math.max.apply(null, allV) * 1.05;
  if (maxV <= minV) maxV = minV + 50;

  function xp(i) { return pl + (i / Math.max(dn-1,1)) * cw; }
  function yp(v) { return pt + ch - ((v-minV)/(maxV-minV)) * ch; }

  var svg = '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;display:block;overflow:visible" xmlns="http://www.w3.org/2000/svg">';

  // Legend
  svg += '<line x1="'+pl+'" y1="14" x2="'+(pl+14)+'" y2="14" stroke="'+stockCol+'" stroke-width="2.5"/>';
  svg += '<text x="'+(pl+18)+'" y="17" fill="'+stockCol+'" font-size="9" font-family="monospace" font-weight="bold">'+ticker+'</text>';
  svg += '<line x1="'+(pl+70)+'" y1="14" x2="'+(pl+84)+'" y2="14" stroke="#555" stroke-width="1.5" stroke-dasharray="3,2"/>';
  svg += '<text x="'+(pl+88)+'" y="17" fill="#555" font-size="9" font-family="monospace">S&P 500</text>';

  // Grid
  var gridStep = maxV-minV > 400 ? 100 : maxV-minV > 200 ? 50 : maxV-minV > 80 ? 25 : 10;
  for (var g = Math.ceil(minV/gridStep)*gridStep; g <= maxV; g += gridStep) {
    var gy = yp(g);
    svg += '<line x1="'+pl+'" y1="'+gy.toFixed(1)+'" x2="'+(W-pr2)+'" y2="'+gy.toFixed(1)+'" stroke="#151d2b" stroke-width="0.4"/>';
    svg += '<text x="'+(pl-4)+'" y="'+(gy+3).toFixed(1)+'" fill="#3a4a5a" font-size="7.5" font-family="monospace" text-anchor="end">'+Math.round(g)+'</text>';
  }

  // X axis labels
  var prevLabel = '';
  dL.forEach(function(d2, i) {
    var lbl = d2.slice(0,7);
    if (i===0 || i===dn-1 || ((d2.slice(5,7)==='01'||d2.slice(5,7)==='07') && lbl !== prevLabel)) {
      svg += '<text x="'+xp(i).toFixed(1)+'" y="'+(H-4)+'" fill="#3a4a5a" font-size="7" font-family="monospace" text-anchor="middle">'+lbl+'</text>';
      prevLabel = lbl;
    }
  });

  // S&P path
  var spPath = (dSP||[]).map(function(v,i) { return (i===0?'M':'L')+xp(i).toFixed(1)+','+(v!=null?yp(v):yp(100)).toFixed(1); }).join(' ');
  svg += '<path d="'+spPath+'" fill="none" stroke="#555" stroke-width="1.2" stroke-dasharray="3,2" stroke-opacity="0.7"/>';

  // Stock path
  var sPath = (dS||[]).map(function(v,i) { return (i===0?'M':'L')+xp(i).toFixed(1)+','+yp(v).toFixed(1); }).join(' ');
  svg += '<path d="'+sPath+'" fill="none" stroke="'+stockCol+'" stroke-width="2"/>';

  svg += '</svg>';

  // Stats
  var stats = '<div style="display:flex;flex-wrap:wrap;gap:14px;margin-top:6px;font-size:11px;font-family:var(--m)">';
  function cagrStat(label, cv, sv) {
    if (cv == null) return '';
    var diff = sv != null ? cv - sv : null;
    var r = '<span style="color:var(--lb)">'+label+' <b style="color:'+stockCol+'">'+pc(cv)+'</b>';
    if (sv != null) r += ' <span style="color:#555">vs '+pc(sv)+'</span>';
    if (diff != null) r += ' <span style="color:'+(diff>=0?'var(--gn)':'var(--rd)')+'">('+(diff>=0?'+':'')+((diff*100).toFixed(1))+'pp)</span>';
    return r + '</span>';
  }
  stats += cagrStat('1Y', c1, s1);
  stats += cagrStat('5Y', c5, s5);
  stats += cagrStat('10Y', c10, s10);
  stats += cagrStat('IPO ('+(ipoYear||pts[0].date.slice(0,4))+')', cIPO, sIPO);

  // Overall outperformance badge
  var diff5 = (c5 != null && s5 != null) ? c5 - s5 : null;
  if (diff5 != null) {
    stats += '<b style="color:'+(diff5>=0?'var(--gn)':'var(--rd)')+'">'+
      (diff5>=0?'▲ Outperforming':'▼ Underperforming')+' S&P by '+Math.abs(diff5*100).toFixed(1)+'pp/yr</b>';
  }
  stats += '</div>';

  // ── Baggers + 52W row ──────────────────────────────────────────
  var curPx = pts[n-1].close;
  var ipoPx  = pts[0].close;
  var dataStartYr2 = pts[0].date.slice(0,4);
  var baggers = ipoPx > 0 ? curPx / ipoPx : null;
  // Label accurately: only say "IPO" if data starts within 1 year of actual IPO
  var ipoYrNum = parseInt(ipoYear)||0;
  var dataYrNum = parseInt(dataStartYr2)||0;
  var baggerLabel = (ipoYrNum>0 && dataYrNum>0 && Math.abs(dataYrNum-ipoYrNum)<=2) ? 'IPO ('+ipoYear+')' : 'Since '+dataStartYr2;

  // 52-week window: last 252 trading days (or all data if less)
  var w52 = pts.slice(Math.max(0, n - 252));
  var hi52 = Math.max.apply(null, w52.map(function(p){return p.close;}));
  var lo52 = Math.min.apply(null, w52.map(function(p){return p.close;}));
  var w52pct = (hi52 - lo52) / lo52;
  var fromHi = (curPx - hi52) / hi52;   // negative = below 52W high
  var fromLo = (curPx - lo52) / lo52;   // positive = above 52W low

  var row2 = '<div style="display:flex;flex-wrap:wrap;gap:20px;margin-top:8px;padding:8px 10px;background:#0a0e18;border-radius:5px;border:1px solid var(--bd);font-size:11px;align-items:center">';

  // Baggers
  if (baggers != null) {
    var bCol = baggers >= 10 ? 'var(--gn)' : baggers >= 3 ? 'var(--tl)' : baggers >= 1 ? 'var(--yw)' : 'var(--rd)';
    var bStr = baggers >= 1000 ? (baggers/1000).toFixed(1)+'K' : baggers >= 100 ? Math.round(baggers)+'x' : baggers.toFixed(1)+'x';
    row2 += '<span style="color:var(--lb)">'+baggerLabel+': <b style="color:'+bCol+';font-size:13px;font-family:var(--m)">'+bStr+'</b> <span style="color:var(--dm);font-size:9px">('+bStr+'-bagger)</span></span>';
  }

  // 52W high / low
  row2 += '<span style="color:var(--lb)">52W High: <b style="font-family:var(--m)">'+pr(hi52)+'</b> <span style="color:'+(fromHi<-0.2?'var(--rd)':fromHi<-0.1?'var(--yw)':'var(--gn)')+'">'+((fromHi*100).toFixed(1))+'%</span></span>';
  row2 += '<span style="color:var(--lb)">52W Low: <b style="font-family:var(--m)">'+pr(lo52)+'</b> <span style="color:var(--gn)">+'+((fromLo*100).toFixed(1))+'%</span></span>';
  row2 += '<span style="color:var(--lb)">52W Range: <b style="font-family:var(--m)">'+((w52pct*100).toFixed(1))+'%</b> <span style="color:var(--dm);font-size:9px">high−low spread</span></span>';

  row2 += '</div>';

  return svg + stats + row2;
}

function calcDCF(){
  var d=ST.d,v=ST.dcf;
  if(!d||!d.rv||!d.rv.length)return null;
  var latRev=d.rv[0].r;
  var wacc=v.wacc/100,tg=v.tg/100,mp=v.mp/100;
  var pR=[],pNI=[],pCfo=[],pSbc=[],pCx=[],pMx=[],pFcf=[],pS=[],pV=[];
  var cR=latRev;
  for(var i=1;i<=5;i++){
    cR=cR*(1+(v['r'+i]||0)/100);
    pR.push(cR);
    pNI.push(cR*(v['ni'+i]||0)/100);
    var cfo=cR*(v['cfo'+i]||0)/100; pCfo.push(cfo);
    var sbc=cR*(v['sbc'+i]||0)/100; pSbc.push(sbc);
    var cx=cR*(v['cx'+i]||0)/100;   pCx.push(cx);
    var mx=cx*mp;                     pMx.push(mx);
    var fcf=cfo-sbc-mx;              pFcf.push(fcf);
    pS.push(v['sh'+i]||0);
    pV.push(fcf/Math.pow(1+wacc,i));
  }
  var tvFcf=pFcf[4]*(1+tg),tv=(wacc-tg)>0?tvFcf/(wacc-tg):0;
  var tvPv=tv/Math.pow(1+wacc,5);
  var totPv=(pV||[]).reduce(function(a,b){return a+b;},0)+tvPv;
  var nd=(d.de||0)-(d.ca||0);
  var eq=totPv-nd;if(eq<0)eq=0;
  var iv=pS[4]>0?eq/pS[4]:0,mos=d.p>0?(iv-d.p)/d.p:0;
  return{pR:pR,pNI:pNI,pCfo:pCfo,pSbc:pSbc,pCx:pCx,pMx:pMx,pFcf:pFcf,pS:pS,pV:pV,
    tv:tv,tvPv:tvPv,totPv:totPv,nd:nd,eq:eq,iv:iv,mos:mos};
}

function render(){
  var _focId=document.activeElement?document.activeElement.id:null;
  var _focVal=document.activeElement?document.activeElement.value:null;
  var _focPos=document.activeElement&&document.activeElement.selectionStart!=null?document.activeElement.selectionStart:null;
  var d=ST.d;var co=[];if(!d)return;
  var c=calcM(d);
  // Override quality ratio with selected revenue growth if user changed it
  if(ST._revGrowth!=null){c.qr=(c.fy||0)+ST._revGrowth;c.gap=0.25-c.qr;c.rc=ST._revGrowth;}
  // Seed DCF from historical data on first load
  if(!ST.dcf._seeded&&d.rv&&d.rv.length){
    var v2=ST.dcf;
    var lr=d.rv[0].r||1;
    // Revenue growth tapering from historical CAGR
    var hrc=c.rc?Math.round(c.rc*100):10;
    v2.r1=Math.max(1,hrc);v2.r2=Math.max(1,hrc-2);v2.r3=Math.max(1,hrc-3);v2.r4=Math.max(1,hrc-4);v2.r5=Math.max(1,hrc-5);
    // NI margin from latest year
    var lni=d.ni&&d.ni[0]?d.ni[0].v:0;
    var nim=Math.round(lni/lr*1000)/10;
    for(var _i=1;_i<=5;_i++)v2['ni'+_i]=nim;
    // CFO margin from latest year
    var lcfo=d.cfoH&&d.cfoH[0]?d.cfoH[0].v:0;
    var cfom=Math.round(lcfo/lr*1000)/10;
    for(var _i=1;_i<=5;_i++)v2['cfo'+_i]=cfom;
    // SBC % of rev from latest year

    if(ST.cagrMethod==='custom')h+='<input id="cagrCust" type="number" step="0.5" value="'+(ST.cagrCustom||10)+'" onchange="ST.cagrCustom=parseFloat(this.value)||10;render();" style="width:100%;background:var(--cd);border:1px solid var(--ibd);border-radius:4px;padding:8px;color:var(--br);font-size:16px;font-family:var(--m);outline:none;text-align:center;margin-top:4px;-webkit-appearance:none"/>%';
    h+='<div style="font-size:9px;color:var(--dm);margin-top:4px">Selected: <b style="color:var(--bl)">'+pc(revGrowth)+'</b> — used in Quality Ratio and return calc below.</div>';
    h+='</div>';

    // ── Return components (stacked for mobile) ──
    h+='<div style="padding:10px;background:#0a0e18;border-radius:6px;border:1px solid var(--bd);margin-bottom:10px">';
    h+='<div style="display:flex;flex-wrap:wrap;gap:6px 20px;margin-bottom:8px;font-size:12px">';
    h+='<div><span style="color:var(--dm)">Adj FCF/EV:</span> <b style="color:var(--tl)">'+pc(fcfYield)+'</b></div>';
    h+='<div><span style="color:var(--dm)">+ Growth:</span> <b style="color:var(--bl)">'+pc(revGrowth)+'</b></div>';
    h+='<div><span style="color:var(--dm)">+ Re-rating:</span> <b style="color:'+(reRateAnn>0.005?'var(--gn)':reRateAnn<-0.005?'var(--rd)':'var(--dm)')+'">'+pc(reRateAnn)+'</b></div>';
    h+='<div style="padding:3px 8px;border-radius:4px;background:'+(totalAnn>=0.25?'#052e1644':totalAnn>=0.15?'#42200644':'#450a0a44')+'"><span style="color:var(--dm)">=</span> <b style="color:'+(totalAnn>=0.25?'var(--gn)':totalAnn>=0.15?'var(--yw)':'var(--rd)')+'">'+pc(totalAnn)+'</b></div>';
    h+='</div>';

    // Re-rating math derivation
    h+='<div style="font-size:10px;color:var(--lb);line-height:1.7;padding-top:6px;border-top:1px solid var(--bd)">';
    h+='<b>Re-rating math:</b> (Exit Multiple ÷ Current Multiple)<sup>1/years</sup> − 1<br>';
    h+='= ('+fx(reMult)+' ÷ '+fx(curMult)+')<sup>1/'+reYrs+'</sup> − 1 = <b style="color:'+(reRateAnn>=0?'var(--gn)':'var(--rd)')+'">'+pc(reRateAnn)+'</b> per year';
    if(reRateAnn>0.005)h+='<br><span style="color:var(--gn)">▲</span> Multiple below historical avg → tailwind if mean-reverts.';
    else if(reRateAnn<-0.005)h+='<br><span style="color:var(--rd)">▼</span> Multiple above historical avg → headwind even if business executes.';
    h+='</div></div>';

    // ── Assumptions (2-column grid, stacks on mobile) ──
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:11px">';
    h+='<div style="padding:8px;background:var(--ib);border-radius:5px;border:1px solid var(--bd)">';
    h+='<div style="font-size:9px;color:var(--dm);font-weight:700;margin-bottom:6px">EXIT MULTIPLE</div>';
    h+='<div style="margin-bottom:4px"><span style="color:var(--lb)">Current:</span> <b style="color:var(--br)">'+fx(curMult)+'</b></div>';
    h+='<div style="margin-bottom:4px"><span style="color:var(--lb)">Exit:</span> <input id="reMult" type="number" step="0.5" value="'+reMult+'" onchange="ST.reMult=parseFloat(this.value)||15;render();" oninput="ST.reMult=parseFloat(this.value)||15;" style="width:70px;background:var(--cd);border:1px solid var(--ibd);border-radius:4px;padding:6px;color:var(--br);font-family:var(--m);font-size:16px;outline:none;text-align:right;-webkit-appearance:none"/>x</div>';
    h+='<div><span style="color:var(--lb)">Over:</span> <input id="reYrs" type="number" step="1" min="1" max="10" value="'+reYrs+'" onchange="ST.reYrs=parseInt(this.value)||5;render();" oninput="ST.reYrs=parseInt(this.value)||5;" style="width:50px;background:var(--cd);border:1px solid var(--ibd);border-radius:4px;padding:6px;color:var(--br);font-family:var(--m);font-size:16px;outline:none;text-align:right;-webkit-appearance:none"/> yr</div>';
    h+='<div style="font-size:9px;color:var(--dm);margin-top:4px">Default: '+reMultSrc+'</div>';
    h+='</div>';
    h+='<div style="padding:8px;background:var(--ib);border-radius:5px;border:1px solid var(--bd)">';
    h+='<div style="font-size:9px;color:var(--dm);font-weight:700;margin-bottom:6px">REFERENCE</div>';
    h+='<div style="line-height:2">Current: <b>'+fx(curMult)+'</b><br>3Y Avg: '+fx(c.evF3)+'<br>5Y Avg: '+fx(c.evF5)+'<br>10Y Avg: '+fx(c.evF10)+'</div>';
    h+='</div></div>';
  }
  h+='</div></div></div>';

  
  h+='<div style="font-size:9px;color:#2a3040;padding-top:8px;border-top:1px solid var(--bd)">Quality ≥25% 🟢 | Adj FCF = CFO − SBC − Maint CapEx | Data: FMP (SEC 10-K) | <a href="/valuation-screener/valuation/" style="color:#4a5568">DCF & Valuation Model →</a></div>';
  document.getElementById('out').innerHTML=h;
  // Restore focus to prevent scroll jump
  if(_focId){var _el=document.getElementById(_focId);if(_el){_el.focus({preventScroll:true});if(_focVal!=null)_el.value=_focVal;if(_focPos!=null)try{_el.setSelectionRange(_focPos,_focPos);}catch(e){}}}
}

document.getElementById('qi').addEventListener('keydown',function(e){if(e.key==='Enter'){document.getElementById('sr').style.display='none';go();}});
var _acTimer=null;
document.getElementById('qi').addEventListener('input',function(e){
  var v=this.value.trim();
  if(_acTimer)clearTimeout(_acTimer);
  if(v.length<2){document.getElementById('sr').style.display='none';return;}
  _acTimer=setTimeout(function(){
    var sr2=document.getElementById('sr');
    sr2.innerHTML='<div style="padding:10px;color:var(--dm);font-size:10px;text-align:center">Searching...</div>';
    sr2.style.display='block';
    fmpSearch(v).then(function(sr){
      var m=(sr||[]).filter(function(x){return x.symbol&&x.name;});
      if(m.length>0)showSearchResults(m);
      else{sr2.innerHTML='<div style="padding:12px;color:var(--dm);font-size:11px;text-align:center">No matches. Try ticker with exchange (e.g. AIM.TO, SHOP.TO)</div>';}
    }).catch(function(){sr2.style.display='none';});
  },400);
});
document.addEventListener('click',function(e){if(!e.target.closest('#sr')&&!e.target.closest('.sb'))document.getElementById('sr').style.display='none';});
function showSearchResults(results){
  var el=document.getElementById('sr');
  var h2='';
  (results||[]).slice(0,10).forEach(function(r){
    var sym=r.symbol||'';var name=r.name||'';var exch=r.exchangeShortName||r.stockExchange||r.exchange||'';
    h2+='<div onclick="document.getElementById(\'sr\').style.display=\'none\';go(\''+sym+'\')" style="display:flex;justify-content:space-between;padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--bd);transition:background 0.15s" onmouseover="this.style.background=\'var(--ib)\'" onmouseout="this.style.background=\'transparent\'">';
    h2+='<div><span style="font-weight:700;color:var(--bl);font-family:var(--m)">'+sym+'</span> <span style="color:var(--lb);font-size:11px">'+name+'</span></div>';
    h2+='<span style="font-size:10px;color:var(--dm);font-family:var(--m)">'+exch+'</span>';
    h2+='</div>';
  });
  el.innerHTML=h2;
  el.style.display='block';
}

async function go(forceSymbol){
  var raw=forceSymbol||document.getElementById('qi').value.trim();if(!raw)return;
  var t=raw.toUpperCase();
  if(forceSymbol){
    t=forceSymbol;
  }else{
    // Search from cached ticker list (available-traded-list)
    try{
      var sr=await fmpSearch(raw);
      var matches=(sr||[]).filter(function(x){return x.symbol&&x.name;});
      if(matches.length>1){
        showSearchResults(matches);
        return;
      }else if(matches.length===1){
        t=matches[0].symbol;
      }else{
        // No match from search — show the suffix hint
        document.getElementById('er').innerHTML='No match for <b>'+raw+'</b>. Try searching with exchange suffix:<br><span style="font-size:10px;color:#aaa">.TO (TSX) &middot; .V (TSXV) &middot; .L (LSE) &middot; .MI (Milan) &middot; .AS (Amsterdam) &middot; .PA (Paris) &middot; .DE (Frankfurt) &middot; .HK (Hong Kong) &middot; .T (Tokyo) &middot; .AX (ASX)</span>';
        document.getElementById('er').style.display='block';return;
      }
    }catch(e){}
  }
  document.getElementById('qi').value=t;
  document.getElementById('sr').style.display='none';
  document.getElementById('gb').disabled=true;document.getElementById('gb').textContent='…';
  document.getElementById('ld').style.display='block';document.getElementById('er').style.display='none';
  document.getElementById('out').innerHTML='';document.getElementById('es').style.display='none';
  try{
    ST.d=await buildCo(t);ST.co=[];
    var peers=await fmp('stock-peers?symbol='+t).catch(function(){return null;});
    if(peers){var pA=Array.isArray(peers)?peers:[peers];var pL=((pA[0]||{}).peersList||[]).slice(0,3);
      if(pL.length>0){var pd=await Promise.all((pL||[]).map(function(x){return buildCo(x).catch(function(){return null;});}));ST.co=(pd||[]).filter(Boolean);}}
    render();

    // Fetch daily prices from IPO date for full bagger calculation
    var _ipoDate=(ST.d&&ST.d.ipoDate)?ST.d.ipoDate.slice(0,10):'1980-01-01';
    Promise.all([
      fmpFlex('historical-price-eod/full?symbol='+t+'&from='+_ipoDate).catch(function(){return null;}),
      fmp('historical-price-eod/full?symbol=%5EGSPC&from='+_ipoDate).catch(function(){return null;})
    ]).then(function(res){
      function parsePx(raw){
        if(!raw)return[];
        var arr=(raw||{}).historical||(Array.isArray(raw)?raw:[]);
        if(!Array.isArray(arr))return[];
        return (arr||[]).map(function(x){return{date:x.date,close:x.adjClose||x.close||0};}).filter(function(x){return x.close>0;}).reverse();
      }
      ST.priceHist=parsePx(res[0]);
      ST.spHist=parsePx(res[1]);
      render();
    }).catch(function(){render();});
  }catch(e){document.getElementById('er').innerHTML=e.message+'<br><span style="font-size:9px;color:#888">Tip: Open browser console (F12) for details. Try the ticker with exchange suffix (e.g. AIM.TO for TSX)</span>';document.getElementById('er').style.display='block';
  }finally{document.getElementById('ld').style.display='none';document.getElementById('gb').disabled=false;document.getElementById('gb').textContent='Analyze';}
}
</script>
