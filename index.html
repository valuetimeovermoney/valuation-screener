<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valuation Screener</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#090c14;--cd:#0f1320;--bd:#1a2234;--ib:#141a28;--ibd:#232d3f;--dm:#4a5568;--lb:#7a8494;--br:#f0f4f8;--bl:#38bdf8;--pu:#818cf8;--gn:#22c55e;--rd:#ef4444;--yw:#eab308;--tl:#34d399;--f:'DM Sans',system-ui,sans-serif;--m:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;background:var(--bg);font-family:var(--f);color:#c8d0dc}
.w{max-width:1000px;margin:0 auto;padding:24px 16px}
h1{font-size:20px;font-weight:800;color:var(--br)}
.sb{display:flex;gap:6px;margin-bottom:10px;background:var(--cd);border-radius:8px;padding:5px;border:1px solid var(--bd)}
.sb input{flex:1;background:0 0;border:none;outline:none;color:var(--br);font-size:14px;padding:8px 10px;font-family:var(--f)}
.sb button{background:linear-gradient(135deg,var(--bl),var(--pu));border:none;border-radius:6px;padding:8px 20px;color:#fff;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap}
.sb button:disabled{background:var(--bd);cursor:wait}
.cb{display:flex;gap:6px;margin-bottom:20px;align-items:center}
.cb label{font-size:11px;color:var(--lb)}
.cb input{width:180px;background:var(--ib);border:1px solid var(--ibd);border-radius:6px;padding:6px 10px;color:var(--br);font-size:12px}
.cb button{background:var(--bd);border:none;border-radius:6px;padding:6px 14px;color:var(--lb);font-weight:600;font-size:12px;cursor:pointer}
.card{background:var(--cd);border-radius:8px;border:1px solid var(--bd);margin-bottom:12px;overflow:hidden}
.ci{display:flex;padding:12px 16px}.cm{flex:1}.cs{width:200px;flex-shrink:0;padding-left:14px;border-left:1px solid var(--bd);margin-left:12px;font-size:9px;color:var(--dm);line-height:1.5}
.ct{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.rw{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0}
.ei{display:flex;align-items:center;justify-content:space-between;padding:3px 0}
.ei label{font-size:12px;color:var(--lb)}
.ei input{width:100px;background:var(--ib);border:1px solid var(--ibd);border-radius:4px;padding:3px 6px;color:#e0e7f0;font-size:12px;outline:none;text-align:right}
.ei .u{font-size:10px;color:var(--dm);width:28px;margin-left:3px}
.bg{padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700}
.sp{width:28px;height:28px;border:3px solid var(--bd);border-top-color:var(--bl);border-radius:50%;margin:0 auto 12px;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
table.t{width:100%;border-collapse:collapse;font-size:9px}
table.t th{text-align:right;padding:3px 5px;font-weight:700;font-family:var(--m);border-bottom:1px solid #1e2a3a;color:var(--lb);white-space:nowrap}
table.t th:first-child{text-align:left}
table.t td{text-align:right;padding:3px 5px;font-family:var(--m);border-bottom:1px solid #131a28;color:#a0aab8}
table.t td:first-child{text-align:left;font-family:var(--f);color:var(--lb)}
table.t input{width:60px;background:var(--ib);border:1px solid var(--ibd);border-radius:2px;padding:2px 3px;color:#e0e7f0;font-size:9px;font-family:var(--m);outline:none;text-align:right}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.mc{background:#0a0e18;border-radius:5px;padding:10px;border:1px solid #232d3f}
.tog{display:inline-block;padding:4px 10px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--ib);color:var(--lb)}
.tog.on{background:var(--bl)22;color:var(--bl);border-color:var(--bl)44}
.val-box{background:#0a0e18;border-radius:5px;padding:10px;border:1px solid #232d3f;text-align:center}
.val-label{font-size:9px;color:var(--dm);font-weight:600;text-transform:uppercase;margin-bottom:4px}
.val-num{font-size:16px;font-weight:800;font-family:var(--m);color:var(--bl);margin-bottom:2px}
.val-note{font-size:9px;color:var(--dm)}
b.s{color:var(--lb)}
@media(max-width:640px){.cs{display:none}}
</style>
</head>
<body>
<div class="w">
  <div style="margin-bottom:20px"><div style="font-size:9px;font-weight:800;letter-spacing:3px;color:var(--bl)">VALUATION</div><h1>Company Analysis</h1></div>
  <div class="sb"><input id="qi" placeholder="Ticker"/><button id="gb" onclick="go()">Analyze</button></div>
  <div class="cb"><label>Competitors:</label><input id="ci2" placeholder="MSFT, GOOG"/><button onclick="addComps()">Load</button></div>
  <div id="ld" style="display:none;text-align:center;padding:50px 0;color:var(--dm)"><div class="sp"></div>Fetching…</div>
  <div id="er" style="display:none;background:#450a0a;border:1px solid #dc2626;border-radius:6px;padding:12px;color:#fca5a5;font-size:13px;margin-bottom:16px"></div>
  <div id="out"></div>
  <div id="es" style="text-align:center;padding:60px 20px;color:#1e2a3a"><div style="font-size:36px">⬡</div><div style="font-size:13px;color:var(--dm)">Enter a ticker</div></div>
</div>
<script>
var AK='zT4AbJZ4WU2SMLjcOQ98PMqIa3NErK3J',BASE='https://financialmodelingprep.com/stable/';
async function fmp(ep,req){var u=BASE+ep+(ep.includes('?')?'&':'?')+'apikey='+AK;var r=await fetch(u);if(r.status===402||r.status===403){if(req)throw new Error('FMP '+r.status);return null;}if(!r.ok)throw new Error('FMP '+r.status);return r.json();}

function getYr(o){return o.calendarYear?''+o.calendarYear:o.date?o.date.substring(0,4):'';}
function cm(x){return(''+x).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function D(n){if(n==null||isNaN(n))return'—';var a=Math.abs(n),s=n<0?'-':'';if(a>=1000000)return s+'$'+cm((a/1000000).toFixed(2))+'T';if(a>=1000)return s+'$'+cm((a/1000).toFixed(1))+'B';if(a>=1)return s+'$'+cm(Math.round(a))+'M';return s+'$'+a.toFixed(1)+'M';}
function SH(n){if(n==null||isNaN(n)||n===0)return'—';var a=Math.abs(n);if(a>=1000)return cm((a/1000).toFixed(2))+'B';return cm(Math.round(a))+'M';}
function pc(n){return n==null||isNaN(n)?'—':(n*100).toFixed(1)+'%';}
function pr(n){return n==null||isNaN(n)?'—':'$'+cm(n.toFixed(2));}
function fx(n){return n==null||isNaN(n)?'—':n.toFixed(1)+'x';}
function gf(o){for(var i=1;i<arguments.length;i++){if(o[arguments[i]]!=null)return o[arguments[i]];}return 0;}
function av(a){var v=a.filter(function(x){return x!=null&&!isNaN(x);});return v.length?v.reduce(function(s,x){return s+x;},0)/v.length:null;}
function cagr(s,e,y){return(s>0&&e>0&&y>0)?Math.pow(e/s,1/y)-1:null;}
function colG(v){return v==null?'—':'<span style="color:'+(v>=0?'var(--tl)':'var(--rd)')+'">'+pc(v)+'</span>';}
function colS(v){return v==null?'—':'<span style="color:'+(v>0.15?'var(--rd)':v>0.08?'var(--yw)':'var(--gn)')+'">'+pc(v)+'</span>';}

function calcM(d){
  var sp=d.p||0,sh=d.sh||0,mc=sp*sh,ca=d.ca||0,de=d.de||0;
  var nd=de-ca,ev=mc+nd,iNC=nd<0,ncP=mc>0?Math.abs(nd)/mc:0;
  var cfo=d.cfo||0,sbc=d.sbc||0,tc=d.cx||0,mp=d.mp||50;
  var mce=tc*(mp/100),af=cfo-sbc-mce,fy=ev>0?af/ev:0;
  var revs=d.rev||[];var rc=null;
  if(revs.length>=2){rc=cagr(revs[revs.length-1].v,revs[0].v,revs.length-1);}
  var qr=(fy||0)+(rc||0);
  var sbcP=(revs[0]&&revs[0].v>0)?sbc/revs[0].v:0;
  var fh=d.fcf||[];
  var a3y=av(fh.slice(0,3).map(function(x){return ev>0?x.v/ev:0;}));
  var evF=af>0?ev/af:null;
  return{sp:sp,sh:sh,mc:mc,ca:ca,de:de,nd:nd,ev:ev,iNC:iNC,ncP:ncP,cfo:cfo,sbc:sbc,af:af,fy:fy,rc:rc,qr:qr,sbcP:sbcP,a3y:a3y,evF:evF};
}

async function buildCo(tk){
  var[prof,cfs,bss,incs]=await Promise.all([fmp('profile?symbol='+tk,true),fmp('cash-flow-statement?symbol='+tk+'&period=annual&limit=5',true),fmp('balance-sheet-statement?symbol='+tk+'&period=annual&limit=5',true),fmp('income-statement?symbol='+tk+'&period=annual&limit=5',true)]);
  var p=(Array.isArray(prof)?prof[0]:prof)||{};
  var cfA=Array.isArray(cfs)?cfs:[];var cf0=cfA[0]||{};
  var bsA=Array.isArray(bss)?bss:[];var bs0=bsA[0]||{};
  var incA=Array.isArray(incs)?incs:[];
  var sec=p.sector||'';var isL=sec.match(/tech|software|communication|media/i);
  var mcap=gf(p,'marketCap','mktCap');var px=gf(p,'price');
  var capex=Math.abs(gf(cf0,'capitalExpenditure'));var mpct=isL?50:70;

  var years=incA.map(function(y){return getYr(y);}).filter(Boolean).reverse();
  var rev=incA.map(function(y){return{y:getYr(y),v:+(gf(y,'revenue')/1e6).toFixed(1)};}).reverse();
  var gm=incA.map(function(y){var r=gf(y,'revenue');return{y:getYr(y),v:r>0?gf(y,'grossProfit')/r:0};}).reverse();
  var ni=incA.map(function(y){return{y:getYr(y),v:+(gf(y,'netIncome')/1e6).toFixed(1)};}).reverse();
  var cfoH=cfA.map(function(y){return{y:getYr(y),v:+(gf(y,'operatingCashFlow','netCashProvidedByOperatingActivities')/1e6).toFixed(1)};}).reverse();
  var fcfH=cfA.map(function(y){var o=gf(y,'operatingCashFlow','netCashProvidedByOperatingActivities');var s=gf(y,'stockBasedCompensation');var cx=Math.abs(gf(y,'capitalExpenditure'));return{y:getYr(y),v:+((o-s-cx*(mpct/100))/1e6).toFixed(1)};}).reverse();
  var sbcH=cfA.map(function(y){return{y:getYr(y),v:+(gf(y,'stockBasedCompensation')/1e6).toFixed(1)};}).reverse();
  var caH=bsA.map(function(y){return{y:getYr(y),v:+((gf(y,'cashAndShortTermInvestments')||gf(y,'cashAndCashEquivalents'))/1e6).toFixed(1)};}).reverse();
  var deH=bsA.map(function(y){return{y:getYr(y),v:+((gf(y,'shortTermDebt')+gf(y,'longTermDebt'))/1e6).toFixed(1)};}).reverse();
  var ppe=bsA.map(function(y){return{y:getYr(y),v:+(gf(y,'propertyPlantAndEquipment')/1e6).toFixed(1)};}).reverse();
  var ta=bsA.map(function(y){return{y:getYr(y),v:+(gf(y,'totalAssets')/1e6).toFixed(1)};}).reverse();
  var soH=incA.map(function(y){var s=gf(y,'weightedAverageShsOut');if(!s)s=gf(y,'weightedAverageShsOutDil');return{y:getYr(y),v:s>0?+(s/1e6).toFixed(1):null};}).reverse();

  var priceH=years.map(function(y){return{y:y,p:px};});
  var mcapH=years.map(function(y,i){var so=soH[i];return{y:y,v:so?(so.v*px):0};});
  var evH=years.map(function(y,i){var mc=mcapH[i];var ca=caH[i];var de=deH[i];return{y:y,v:(mc.v||0)+((de.v||0)-(ca.v||0))};});

  var fyEnd=cf0.date?(cf0.date.substring(5)):'';

  return{
    t:p.symbol||tk,n:p.companyName||tk,p:px,pd:new Date().toISOString().split('T')[0],
    sh:mcap&&px?+(mcap/px/1e6).toFixed(1):0,
    ca:+((gf(bs0,'cashAndShortTermInvestments')||gf(bs0,'cashAndCashEquivalents'))/1e6).toFixed(1),
    de:+((gf(bs0,'shortTermDebt')+gf(bs0,'longTermDebt'))/1e6).toFixed(1),
    cfo:+(gf(cf0,'operatingCashFlow','netCashProvidedByOperatingActivities')/1e6).toFixed(1),
    sbc:+(gf(cf0,'stockBasedCompensation')/1e6).toFixed(1),
    cx:+(capex/1e6).toFixed(1),mp:mpct,
    fy:'FY'+(getYr(cf0)||''),fyFull:(cf0.date||'').slice(0,10),fyEnd:fyEnd,bsDate:(bs0.date||'').slice(0,10),
    filingLink:cf0.finalLink||cf0.link||'',
    years:years,rev:rev,gm:gm,ni:ni,cfoH:cfoH,fcf:fcfH,sbcH:sbcH,caH:caH,deH:deH,ppe:ppe,ta:ta,soH:soH,priceH:priceH,mcapH:mcapH,evH:evH,
    sec:sec,exch:p.exchangeFullName||p.exchange||'',industry:p.industry||'',incs:incA.reverse(),cfs:cfA.reverse(),bss:bsA.reverse(),
  };
}

var ST={d:null,co:[],indMult:15,showFS:false,showDCF:false,dcfVals:{revCagr:0.10,fcfMargin:0.15,sbc_pct:0.03,maint_pct:0.50,sharesCAGR:-0.02,wacc:0.08,termGrowth:0.03}};
function gv(id){var e=document.getElementById(id);return e?parseFloat(e.value)||0:0;}
function updDCF(){ST.dcfVals={revCagr:gv('dcf_rc')/100,fcfMargin:gv('dcf_fm')/100,sbc_pct:gv('dcf_sbc')/100,maint_pct:gv('dcf_mp')/100,sharesCAGR:gv('dcf_sc')/100,wacc:gv('dcf_wacc')/100,termGrowth:gv('dcf_tg')/100};render();}
function reCalc(){var d=ST.d;if(!d)return;d.p=gv('fp');d.sh=gv('fsh');d.ca=gv('fca');d.de=gv('fde');d.cfo=gv('fcfo');d.sbc=gv('fsbc');d.cx=gv('fcx');d.mp=gv('fmp2');render();}
function togSection(sec){ST['show'+sec]=!ST['show'+sec];render();}

function calcDCF(){
  var d=ST.d,v=ST.dcfVals;
  if(!d||!d.rev.length)return null;
  var latRev=d.rev[d.rev.length-1].v;
  var latShares=d.soH[d.soH.length-1]?d.soH[d.soH.length-1].v:d.sh;
  var latFcf=d.fcf[d.fcf.length-1]?d.fcf[d.fcf.length-1].v:0;

  var projRev=[],projFcf=[],projShares=[],pv=[],years=[];
  var cRev=latRev,cShares=latShares;
  
  for(var i=1;i<=5;i++){
    cRev=cRev*(1+v.revCagr);
    projRev.push(cRev);
    var fcf=cRev*v.fcfMargin;projFcf.push(fcf);
    cShares=cShares*(1+v.sharesCAGR);projShares.push(cShares);
    var df=Math.pow(1+v.wacc,i);pv.push(fcf/df);
    years.push(i);
  }

  var tvFcf=projFcf[4]*(1+v.termGrowth);
  var tv=tvFcf/(v.wacc-v.termGrowth);
  var tvPv=tv/Math.pow(1+v.wacc,5);

  var totalPv=pv.reduce(function(a,b){return a+b;},0)+tvPv;
  var eq=totalPv-(d.de||0)+(d.ca||0);if(eq<0)eq=0;
  var iv=projShares[4]>0?eq/projShares[4]:0;
  var mos=(iv-d.p)/d.p;

  return{projRev:projRev,projFcf:projFcf,projShares:projShares,pv:pv,years:years,tv:tv,tvPv:tvPv,totalPv:totalPv,iv:iv,mos:mos};
}

function render(){
  var d=ST.d;if(!d)return;
  var c=calcM(d);
  var dcf=calcDCF();
  var qC=c.qr>=0.25?'var(--gn)':c.qr>=0.20?'var(--yw)':'var(--rd)';
  var qB=c.qr>=0.25?'#052e1688':c.qr>=0.20?'#42200688':'#450a0a88';
  var yrs=d.years||[];

  var h='';
  // Header
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;background:var(--cd);border-radius:8px;padding:14px 16px;border:1px solid var(--bd);margin-bottom:12px"><div><div style="font-size:18px;font-weight:800">'+d.n+'</div><div style="font-size:11px;color:var(--dm)">'+d.t+' · '+d.sec+' · '+d.industry+'</div></div><div style="text-align:right"><div style="font-size:24px;font-weight:800;font-family:var(--m);color:var(--bl)">'+pr(d.p)+'</div><div style="font-size:10px;color:var(--dm)">'+d.pd+'</div></div></div>';

  // Quality banner
  h+='<div style="background:'+qB+';border-radius:8px;padding:14px 16px;margin-bottom:12px;border:1px solid '+qC+'33;display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:9px;color:var(--lb);text-transform:uppercase;letter-spacing:1px">Quality Ratio</div><div style="font-size:28px;font-weight:800;font-family:var(--m);color:var(--br)">'+pc(c.qr)+'</div><div style="font-size:10px;color:var(--lb)">FCF/EV '+pc(c.fy)+' + Rev CAGR '+pc(c.rc)+'</div></div></div>';

  // ──── VALUATION TRIANGLE ────
  h+='<div class="card"><div class="ci"><div class="cm"><div class="ct">Valuation Triangle — 3 Methods</div><div class="g3">';
  
  // Method 1: FCF Yield
  var m1Val=c.ev>0?c.ev:null;
  var m1PerShare=d.sh>0?m1Val/d.sh:null;
  h+='<div class="val-box"><div class="val-label">Method 1: FCF Yield</div><div class="val-num">'+(m1PerShare?pr(m1PerShare):'TBD')+'</div><div class="val-note">EV at current FCF/EV yield '+(c.a3y?'(3Y avg '+pc(c.a3y)+')':'')+' suggests this valuation</div></div>';

  // Method 2: DCF
  var m2Val=dcf?pr(dcf.iv):'—';
  var m2Mos=dcf?pc(dcf.mos):'—';
  h+='<div class="val-box"><div class="val-label">Method 2: DCF 5-Year</div><div class="val-num">'+m2Val+'</div><div class="val-note">Margin of Safety: <span style="color:'+(dcf&&dcf.mos>=1?'var(--gn)':dcf&&dcf.mos>=0.5?'var(--yw)':'var(--rd)')+'">'+m2Mos+'</span></div></div>';

  // Method 3: Balance Sheet (replacement cost placeholder)
  var m3Val=c.ta>0?(c.ta/d.sh):null;
  h+='<div class="val-box"><div class="val-label">Method 3: Balance Sheet</div><div class="val-num">'+(m3Val?pr(m3Val):'TBD')+'</div><div class="val-note">Asset-based valuation placeholder</div></div>';

  h+='</div></div><div class="cs"><b class="s">3 methods to triangulate</b><br>1. FCF Yield<br>2. DCF 5yr<br>3. Balance Sheet</div></div></div>';

  // ──── FINANCIALS TABLE ────
  h+='<div class="card"><div class="ci"><div class="cm"><div class="ct">Financial Summary — '+d.fy+'</div><div style="overflow-x:auto"><table class="t"><thead><tr><th></th>';
  yrs.forEach(function(y){h+='<th>'+y+'</th>';});h+='<th>Avg</th><th>CAGR</th></tr></thead><tbody>';

  // Price & Shares
  h+='<tr><td>Stock Price</td>';d.priceH.forEach(function(x){h+='<td>'+pr(x.p)+'</td>';});h+='<td>'+pr(av(d.priceH.map(function(x){return x.p;})))+'</td><td></td></tr>';
  h+='<tr><td>Shares (M)</td>';d.soH.forEach(function(x){h+='<td>'+SH(x.v)+'</td>';});var soV=d.soH.map(function(x){return x.v;}).filter(Boolean);h+='<td>'+SH(av(soV))+'</td>';h+='<td style="color:'+(soV.length>=2&&cagr(soV[soV.length-1],soV[0],soV.length-1)<0?'var(--rd)':'var(--tl)')+'">'+pc(soV.length>=2?cagr(soV[soV.length-1],soV[0],soV.length-1):null)+'</td></tr>';

  // Cap, CA, Debt, EV
  h+='<tr><td style="font-weight:600;color:var(--bl)">Market Cap</td>';d.mcapH.forEach(function(x){h+='<td>'+D(x.v)+'</td>';});h+='<td>'+D(av(d.mcapH.map(function(x){return x.v;})))+'</td><td></td></tr>';
  h+='<tr><td>Cash & Equiv</td>';d.caH.forEach(function(x){h+='<td>'+D(x.v)+'</td>';});h+='<td>'+D(av(d.caH.map(function(x){return x.v;})))+'</td><td></td></tr>';
  h+='<tr><td>Total Debt</td>';d.deH.forEach(function(x){h+='<td>'+D(x.v)+'</td>';});h+='<td>'+D(av(d.deH.map(function(x){return x.v;})))+'</td><td></td></tr>';
  h+='<tr><td style="font-weight:600">Enterprise Value</td>';d.evH.forEach(function(x){h+='<td style="font-weight:600">'+D(x.v)+'</td>';});h+='<td style="font-weight:600">'+D(av(d.evH.map(function(x){return x.v;})))+'</td><td></td></tr>';

  // Revenue
  h+='<tr><td style="color:var(--bl);font-weight:600">Revenue</td>';d.rev.forEach(function(x){h+='<td style="font-weight:600">'+D(x.v)+'</td>';});var rvV=d.rev.map(function(x){return x.v;}).filter(Boolean);h+='<td style="font-weight:600">'+D(av(rvV))+'</td>';h+='<td style="color:var(--tl)">'+pc(rvV.length>=2?cagr(rvV[rvV.length-1],rvV[0],rvV.length-1):null)+'</td></tr>';
  h+='<tr><td>Gross Margin</td>';d.gm.forEach(function(x){h+='<td>'+pc(x.v)+'</td>';});h+='<td>'+pc(av(d.gm.map(function(x){return x.v;})))+'</td><td></td></tr>';
  h+='<tr><td>Net Income</td>';d.ni.forEach(function(x){h+='<td>'+D(x.v)+'</td>';});h+='<td>'+D(av(d.ni.map(function(x){return x.v;})))+'</td><td></td></tr>';

  // CFO, FCF
  h+='<tr><td>CFO</td>';d.cfoH.forEach(function(x){h+='<td>'+D(x.v)+'</td>';});h+='<td>'+D(av(d.cfoH.map(function(x){return x.v;})))+'</td><td></td></tr>';
  h+='<tr><td style="font-weight:600;color:var(--bl)">Adj FCF</td>';d.fcf.forEach(function(x){h+='<td style="font-weight:600">'+D(x.v)+'</td>';});h+='<td style="font-weight:600">'+D(av(d.fcf.map(function(x){return x.v;})))+'</td><td></td></tr>';
  h+='<tr><td>FCF/EV Yield</td>';d.evH.forEach(function(x,i){var ev=x.v;var fcf=d.fcf[i];h+='<td>'+pc(ev>0&&fcf?fcf.v/ev:null)+'</td>';});h+='<td></td><td></td></tr>';

  h+='</tbody></table></div></div><div class="cs"><b class="s">Years: old → recent</b></div></div></div>';

  // ──── FINANCIAL STATEMENTS ANALYSIS ────
  h+='<div class="card"><div class="ci"><div class="cm"><div style="display:flex;justify-content:space-between"><div class="ct">Financial Statements Health</div><span class="tog'+(ST.showFS?' on':'')+'" onclick="togSection(\'FS\')">'+(ST.showFS?'▼':'▶')+'</span></div>';
  if(ST.showFS){
    var niMarginLatest=d.ni.length&&d.rev.length?d.ni[d.ni.length-1].v/d.rev[d.rev.length-1].v:0;
    var fcfConvLatest=d.cfoH.length&&d.fcf.length&&d.cfoH[d.cfoH.length-1].v>0?d.fcf[d.fcf.length-1].v/d.cfoH[d.cfoH.length-1].v:0;
    var deToEbitda=d.deH.length?d.deH[d.deH.length-1].v/(d.cfoH[d.cfoH.length-1]?d.cfoH[d.cfoH.length-1].v*1.5:1):0; // rough
    var roic=d.ni.length&&d.ta.length&&d.deH.length?d.ni[d.ni.length-1].v/((d.ta[d.ta.length-1]?d.ta[d.ta.length-1].v:0)*0.5):0;

    h+='<div style="margin-top:10px;font-size:10px;color:var(--dm);line-height:1.6">';
    h+='<b>Income Statement:</b> Net margin '+pc(niMarginLatest)+' (trend: '+(d.ni.length>=2&&d.ni[0].v&&d.ni[1].v?(d.ni[0].v/d.ni[1].v>1?'↑ improving':'↓ declining'):'—')+')<br>';
    h+='<b>Cash Flow:</b> FCF conversion '+pc(fcfConvLatest)+' (CFO→FCF quality '+(fcfConvLatest>0.8?'✓ good':fcfConvLatest>0.6?'◐ fair':'✗ weak')+')<br>';
    h+='<b>Balance Sheet:</b> Debt/EBITDA ~'+fx(deToEbitda)+' | ROIC ~'+pc(roic)+'<br>';
    h+='<b>Overall Health:</b> '+(fcfConvLatest>0.7&&niMarginLatest>0.15&&deToEbitda<3?'★★★★★ Excellent':fcfConvLatest>0.6&&niMarginLatest>0.10?'★★★★☆ Good':'★★★☆☆ Monitor');
    h+='</div>';
  }
  h+='</div></div></div>';

  // ──── DCF MODEL ────
  h+='<div class="card"><div class="ci"><div class="cm"><div style="display:flex;justify-content:space-between"><div class="ct">5-Year DCF Projection</div><span class="tog'+(ST.showDCF?' on':'')+'" onclick="togSection(\'DCF\')">'+(ST.showDCF?'▼':'▶')+'</span></div>';
  if(ST.showDCF&&dcf){
    h+='<div style="margin-top:10px"><div style="font-size:10px;color:var(--dm);margin-bottom:10px"><b>Assumptions:</b> Input below to change</div>';
    h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;font-size:10px">';
    h+='<div><label>Rev CAGR</label><input id="dcf_rc" type="number" step="1" value="'+Math.round(ST.dcfVals.revCagr*100)+'" oninput="updDCF()" style="width:100%"/>%</div>';
    h+='<div><label>FCF Margin</label><input id="dcf_fm" type="number" step="1" value="'+Math.round(ST.dcfVals.fcfMargin*100)+'" oninput="updDCF()" style="width:100%"/>%</div>';
    h+='<div><label>SBC % Rev</label><input id="dcf_sbc" type="number" step="0.5" value="'+(ST.dcfVals.sbc_pct*100).toFixed(1)+'" oninput="updDCF()" style="width:100%"/>%</div>';
    h+='<div><label>WACC</label><input id="dcf_wacc" type="number" step="1" value="'+Math.round(ST.dcfVals.wacc*100)+'" oninput="updDCF()" style="width:100%"/>%</div>';
    h+='</div>';
    h+='<div style="overflow-x:auto"><table class="t"><thead><tr><th></th><th>Y1</th><th>Y2</th><th>Y3</th><th>Y4</th><th>Y5</th></tr></thead><tbody>';
    h+='<tr><td>Revenue ($M)</td>';dcf.projRev.forEach(function(x){h+='<td>'+D(x)+'</td>';});h+='</tr>';
    h+='<tr><td>Shares (M)</td>';dcf.projShares.forEach(function(x){h+='<td>'+SH(x)+'</td>';});h+='</tr>';
    h+='<tr><td>Adj FCF ($M)</td>';dcf.projFcf.forEach(function(x){h+='<td style="font-weight:600">'+D(x)+'</td>';});h+='</tr>';
    h+='<tr><td>PV @ '+Math.round(ST.dcfVals.wacc*100)+'%</td>';dcf.pv.forEach(function(x){h+='<td>'+D(x)+'</td>';});h+='</tr>';
    h+='<tr style="border-top:2px solid #1e2a3a"><td>Terminal Value (5% growth)</td><td colspan="5">'+D(dcf.tv)+' | PV: '+D(dcf.tvPv)+'</td></tr>';
    h+='<tr><td style="font-weight:600">Total PV</td><td colspan="5" style="font-weight:600;color:var(--bl)">'+D(dcf.totalPv)+'</td></tr>';
    h+='<tr><td style="font-weight:600">Intrinsic Value</td><td colspan="5" style="font-weight:600;color:var(--pu)">'+pr(dcf.iv)+' / share</td></tr>';
    var mosColor=dcf.mos>=1?'var(--gn)':dcf.mos>=0.5?'var(--yw)':'var(--rd)';
    var mosLabel=dcf.mos>=1?'Ready to Invest ✓':dcf.mos>=0.5?'Watch List ◐':'Below Target ✗';
    h+='<tr style="border-top:2px solid #1e2a3a"><td style="font-weight:600">Margin of Safety</td><td colspan="5" style="font-weight:600;color:'+mosColor+'">'+pc(dcf.mos)+' — '+mosLabel+'</td></tr>';
    h+='</tbody></table></div>';
    h+='</div>';
  }
  h+='</div></div></div>';

  h+='<div style="font-size:9px;color:#2a3040;padding-top:8px;border-top:1px solid var(--bd)">Three valuation methods to triangulate fair value. Data: FMP (SEC 10-K)</div>';
  document.getElementById('out').innerHTML=h;
}

document.getElementById('qi').addEventListener('keydown',function(e){if(e.key==='Enter')go();});
document.getElementById('ci2').addEventListener('keydown',function(e){if(e.key==='Enter')addComps();});

async function addComps(){
  var inp=document.getElementById('ci2').value.trim();if(!inp||!ST.d)return;
  document.getElementById('ld').style.display='block';
  try{var tks=inp.split(/[,\s]+/).map(function(x){return x.toUpperCase();}).filter(Boolean);
    ST.co=await Promise.all(tks.map(function(x){return buildCo(x).catch(function(){return null;});}));
    ST.co=ST.co.filter(Boolean);render();
  }catch(e){}finally{document.getElementById('ld').style.display='none';}
}

async function go(){
  var t=document.getElementById('qi').value.trim().toUpperCase();if(!t)return;
  document.getElementById('gb').disabled=true;document.getElementById('gb').textContent='…';
  document.getElementById('ld').style.display='block';document.getElementById('er').style.display='none';
  document.getElementById('out').innerHTML='';document.getElementById('es').style.display='none';
  try{
    ST.d=await buildCo(t);ST.co=[];
    var peers=await fmp('stock-peers?symbol='+t).catch(function(){return null;});
    if(peers){var pA=Array.isArray(peers)?peers:[peers];var pL=((pA[0]||{}).peersList||[]).slice(0,3);
      if(pL&&pL.length){ST.co=await Promise.all(pL.map(function(x){return buildCo(x).catch(function(){return null;});}));ST.co=ST.co.filter(Boolean);}}
    render();
  }catch(e){document.getElementById('er').textContent=e.message;document.getElementById('er').style.display='block';
  }finally{document.getElementById('ld').style.display='none';document.getElementById('gb').disabled=false;document.getElementById('gb').textContent='Analyze';}
}
</script>
