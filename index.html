<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Valuation Screener</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#090c14;--cd:#0f1320;--bd:#1a2234;--ib:#141a28;--ibd:#232d3f;--dm:#4a5568;--lb:#7a8494;--br:#f0f4f8;--bl:#38bdf8;--pu:#818cf8;--gn:#22c55e;--rd:#ef4444;--yw:#eab308;--tl:#34d399;--f:'DM Sans',system-ui,sans-serif;--m:'JetBrains Mono',monospace}
body.light{--bg:#f8fafc;--cd:#ffffff;--bd:#e2e8f0;--ib:#f0f4f8;--ibd:#dbeafe;--dm:#64748b;--lb:#475569;--br:#0f172a;--bl:#0284c7;--pu:#6366f1;--gn:#16a34a;--rd:#dc2626;--yw:#ca8a04;--tl:#0d9488}
*{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;background:var(--bg);font-family:var(--f);color:#c8d0dc;transition:background .3s}
body.light{color:#1e293b}
.w{max-width:980px;margin:0 auto;padding:24px 16px}
h1{font-size:20px;font-weight:800;color:var(--br);margin:2px 0 0}
.sb{display:flex;gap:6px;margin-bottom:10px;background:var(--cd);border-radius:8px;padding:5px;border:1px solid var(--bd)}
.sb input{flex:1;background:0 0;border:none;outline:none;color:var(--br);font-size:14px;padding:8px 10px;font-family:var(--f)}
.sb button{background:linear-gradient(135deg,var(--bl),var(--pu));border:none;border-radius:6px;padding:8px 20px;color:#fff;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap}
.sb button:disabled{background:var(--bd);cursor:wait}
.cb{display:flex;gap:6px;margin-bottom:20px;align-items:center}
.cb label{font-size:11px;color:var(--lb);white-space:nowrap}
.cb input{width:180px;background:var(--ib);border:1px solid var(--ibd);border-radius:6px;padding:6px 10px;color:var(--br);font-size:12px;font-family:var(--m);outline:none}
.cb button{background:var(--bd);border:none;border-radius:6px;padding:6px 14px;color:var(--lb);font-weight:600;font-size:12px;cursor:pointer;font-family:var(--f)}
.card{background:var(--cd);border-radius:8px;border:1px solid var(--bd);margin-bottom:12px;overflow:hidden}
.ci{display:flex;padding:12px 16px}.cm{flex:1;min-width:0}
.cs{width:230px;flex-shrink:0;padding-left:14px;border-left:1px solid var(--bd);margin-left:12px;font-size:10px;color:var(--dm);line-height:1.5}
.ct{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.rw{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0}
.bt{border-top:1px solid #1e2a3a}
.ei{display:flex;align-items:center;justify-content:space-between;padding:3px 0}
.ei label{font-size:12px;color:var(--lb)}.ei input{width:100px;background:var(--ib);border:1px solid var(--ibd);border-radius:4px;padding:3px 6px;color:#e0e7f0;font-size:12px;font-family:var(--m);outline:none;text-align:right}
.ei .u{font-size:10px;color:var(--dm);width:28px;margin-left:3px}
.bg{padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;display:inline-block}
.sp{width:28px;height:28px;border:3px solid var(--bd);border-top-color:var(--bl);border-radius:50%;margin:0 auto 12px;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
table.t{width:100%;border-collapse:collapse;font-size:10px}
table.t th{text-align:right;padding:3px 5px;font-weight:700;font-family:var(--m);font-size:10px;border-bottom:1px solid #1e2a3a;color:var(--lb);white-space:nowrap}
table.t th:first-child{text-align:left}
table.t td{text-align:right;padding:3px 5px;font-family:var(--m);font-size:10px;border-bottom:1px solid #131a28;color:#a0aab8;white-space:nowrap}
table.t td:first-child{text-align:left;font-family:var(--f);color:var(--lb)}
table.t tr.yoy td{font-size:9px;color:var(--dm);border-bottom:1px solid #0d1220}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.mc{background:#0a0e18;border-radius:5px;padding:10px 12px;border:1px solid var(--bd)}
.val-box{background:#0a0e18;border-radius:5px;padding:10px;border:1px solid #232d3f;text-align:center}
.val-label{font-size:9px;color:var(--dm);font-weight:600;text-transform:uppercase;margin-bottom:4px}
.val-num{font-size:16px;font-weight:800;font-family:var(--m);color:var(--bl);margin-bottom:2px}
.val-note{font-size:9px;color:var(--dm)}
.tog{display:inline-block;padding:4px 10px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--ib);color:var(--lb);margin:2px}
.tog.on{background:var(--bl)22;color:var(--bl);border-color:var(--bl)44}
b.s{color:var(--lb)}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.val-box{background:#0a0e18;border-radius:5px;padding:10px;border:1px solid #232d3f;text-align:center}
.val-label{font-size:9px;color:var(--dm);font-weight:600;text-transform:uppercase;margin-bottom:4px}
.val-num{font-size:16px;font-weight:800;font-family:var(--m);color:var(--bl);margin-bottom:2px}
.val-note{font-size:9px;color:var(--dm)}
@media(max-width:640px){.cs{display:none}.ci{padding:10px 12px}}

.chart-svg{overflow:visible;display:block}
.cl{font-size:9px;font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
<div class="w">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><div><div style="font-size:9px;font-weight:800;letter-spacing:3px;color:var(--bl)">VALUATION SCREENER</div><h1>Company Analysis</h1></div><button id="thbtn" onclick="toggleTheme()" style="padding:6px 14px;border-radius:6px;border:1px solid var(--bd);background:var(--ib);color:var(--lb);font-size:11px;cursor:pointer;font-weight:600">Day Mode</button></div>
  <div class="sb"><input id="qi" placeholder="Ticker (e.g. AAPL, MSFT, GOOG)"/><button id="gb" onclick="go()">Analyze</button></div>
  <div class="cb"><label>Competitors:</label><input id="ci2" placeholder="e.g. MSFT, GOOG, META"/><button onclick="addComps()">Load Comps</button></div>
  <div id="ld" style="display:none;text-align:center;padding:50px 0;color:var(--dm)"><div class="sp"></div><div>Fetching…</div></div>
  <div id="er" style="display:none;background:#450a0a;border:1px solid #dc2626;border-radius:6px;padding:12px;color:#fca5a5;font-size:13px;margin-bottom:16px"></div>
  <div id="out"></div>
  <div id="es" style="text-align:center;padding:60px 20px;color:#1e2a3a"><div style="font-size:36px;margin-bottom:10px">⬡</div><div style="font-size:13px;color:var(--dm)">Enter a ticker to auto-populate</div></div>
</div>
<script>
var AK='zT4AbJZ4WU2SMLjcOQ98PMqIa3NErK3J',BASE='https://financialmodelingprep.com/stable/';
async function fmp(ep,req){var u=BASE+ep+(ep.includes('?')?'&':'?')+'apikey='+AK;var r=await fetch(u);if(r.status===402||r.status===403){if(req)throw new Error('FMP '+r.status);return null;}if(!r.ok)throw new Error('FMP '+r.status);return r.json();}

function getYr(o){return o.calendarYear?''+o.calendarYear:o.date?o.date.substring(0,4):'';}
function cm(x){return(''+x).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function D(n){if(n==null||isNaN(n))return'—';var a=Math.abs(n),s=n<0?'-':'';if(a>=1000000)return s+'$'+cm((a/1000000).toFixed(2))+'T';if(a>=1000)return s+'$'+cm((a/1000).toFixed(1))+'B';if(a>=1)return s+'$'+cm(Math.round(a))+'M';return s+'$'+a.toFixed(1)+'M';}
function SH(n){if(n==null||isNaN(n)||n===0)return'—';var a=Math.abs(n);if(a>=1000)return cm((a/1000).toFixed(2))+'B';return cm(Math.round(a))+'M';}
function pc(n){return n==null||isNaN(n)?'—':(n*100).toFixed(1)+'%';}
function pr(n){return n==null||isNaN(n)?'—':'$'+cm(n.toFixed(2));}
function fx(n){return n==null||isNaN(n)?'—':n.toFixed(1)+'x';}
function gf(o){for(var i=1;i<arguments.length;i++){if(o[arguments[i]]!=null)return o[arguments[i]];}return 0;}
function yrOf(o){var y=o.calendarYear?''+o.calendarYear:'';if(y&&y!='0')return y;if(o.date&&o.date.length>=4)return o.date.substring(0,4);return '';}
function av(a){var v=a.filter(function(x){return x!=null&&!isNaN(x);});return v.length?v.reduce(function(s,x){return s+x;},0)/v.length:null;}
function cagr(s,e,y){return(s>0&&e>0&&y>0)?Math.pow(e/s,1/y)-1:null;}
function colG(v){return v==null?'—':'<span style="color:'+(v>=0?'var(--tl)':'var(--rd)')+'">'+pc(v)+'</span>';}
function colS(v){return v==null?'—':'<span style="color:'+(v>0.15?'var(--rd)':v>0.08?'var(--yw)':'var(--gn)')+'">'+pc(v)+'</span>';}
function lk(arr,yr,f){var x=(arr||[]).find(function(a){return a.y===yr;});return x?(x[f||'v']):null;}

function calcM(d){
  var sp=d.p||0,sh=d.sh||0,mc=sp*sh,ca=d.ca||0,de=d.de||0;
  var nd=de-ca,ev=mc+nd,iNC=nd<0,ncP=mc>0?Math.abs(nd)/mc:0;
  var cfo=d.cfo||0,sbc=d.sbc||0,tc=d.cx||0,mp=d.mp||50;
  var mce=tc*(mp/100),af=cfo-sbc-mce,fy=ev>0?af/ev:0;
  var tev=af/0.10,tmc=tev-nd,tp=sh>0?tmc/sh:null,pdif=tp!=null?tp-sp:null;
  var revs=d.rev||[];var rc=null,ny=0;
  if(revs.length>=2){ny=revs.length-1;rc=cagr(revs[revs.length-1].v,revs[0].v,ny);}
  var qr=(fy||0)+(rc||0),gap=0.25-qr;
  var np=null,nr=null;
  if(gap>0){var nf=0.25-(rc||0);if(nf>0)np=sh>0?(af/nf-nd)/sh:null;nr=(0.25-fy)*100;}
  var sbcP=(revs[0]&&revs[0].v>0)?sbc/revs[0].v:0;
  var fh=d.fcf||[];
  var fya=fh.map(function(x){return ev>0?x.v/ev:0;});
  var a3y=av(fya.slice(0,3)),a5y=av(fya.slice(0,5));
  var evF=af>0?ev/af:null;
  var a3f=av(fh.slice(0,3).map(function(x){return x.v;}));
  var a5f=av(fh.slice(0,5).map(function(x){return x.v;}));
  var evF3=a3f>0?ev/a3f:null,evF5=a5f>0?ev/a5f:null;
  return{sp:sp,sh:sh,mc:mc,ca:ca,de:de,nd:nd,ev:ev,iNC:iNC,ncP:ncP,cfo:cfo,sbc:sbc,tc:tc,mp:mp,mce:mce,af:af,fy:fy,tp:tp,pdif:pdif,rc:rc,ny:ny,qr:qr,gap:gap,np:np,nr:nr,sbcP:sbcP,a3y:a3y,a5y:a5y,evF:evF,evF3:evF3,evF5:evF5,a3f:a3f,a5f:a5f};
}

async function buildCo(tk){
  var[prof,cfs,bss,incs,mcapHist]=await Promise.all([
    fmp('profile?symbol='+tk,true),fmp('cash-flow-statement?symbol='+tk+'&period=annual&limit=5',true),
    fmp('balance-sheet-statement?symbol='+tk+'&period=annual&limit=5',true),
    fmp('income-statement?symbol='+tk+'&period=annual&limit=5',true),
    fmp('historical-market-capitalization?symbol='+tk+'&limit=2000').catch(function(){return null;})]);
  var p=(Array.isArray(prof)?prof[0]:prof)||{};
  var cfA=Array.isArray(cfs)?cfs:[];var cf0=cfA[0]||{};
  var bsA=Array.isArray(bss)?bss:[];var bs0=bsA[0]||{};
  var incA=Array.isArray(incs)?incs:[];
  var sec=p.sector||'';var isL=sec.match(/tech|software|communication|media/i);
  var mcap=gf(p,'marketCap','mktCap');var px=gf(p,'price');
  var capex=Math.abs(gf(cf0,'capitalExpenditure'));var mpct=isL?50:70;

  var years=incA.map(function(y){return getYr(y);}).filter(Boolean);
  var rev=incA.filter(Boolean).slice(0,5).map(function(y){return{y:yrOf(y),r:+((gf(y,'revenue'))/1e6).toFixed(1)};});
  var ni=incA.filter(Boolean).slice(0,5).map(function(y){return{y:yrOf(y),v:+((gf(y,'netIncome'))/1e6).toFixed(1)};});
  var gm=incA.filter(Boolean).slice(0,5).map(function(y){var r=gf(y,'revenue');var gp=gf(y,'grossProfit');return{y:yrOf(y),v:r>0?gp/r:0};});
  var cfoH=cfA.filter(Boolean).slice(0,5).map(function(y){return{y:yrOf(y),v:+((gf(y,'operatingCashFlow','netCashProvidedByOperatingActivities'))/1e6).toFixed(1)};});
  var fcfH=cfA.filter(Boolean).slice(0,5).map(function(y){var c2=gf(y,'operatingCashFlow','netCashProvidedByOperatingActivities');var s2=gf(y,'stockBasedCompensation');var cx2=Math.abs(gf(y,'capitalExpenditure'));return{y:yrOf(y),v:+((c2-s2-cx2*(isL?0.5:0.7))/1e6).toFixed(1)};});
  var sbcH=cfA.filter(Boolean).slice(0,5).map(function(y){return{y:yrOf(y),v:+((gf(y,'stockBasedCompensation'))/1e6).toFixed(1)};});
  var capexH=cfA.filter(Boolean).slice(0,5).map(function(y){return{y:yrOf(y),v:+(Math.abs(gf(y,'capitalExpenditure'))/1e6).toFixed(1)};});
  var divH=cfA.filter(Boolean).slice(0,5).map(function(y){return{y:yrOf(y),v:+(Math.abs(gf(y,'dividendsPaid'))/1e6).toFixed(1)};});
  var buyH=cfA.filter(Boolean).slice(0,5).map(function(y){return{y:yrOf(y),v:+(Math.abs(gf(y,'commonStockRepurchased'))/1e6).toFixed(1)};});
  var soH=incA.filter(Boolean).slice(0,5).map(function(y){var s=gf(y,'weightedAverageShsOut');if(!s)s=gf(y,'weightedAverageShsOutDil');return{y:yrOf(y),v:s>0?+(s/1e6).toFixed(1):null};});

  var fyEnd=cf0.date?(cf0.date.substring(5)):'';

  return{
    t:p.symbol||tk,n:p.companyName||tk,p:px,pd:new Date().toISOString().split('T')[0],
    sh:mcap&&px?+(mcap/px/1e6).toFixed(1):0,
    ca:+((gf(bs0,'cashAndShortTermInvestments')||gf(bs0,'cashAndCashEquivalents'))/1e6).toFixed(1),
    de:+((gf(bs0,'shortTermDebt')+gf(bs0,'longTermDebt'))/1e6).toFixed(1),
    cfo:+(gf(cf0,'operatingCashFlow','netCashProvidedByOperatingActivities')/1e6).toFixed(1),
    sbc:+(gf(cf0,'stockBasedCompensation')/1e6).toFixed(1),
    cx:+(capex/1e6).toFixed(1),mp:mpct,
    fy:'FY'+(yrOf(cf0)||''),fyEnd:fyEnd,bsDate:(bs0.date||'').slice(0,10),filingLink:cf0.finalLink||cf0.link||'',
    rv:rev,ni:ni,gm:gm,cfoH:cfoH,fcf:fcfH,sbcH:sbcH,capexH:capexH,soH:soH,divH:divH,buyH:buyH,
    _ta:+((gf(bs0,'totalAssets'))/1e6).toFixed(1),
    _ppe:+((gf(bs0,'propertyPlantAndEquipmentNet','propertyPlantAndEquipment'))/1e6).toFixed(1),
    _intang:+((gf(bs0,'goodwillAndIntangibleAssets','intangibleAssets'))/1e6).toFixed(1),
    _wc:+((gf(bs0,'totalCurrentAssets')-gf(bs0,'totalCurrentLiabilities'))/1e6).toFixed(1),
    _tbv:+(Math.max(0,(gf(bs0,'totalStockholdersEquity')-gf(bs0,'goodwillAndIntangibleAssets')-gf(bs0,'intangibleAssets')))/1e6).toFixed(1),
    _bsLoaded:true,
    sec:sec,exch:p.exchangeFullName||p.exchange||'',industry:p.industry||'',
    mcapHist:Array.isArray(mcapHist)?mcapHist:[],
  };
}

// ── S&P 500 monthly closes (Jan of each year shown + Dec) ──────────
// Source: public market data, year-end closes
var SP500Y={
  '2015-01':1994.99,'2015-06':2063.11,'2015-12':2043.94,
  '2016-01':1940.24,'2016-06':2098.86,'2016-12':2238.83,
  '2017-01':2278.87,'2017-06':2423.41,'2017-12':2673.61,
  '2018-01':2823.81,'2018-06':2718.37,'2018-12':2506.85,
  '2019-01':2704.10,'2019-06':2941.76,'2019-12':3230.78,
  '2020-01':3225.52,'2020-06':3100.29,'2020-12':3756.07,
  '2021-01':3714.24,'2021-06':4297.50,'2021-12':4766.18,
  '2022-01':4515.55,'2022-06':3785.38,'2022-12':3839.50,
  '2023-01':4076.60,'2023-06':4450.38,'2023-12':4769.83,
  '2024-01':4845.65,'2024-06':5460.48,'2024-12':5881.63,
  '2025-01':5611.85,'2025-03':5580.94
};

function buildChart(ticker, mcapData, currentMcap, currentShares) {
  // mcapData from FMP: [{date:"2024-05-01", marketCap:3000000000000}, ...] newest first
  if (!mcapData || !mcapData.length) {
    return '<div style="padding:20px;text-align:center;color:var(--dm);font-size:10px">Historical market cap data unavailable on free plan for this ticker</div>';
  }

  // Sort oldest first
  var data = mcapData.slice().sort(function(a,b){return a.date<b.date?-1:1;});

  // Sample monthly (take last entry per month)
  var monthly = {};
  data.forEach(function(d) {
    var ym = d.date.substring(0,7); // "2022-03"
    monthly[ym] = d.marketCap; // overwrites, so last of month wins
  });

  // Build price series: price ≈ MCap / shares
  // Use current shares as proxy (best we have on free plan)
  var sharesM = currentShares || 1000; // millions
  var keys = Object.keys(monthly).sort();
  if (keys.length < 4) return '<div style="padding:20px;text-align:center;color:var(--dm);font-size:10px">Insufficient data points</div>';

  var stockPts = keys.map(function(ym) {
    return { ym: ym, price: monthly[ym] / (sharesM * 1e6) };
  });

  // Get matching S&P points
  var spPts = [];
  keys.forEach(function(ym) {
    // Find nearest S&P value
    var spKeys = Object.keys(SP500Y).sort();
    var best = spKeys[0], bestDiff = 9999;
    spKeys.forEach(function(k) {
      var diff = Math.abs(k.localeCompare(ym));
      // simple string comparison for month proximity
      if (Math.abs(parseInt(k.replace('-','')) - parseInt(ym.replace('-',''))) < bestDiff) {
        bestDiff = Math.abs(parseInt(k.replace('-','')) - parseInt(ym.replace('-','')));
        best = k;
      }
    });
    spPts.push({ ym: ym, val: SP500Y[best] || null });
  });

  // Normalize both to 100 at start
  var s0 = stockPts[0].price, sp0 = spPts[0].val;
  if (!s0 || !sp0) return '<div style="padding:20px;text-align:center;color:var(--dm);font-size:10px">Cannot normalize — missing base values</div>';

  var sNorm = stockPts.map(function(p){ return p.price / s0 * 100; });
  var spNorm = spPts.map(function(p){ return p.val ? p.val / sp0 * 100 : null; });

  // Calculate CAGRs
  var n = keys.length;
  var years = (new Date(keys[n-1]+'-01') - new Date(keys[0]+'-01')) / (365.25*24*3600*1000);
  var sCagr = years > 0 ? Math.pow(sNorm[n-1]/100, 1/years) - 1 : 0;
  var spCagr = years > 0 ? Math.pow(spNorm[n-1]/100, 1/years) - 1 : 0;
  var outperform = sCagr > spCagr;

  // SVG dimensions
  var W = 600, H = 180, pl = 36, pr = 12, pt = 16, pb = 28;
  var cw = W - pl - pr, ch = H - pt - pb;

  var allV = sNorm.concat(spNorm.filter(Boolean));
  var minV = Math.max(0, Math.min.apply(null,allV) * 0.95);
  var maxV = Math.max.apply(null,allV) * 1.05;

  function xp(i){ return pl + i/(n-1)*cw; }
  function yp(v){ return pt + ch - (v-minV)/(maxV-minV)*ch; }

  // Build paths
  var sPath='', spPath='';
  for (var i=0; i<n; i++) {
    sPath += (i===0?'M':'L') + xp(i).toFixed(1)+','+yp(sNorm[i]).toFixed(1)+' ';
    if (spNorm[i] != null) spPath += (spPath===''?'M':'L') + xp(i).toFixed(1)+','+yp(spNorm[i]).toFixed(1)+' ';
  }

  var sColor = outperform ? '#22c55e' : '#38bdf8';
  var svg = '<svg viewBox="0 0 '+W+' '+H+'" class="chart-svg" style="width:100%;max-height:200px">';

  // Background grid
  [25,50,75,100,125,150].forEach(function(v) {
    if (v < minV || v > maxV) return;
    var y = yp(v).toFixed(1);
    svg += '<line x1="'+pl+'" y1="'+y+'" x2="'+(W-pr)+'" y2="'+y+'" stroke="#1a2234" stroke-width="'+(v===100?'1.5':'0.75')+'"/>';
    svg += '<text x="'+(pl-3)+'" y="'+(parseFloat(y)+3)+'" class="cl" text-anchor="end" fill="#4a5568">'+v+'</text>';
  });

  // Year markers on x-axis
  var lastYr = '';
  keys.forEach(function(ym, i) {
    var yr = ym.substring(0,4), mo = ym.substring(5,7);
    if (yr !== lastYr && mo <= '03') {
      lastYr = yr;
      var x = xp(i).toFixed(1);
      svg += '<line x1="'+x+'" y1="'+pt+'" x2="'+x+'" y2="'+(H-pb)+'" stroke="#1a2234" stroke-width="0.5"/>';
      svg += '<text x="'+x+'" y="'+(H-8)+'" class="cl" text-anchor="middle" fill="#4a5568">'+yr+'</text>';
    }
  });

  // S&P line
  svg += '<path d="'+spPath.trim()+'" fill="none" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="4,3"/>';
  // Stock line
  svg += '<path d="'+sPath.trim()+'" fill="none" stroke="'+sColor+'" stroke-width="2.5"/>';

  // End labels
  var li = n-1;
  svg += '<circle cx="'+xp(li).toFixed(1)+'" cy="'+yp(sNorm[li]).toFixed(1)+'" r="3.5" fill="'+sColor+'"/>';
  svg += '<text x="'+(xp(li)-2)+'" y="'+(yp(sNorm[li])-7)+'" class="cl" text-anchor="middle" fill="'+sColor+'">'+sNorm[li].toFixed(0)+'</text>';
  var lastSp = spNorm[li];
  if (lastSp) {
    svg += '<circle cx="'+xp(li).toFixed(1)+'" cy="'+yp(lastSp).toFixed(1)+'" r="3" fill="#4a5568"/>';
    svg += '<text x="'+(xp(li)-2)+'" y="'+(yp(lastSp)+14)+'" class="cl" text-anchor="middle" fill="#4a5568">'+lastSp.toFixed(0)+'</text>';
  }

  svg += '</svg>';

  // Legend
  var fromYr = keys[0].substring(0,4), toYr = keys[n-1].substring(0,4);
  var leg = '<div style="display:flex;gap:16px;font-size:10px;margin-top:8px;flex-wrap:wrap;align-items:center">';
  leg += '<div style="display:flex;align-items:center;gap:5px"><svg width="20" height="3"><line x1="0" y1="1.5" x2="20" y2="1.5" stroke="'+sColor+'" stroke-width="2.5"/></svg><b>'+ticker+'</b> <span style="color:'+sColor+';font-weight:700">'+(sCagr*100).toFixed(1)+'% CAGR</span></div>';
  leg += '<div style="display:flex;align-items:center;gap:5px"><svg width="20" height="3"><line x1="0" y1="1.5" x2="20" y2="1.5" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="4,3"/></svg><b>S&P 500</b> <span style="color:#7a8494">'+(spCagr*100).toFixed(1)+'% CAGR</span></div>';
  leg += '<div style="color:var(--dm)">Indexed to 100 · '+fromYr+' → '+toYr;
  if (outperform) leg += ' · <span style="color:var(--gn)">▲ Outperforming by '+(((sCagr-spCagr)*100).toFixed(1))+'pp/yr</span>';
  else leg += ' · <span style="color:var(--rd)">▼ Underperforming by '+(((spCagr-sCagr)*100).toFixed(1))+'pp/yr</span>';
  leg += '</div></div>';

  return svg + leg;
}


var ST={d:null,co:[],indMult:15,showPath:true,showBS:false,
  dcf:{
    // Per-year revenue growth %
    r1:12,r2:10,r3:9,r4:8,r5:7,
    // Per-year NI margin % (NI/Rev)
    ni1:0,ni2:0,ni3:0,ni4:0,ni5:0,
    // Per-year CFO margin % (CFO/Rev)
    cfo1:0,cfo2:0,cfo3:0,cfo4:0,cfo5:0,
    // Per-year SBC % of Rev
    sbc1:0,sbc2:0,sbc3:0,sbc4:0,sbc5:0,
    // Per-year total CapEx % of Rev
    cx1:0,cx2:0,cx3:0,cx4:0,cx5:0,
    // Maint CapEx % of total CapEx (default from company sector)
    mp:50,
    // Per-year shares (M) - filled from historical trend
    sh1:0,sh2:0,sh3:0,sh4:0,sh5:0,
    // Global assumptions
    wacc:9,tg:3,
    _seeded:false
  }};

  var b=document.getElementById('thbtn');if(b)b.textContent='Dark Mode';}})();

function updDCF(){
  ST.dcf={r1:gv('dr1'),r2:gv('dr2'),r3:gv('dr3'),r4:gv('dr4'),r5:gv('dr5'),
    fm:gv('dfm'),wacc:gv('dwacc'),tg:gv('dtg'),sc:gv('dsc')};
  render();
}
function togS(k){ST['show'+k]=!ST['show'+k];render();}
function loadBS(){if(ST.d)render();}

function calcDCF(){
  var d=ST.d,v=ST.dcf;
  if(!d||!d.rv||!d.rv.length)return null;
  var latRev=d.rv[0].r;
  var wacc=v.wacc/100,tg=v.tg/100,mp=v.mp/100;
  var pR=[],pNI=[],pCfo=[],pSbc=[],pCx=[],pMx=[],pFcf=[],pS=[],pV=[];
  var cR=latRev;
  for(var i=1;i<=5;i++){
    cR=cR*(1+(v['r'+i]||0)/100);
    pR.push(cR);
    pNI.push(cR*(v['ni'+i]||0)/100);
    var cfo=cR*(v['cfo'+i]||0)/100; pCfo.push(cfo);
    var sbc=cR*(v['sbc'+i]||0)/100; pSbc.push(sbc);
    var cx=cR*(v['cx'+i]||0)/100;   pCx.push(cx);
    var mx=cx*mp;                     pMx.push(mx);
    var fcf=cfo-sbc-mx;              pFcf.push(fcf);
    pS.push(v['sh'+i]||0);
    pV.push(fcf/Math.pow(1+wacc,i));
  }
  var tvFcf=pFcf[4]*(1+tg),tv=(wacc-tg)>0?tvFcf/(wacc-tg):0;
  var tvPv=tv/Math.pow(1+wacc,5);
  var totPv=pV.reduce(function(a,b){return a+b;},0)+tvPv;
  var nd=(d.de||0)-(d.ca||0);
  var eq=totPv-nd;if(eq<0)eq=0;
  var iv=pS[4]>0?eq/pS[4]:0,mos=d.p>0?(iv-d.p)/d.p:0;
  return{pR:pR,pNI:pNI,pCfo:pCfo,pSbc:pSbc,pCx:pCx,pMx:pMx,pFcf:pFcf,pS:pS,pV:pV,
    tv:tv,tvPv:tvPv,totPv:totPv,nd:nd,eq:eq,iv:iv,mos:mos};
}
function gv(id){var e=document.getElementById(id);return e?parseFloat(e.value)||0:0;}
function updDCF(){
  var v=ST.dcf;
  ['r','ni','cfo','sbc','cx','sh'].forEach(function(k){
    for(var i=1;i<=5;i++){var e=document.getElementById('d_'+k+i);if(e)v[k+i]=parseFloat(e.value)||0;}
  });
  var mp=document.getElementById('d__mp');if(mp)v.mp=parseFloat(mp.value)||50;
  var wc=document.getElementById('d__wacc');if(wc)v.wacc=parseFloat(wc.value)||9;
  var tg=document.getElementById('d__tg');if(tg)v.tg=parseFloat(tg.value)||3;
  render();
}
function dcfInp(key,val,w){
  return '<input id="d_'+key+'" type="number" step="0.1" value="'+(Math.round(val*10)/10)+'" oninput="updDCF()" style="width:'+(w||48)+'px;background:var(--ib);border:1px solid var(--ibd);border-radius:3px;padding:2px 3px;color:var(--br);font-family:var(--m);font-size:9px;outline:none;text-align:right"/>';
}
function reCalc(){var d=ST.d;if(!d)return;d.p=gv('fp');d.sh=gv('fsh');d.ca=gv('fca');d.de=gv('fde');d.cfo=gv('fcfo');d.sbc=gv('fsbc');d.cx=gv('fcx');d.mp=gv('fmp2');ST.indMult=gv('indm')||15;render();}
function togSection(sec){ST['show'+sec]=!ST['show'+sec];render();}
function mkEI(id,lb,val,unit){return'<div class="ei"><label>'+lb+'</label><div style="display:flex;align-items:center;gap:3px"><input id="'+id+'" type="number" step="any" value="'+(val||'')+'" oninput="reCalc()"/><span class="u">'+unit+'</span></div></div>';}
function mkRo(lb,val,bold,op,bt){var oH=op?'<span style="margin-right:4px;font-weight:700;font-family:var(--m);color:'+(op==='+'?'var(--bl)':'var(--rd)')+'">'+op+'</span>':'';return'<div class="rw'+(bt?' bt':'')+'"><span style="font-size:12px;color:var(--lb)">'+oH+lb+'</span><span style="font-family:var(--m);font-size:12px;color:'+(bold?'var(--br)':'#a0aab8')+';font-weight:'+(bold?700:400)+'">'+val+'</span></div>';}

async function addComps(){
  var inp=document.getElementById('ci2').value.trim();if(!inp||!ST.d)return;
  document.getElementById('ld').style.display='block';
  try{var tks=inp.split(/[,\s]+/).map(function(x){return x.trim().toUpperCase();}).filter(Boolean);
    var pd=await Promise.all(tks.map(function(x){return buildCo(x).catch(function(){return null;});}));
    ST.co=pd.filter(Boolean);render();
  }catch(e){}finally{document.getElementById('ld').style.display='none';}
}


function render(){
  var d=ST.d,co=ST.co;if(!d)return;
  var c=calcM(d);
  // Seed DCF from historical data on first load
  if(!ST.dcf._seeded&&d.rv&&d.rv.length){
    var v2=ST.dcf;
    var lr=d.rv[0].r||1;
    // Revenue growth tapering from historical CAGR
    var hrc=c.rc?Math.round(c.rc*100):10;
    v2.r1=Math.max(1,hrc);v2.r2=Math.max(1,hrc-2);v2.r3=Math.max(1,hrc-3);v2.r4=Math.max(1,hrc-4);v2.r5=Math.max(1,hrc-5);
    // NI margin from latest year
    var lni=d.ni&&d.ni[0]?d.ni[0].v:0;
    var nim=Math.round(lni/lr*1000)/10;
    for(var _i=1;_i<=5;_i++)v2['ni'+_i]=nim;
    // CFO margin from latest year
    var lcfo=d.cfoH&&d.cfoH[0]?d.cfoH[0].v:0;
    var cfom=Math.round(lcfo/lr*1000)/10;
    for(var _i=1;_i<=5;_i++)v2['cfo'+_i]=cfom;
    // SBC % of rev from latest year
    var lsbc=d.sbcH&&d.sbcH[0]?d.sbcH[0].v:0;
    var sbcm=Math.round(lsbc/lr*1000)/10;
    for(var _i=1;_i<=5;_i++)v2['sbc'+_i]=sbcm;
    // Total CapEx % of rev from latest year
    var lcx=d.capexH&&d.capexH[0]?d.capexH[0].v:0;
    var cxm=Math.round(lcx/lr*1000)/10;
    for(var _i=1;_i<=5;_i++)v2['cx'+_i]=cxm;
    // Maint CapEx % default by sector
    v2.mp=d.mp||50;
    // Shares from historical trend + slight annual buyback
    var lsh=d.soH&&d.soH[0]?d.soH[0].v:d.sh;
    var shcagr=d.soH&&d.soH.length>=2?cagr(d.soH[d.soH.length-1].v||1,d.soH[0].v||1,d.soH.length-1):0;
    for(var _i=1;_i<=5;_i++)v2['sh'+_i]=Math.round(lsh*Math.pow(1+shcagr,_i)*10)/10;
    v2._seeded=true;
  }
  var dcf=calcDCF();
  var qC=c.qr>=0.25?'var(--gn)':c.qr>=0.20?'var(--yw)':'var(--rd)';
  var qB=c.qr>=0.25?'#052e1688':c.qr>=0.20?'#42200688':'#450a0a88';
  var qL=c.qr>=0.25?'Ready to Invest':c.qr>=0.20?'Watchlist':'Below Threshold';
  var all=[d].concat(co);
  var cms=all.map(function(x){var m=calcM(x);return{t:x.t,mc:m.mc,ev:m.ev,iNC:m.iNC,ncP:m.ncP,af:m.af,fy:m.fy,rc:m.rc,qr:m.qr,sbcP:m.sbcP,evF:m.evF};});

  var h='';
  // Header
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;background:var(--cd);border-radius:8px;padding:14px 16px;border:1px solid var(--bd);margin-bottom:12px"><div><div style="font-size:18px;font-weight:800;color:var(--br)">'+d.n+'</div><div style="font-size:11px;color:var(--dm)">'+d.t+' · '+d.exch+' · '+d.sec+' · '+d.industry+'</div><div style="font-size:10px;color:var(--dm);margin-top:2px">Fiscal year ends: '+d.fyEnd+' · Latest: '+d.fy+'</div></div><div style="text-align:right"><div style="font-size:24px;font-weight:800;font-family:var(--m);color:var(--bl)">'+pr(d.p)+'</div><div style="font-size:10px;color:var(--dm)">'+d.pd+'</div></div></div>';

  // Quality
  h+='<div style="background:'+qB+';border-radius:8px;padding:14px 16px;margin-bottom:12px;border:1px solid '+qC+'33"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--lb)">Quality Ratio</div><div style="font-size:28px;font-weight:800;font-family:var(--m);color:var(--br)">'+pc(c.qr)+'</div><div style="font-size:10px;color:var(--lb)">FCF/EV '+pc(c.fy)+' + Rev CAGR '+pc(c.rc)+'</div></div><span class="bg" style="background:'+qC+'22;color:'+qC+'">'+qL+'</span></div></div>';

  // ── PRICE CHART vs S&P 500 ────────────────────────────────────
  h+='<div class="card"><div class="ci"><div class="cm">';
  h+='<div class="ct" style="color:var(--bl)">Stock Price vs S&P 500 (Indexed, Year-End)</div>';
  h+=buildChart(d.t, d.mcapHist, d.p*d.sh, d.sh);
  h+='</div><div class="cs"><b class="s">Price chart</b> derived from historical market cap ÷ weighted avg shares.<br><br>Indexed to 100 at earliest year. Green = outperforming S&P 500.<br><br>S&P 500 data: annual Dec 31 closes.</div></div></div>';

  // MktCap→EV
  h+='<div class="card"><div class="ci"><div class="cm"><div class="ct" style="color:var(--bl)">Market Cap → Enterprise Value</div>'+mkEI('fp','Stock Price',d.p,'USD')+mkEI('fsh','Shares Out.',d.sh,'M')+mkRo('Market Cap',D(c.mc),1,null,1)+mkEI('fca','Cash & Equiv.',d.ca,'$M')+mkEI('fde','Total Debt',d.de,'$M')+mkRo('Enterprise Value',D(c.ev),1,null,1)+'<div style="margin-top:6px;padding:6px 8px;border-radius:4px;background:'+(c.iNC?'#052e1644':'#450a0a44')+';border:1px solid '+(c.iNC?'#22c55e':'#ef4444')+'22;display:flex;justify-content:space-between;font-size:11px"><span style="color:'+(c.iNC?'#86efac':'#fca5a5')+'">'+(c.iNC?'✦ Net Cash':'⚠ Net Debt')+'</span><span style="font-family:var(--m);color:'+(c.iNC?'#86efac':'#fca5a5')+';font-weight:600">'+D(Math.abs(c.nd))+' ('+pc(c.ncP)+' MCap)</span></div></div><div class="cs"><b class="s">Filing:</b> 10-K ('+d.fy+', '+d.fyEnd+')'+(d.filingLink?'<br><a href="'+d.filingLink+'" target="_blank" style="color:var(--bl);font-size:9px">View Filing →</a>':'')+'<br><b class="s">Price:</b> '+d.pd+'<br><b class="s">BS:</b> '+d.bsDate+'</div></div></div>';

  // Adj FCF
  h+='<div class="card"><div class="ci"><div class="cm"><div class="ct" style="color:var(--pu)">Adjusted FCF ('+d.fy+')</div>'+mkEI('fcfo','CFO',d.cfo,'$M')+mkEI('fsbc','SBC',d.sbc,'$M')+mkEI('fcx','Total CapEx',d.cx,'$M')+mkEI('fmp2','Maint %',d.mp,'%')+mkRo('Maint CapEx',D(c.mce),0,'−')+mkRo('Adjusted FCF',D(c.af),1,null,1)+'</div><div class="cs"><b class="s">Filing:</b> 10-K cash flow stmt<br><b class="s">Maint CapEx:</b> '+c.mp+'% of total. 40–60% SW, 60–80% ind, 80%+ util.</div></div></div>';

  // FCF/EV
  h+='<div class="card"><div class="ci"><div class="cm"><div class="ct" style="color:var(--pu)">Adjusted FCF / EV Yield</div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:22px;font-weight:800;font-family:var(--m);color:'+(c.fy>=0.10?'var(--gn)':'var(--rd)')+'">'+pc(c.fy)+'</span><span class="bg" style="background:'+(c.fy>=0.10?'#052e1688':'#450a0a88')+';color:'+(c.fy>=0.10?'var(--gn)':'var(--rd)')+'">'+(c.fy>=0.10?'≥10%':'<10%')+'</span></div>';
  h+='<div style="font-size:11px;color:var(--lb);margin-bottom:6px">'+D(c.af)+' ÷ '+D(c.ev)+' = '+pc(c.fy)+'</div>';
  h+='<div style="display:flex;gap:14px;margin-bottom:6px;font-size:11px"><div><span style="color:var(--dm)">3Y Avg:</span> <span style="font-family:var(--m);font-weight:600">'+pc(c.a3y)+'</span></div><div><span style="color:var(--dm)">5Y Avg:</span> <span style="font-family:var(--m);font-weight:600">'+pc(c.a5y)+'</span></div></div>';
  if(c.tp!=null)h+='<div class="mc"><div style="font-size:10px;color:var(--dm);margin-bottom:3px">Price for 10% yield:</div><span style="font-size:16px;font-weight:700;font-family:var(--m);color:var(--pu)">'+pr(c.tp)+'</span></div>';
  h+='</div><div class="cs">≥10% strong. 3Y/5Y avg smooths cycles.</div></div></div>';

  
  h+='<div style="font-size:9px;color:#2a3040;padding-top:8px;border-top:1px solid var(--bd)">Quality ≥25% 🟢 | Adj FCF = CFO − SBC − Maint CapEx | Data: FMP (SEC 10-K) | <a href="/valuation-screener/valuation/" style="color:#4a5568">DCF & Valuation Model →</a></div>';
  document.getElementById('out').innerHTML=h;
}

document.getElementById('qi').addEventListener('keydown',function(e){if(e.key==='Enter')go();});
document.getElementById('ci2').addEventListener('keydown',function(e){if(e.key==='Enter')addComps();});
async function go(){
  var t=document.getElementById('qi').value.trim().toUpperCase();if(!t)return;
  document.getElementById('gb').disabled=true;document.getElementById('gb').textContent='…';
  document.getElementById('ld').style.display='block';document.getElementById('er').style.display='none';
  document.getElementById('out').innerHTML='';document.getElementById('es').style.display='none';
  try{
    ST.d=await buildCo(t);ST.co=[];
    var peers=await fmp('stock-peers?symbol='+t).catch(function(){return null;});
    if(peers){var pA=Array.isArray(peers)?peers:[peers];var pL=((pA[0]||{}).peersList||[]).slice(0,3);
      if(pL.length>0){var pd=await Promise.all(pL.map(function(x){return buildCo(x).catch(function(){return null;});}));ST.co=pd.filter(Boolean);}}
    render();
    if(!ST.co.length)document.getElementById('ci2').placeholder='Type competitors: MSFT, GOOG';
  }catch(e){document.getElementById('er').textContent=e.message;document.getElementById('er').style.display='block';
  }finally{document.getElementById('ld').style.display='none';document.getElementById('gb').disabled=false;document.getElementById('gb').textContent='Analyze';}
}
