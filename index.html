<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Valuation Screener</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#090c14;--cd:#0f1320;--bd:#1a2234;--ib:#141a28;--ibd:#232d3f;--dm:#4a5568;--lb:#7a8494;--br:#f0f4f8;--bl:#38bdf8;--pu:#818cf8;--gn:#22c55e;--rd:#ef4444;--yw:#eab308;--tl:#34d399;--f:'DM Sans',system-ui,sans-serif;--m:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;background:var(--bg);font-family:var(--f);color:#c8d0dc}
.w{max-width:960px;margin:0 auto;padding:24px 16px}
h1{font-size:20px;font-weight:800;color:var(--br);margin:2px 0 0}
.sb{display:flex;gap:6px;margin-bottom:10px;background:var(--cd);border-radius:8px;padding:5px;border:1px solid var(--bd)}
.sb input{flex:1;background:0 0;border:none;outline:none;color:var(--br);font-size:14px;padding:8px 10px;font-family:var(--f)}
.sb button{background:linear-gradient(135deg,var(--bl),var(--pu));border:none;border-radius:6px;padding:8px 20px;color:#fff;font-weight:700;font-size:13px;cursor:pointer;font-family:var(--f);white-space:nowrap}
.sb button:disabled{background:var(--bd);cursor:wait}
.cb{display:flex;gap:6px;margin-bottom:20px;align-items:center}
.cb label{font-size:11px;color:var(--lb);white-space:nowrap}
.cb input{width:180px;background:var(--ib);border:1px solid var(--ibd);border-radius:6px;padding:6px 10px;color:var(--br);font-size:12px;font-family:var(--m);outline:none}
.cb button{background:var(--bd);border:none;border-radius:6px;padding:6px 14px;color:var(--lb);font-weight:600;font-size:12px;cursor:pointer;font-family:var(--f)}
.card{background:var(--cd);border-radius:8px;border:1px solid var(--bd);margin-bottom:12px;overflow:hidden}
.ci{display:flex;padding:12px 16px}.cm{flex:1;min-width:0}
.cs{width:230px;flex-shrink:0;padding-left:14px;border-left:1px solid var(--bd);margin-left:12px;font-size:10px;color:var(--dm);line-height:1.5}
.ct{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.rw{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0}
.bt{border-top:1px solid #1e2a3a}
.ei{display:flex;align-items:center;justify-content:space-between;padding:3px 0}
.ei label{font-size:12px;color:var(--lb)}
.ei input{width:100px;background:var(--ib);border:1px solid var(--ibd);border-radius:4px;padding:3px 6px;color:#e0e7f0;font-size:12px;font-family:var(--m);outline:none;text-align:right}
.ei .u{font-size:10px;color:var(--dm);width:28px;margin-left:3px}
.bg{padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;display:inline-block}
.sp{width:28px;height:28px;border:3px solid var(--bd);border-top-color:var(--bl);border-radius:50%;margin:0 auto 12px;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
table.t{width:100%;border-collapse:collapse;font-size:10px}
table.t th{text-align:right;padding:3px 5px;font-weight:700;font-family:var(--m);font-size:10px;border-bottom:1px solid #1e2a3a;color:var(--lb);white-space:nowrap}
table.t th:first-child{text-align:left}
table.t td{text-align:right;padding:3px 5px;font-family:var(--m);font-size:10px;border-bottom:1px solid #131a28;color:#a0aab8;white-space:nowrap}
table.t td:first-child{text-align:left;font-family:var(--f);color:var(--lb)}
table.t tr.yoy td{font-size:9px;border-bottom:1px solid #0d1220}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mc{background:#0a0e18;border-radius:5px;padding:10px 12px;border:1px solid var(--bd)}
b.s{color:var(--lb)}
@media(max-width:640px){.cs{display:none}.ci{padding:10px 12px}}
</style>
</head>
<body>
<div class="w">
  <div style="margin-bottom:20px"><div style="font-size:9px;font-weight:800;letter-spacing:3px;color:var(--bl)">QUICK VALUATION</div><h1>Company Screener</h1></div>
  <div class="sb"><input id="qi" placeholder="Ticker (e.g. AAPL, MSFT, GOOG)"/><button id="gb" onclick="go()">Analyze</button></div>
  <div class="cb"><label>Competitors:</label><input id="ci2" placeholder="e.g. MSFT, GOOG, META"/><button onclick="addComps()">Load Comps</button></div>
  <div id="ld" style="display:none;text-align:center;padding:50px 0;color:var(--dm)"><div class="sp"></div><div>Fetching…</div></div>
  <div id="er" style="display:none;background:#450a0a;border:1px solid #dc2626;border-radius:6px;padding:12px;color:#fca5a5;font-size:13px;margin-bottom:16px"></div>
  <div id="out"></div>
  <div id="es" style="text-align:center;padding:60px 20px;color:#1e2a3a"><div style="font-size:36px;margin-bottom:10px">⬡</div><div style="font-size:13px;color:var(--dm)">Enter a ticker to auto-populate</div></div>
</div>
<script>
const AK='zT4AbJZ4WU2SMLjcOQ98PMqIa3NErK3J',BASE='https://financialmodelingprep.com/stable/';
async function fmp(ep,req){const u=BASE+ep+(ep.includes('?')?'&':'?')+'apikey='+AK;const r=await fetch(u);if(r.status===402||r.status===403){if(req)throw new Error('FMP '+r.status);return null;}if(!r.ok)throw new Error('FMP '+r.status);return r.json();}

// Extract year from date string "2024-09-28" or calendarYear field
function getYr(obj){
  if(obj.calendarYear) return ''+obj.calendarYear;
  if(obj.date) return obj.date.substring(0,4);
  if(obj.fillingDate) return obj.fillingDate.substring(0,4);
  return '';
}
function cm(x){return x.toString().replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function $(n){if(n==null||isNaN(n))return'—';var a=Math.abs(n),s=n<0?'-':'';if(a>=1e6)return s+'$'+cm((a/1e6).toFixed(2))+'T';if(a>=1e3)return s+'$'+cm((a/1e3).toFixed(1))+'B';if(a>=1)return s+'$'+cm(a.toFixed(0))+'M';return s+'$'+a.toFixed(1)+'M';}
function $n(n){if(n==null||isNaN(n))return'—';var a=Math.abs(n),s=n<0?'-':'';if(a>=1e3)return s+cm((a/1e3).toFixed(1))+'B';return s+cm(a.toFixed(0))+'M';}
function pc(n){return n==null||isNaN(n)?'—':(n*100).toFixed(1)+'%';}
function pr(n){return n==null||isNaN(n)?'—':'$'+cm(n.toFixed(2));}
function fx(n){return n==null||isNaN(n)?'—':n.toFixed(1)+'x';}
function gf(o){for(var i=1;i<arguments.length;i++){if(o[arguments[i]]!=null)return o[arguments[i]];}return 0;}
function av(a){var v=a.filter(function(x){return x!=null&&!isNaN(x);});return v.length?v.reduce(function(s,x){return s+x;},0)/v.length:null;}
function cagr(s,e,y){return(s>0&&e>0&&y>0)?Math.pow(e/s,1/y)-1:null;}
function colG(v){return v==null?'—':'<span style="color:'+(v>=0?'var(--tl)':'var(--rd)')+'">'+pc(v)+'</span>';}
function colS(v){return v==null?'—':'<span style="color:'+(v>0.15?'var(--rd)':v>0.08?'var(--yw)':'var(--gn)')+'">'+pc(v)+'</span>';}

function calcM(d){
  var sp=d.p||0,sh=d.sh||0,mc=sp*sh,ca=d.ca||0,de=d.de||0;
  var nd=de-ca,ev=mc+nd,iNC=nd<0,ncP=mc>0?Math.abs(nd)/mc:0;
  var cfo=d.cfo||0,sbc=d.sbc||0,tc=d.cx||0,mp=d.mp||50;
  var mce=tc*(mp/100),af=cfo-sbc-mce,fy2=ev>0?af/ev:0;
  var tev=af/0.10,tmc=tev-nd,tp=sh>0?tmc/sh:null,pdif=tp!=null?tp-sp:null;
  var revs=d.rev||[];var rc2=null,nyrs=0;
  if(revs.length>=2){nyrs=revs.length-1;rc2=cagr(revs[revs.length-1].v,revs[0].v,nyrs);}
  var qr=(fy2||0)+(rc2||0),gap=0.25-qr;
  var np=null,nr=null;
  if(gap>0){var nf=0.25-(rc2||0);if(nf>0){np=sh>0?(af/nf-nd)/sh:null;}nr=(0.25-fy2)*100;}
  var sbcP=(revs[0]&&revs[0].v>0)?sbc/revs[0].v:0;
  var fcfH=d.fcf||[];
  var fyArr=fcfH.map(function(x){return ev>0?x.v/ev:0;});
  var a3y=av(fyArr.slice(0,3)),a5y=av(fyArr.slice(0,5));
  var evF=af>0?ev/af:null;
  var a3f=av(fcfH.slice(0,3).map(function(x){return x.v;}));
  var a5f=av(fcfH.slice(0,5).map(function(x){return x.v;}));
  var evF3=a3f>0?ev/a3f:null,evF5=a5f>0?ev/a5f:null;
  return{sp:sp,sh:sh,mc:mc,ca:ca,de:de,nd:nd,ev:ev,iNC:iNC,ncP:ncP,cfo:cfo,sbc:sbc,tc:tc,mp:mp,mce:mce,af:af,fy2:fy2,tp:tp,pdif:pdif,rc2:rc2,nyrs:nyrs,qr:qr,gap:gap,np:np,nr:nr,sbcP:sbcP,a3y:a3y,a5y:a5y,evF:evF,evF3:evF3,evF5:evF5,a3f:a3f,a5f:a5f};
}

async function buildCo(tk){
  var[prof,cfs,bss,incs]=await Promise.all([
    fmp('profile?symbol='+tk,true),
    fmp('cash-flow-statement?symbol='+tk+'&period=annual&limit=5',true),
    fmp('balance-sheet-statement?symbol='+tk+'&period=annual&limit=5',true),
    fmp('income-statement?symbol='+tk+'&period=annual&limit=5',true)]);
  var p=(Array.isArray(prof)?prof[0]:prof)||{};
  var cfA=Array.isArray(cfs)?cfs:[];var cf0=cfA[0]||{};
  var bsA=Array.isArray(bss)?bss:[];
  var incA=Array.isArray(incs)?incs:[];
  var sec=p.sector||'';var isL=sec.match(/tech|software|communication|media/i);
  var mcap=gf(p,'marketCap','mktCap');var px=gf(p,'price');
  var capex=Math.abs(gf(cf0,'capitalExpenditure'));
  var mpct=isL?50:70;

  // Build year-indexed arrays using getYr
  var rev=[],gm=[],cfoH=[],fcfH=[],sbcH=[],soH=[],divH=[],buyH=[],mcH=[];

  incA.forEach(function(y){
    var yr=getYr(y);if(!yr)return;
    var r=gf(y,'revenue');var gp=gf(y,'grossProfit');
    rev.push({y:yr,v:+(r/1e6).toFixed(1)});
    gm.push({y:yr,v:r>0?gp/r:0});
  });
  cfA.forEach(function(y){
    var yr=getYr(y);if(!yr)return;
    var ocf=gf(y,'operatingCashFlow','netCashProvidedByOperatingActivities');
    var sbc2=gf(y,'stockBasedCompensation');
    var cx=Math.abs(gf(y,'capitalExpenditure'));
    var dp=Math.abs(gf(y,'dividendsPaid'));
    var bb=Math.abs(gf(y,'commonStockRepurchased'));
    cfoH.push({y:yr,v:+(ocf/1e6).toFixed(1)});
    fcfH.push({y:yr,v:+((ocf-sbc2-cx*(mpct/100))/1e6).toFixed(1)});
    sbcH.push({y:yr,v:+(sbc2/1e6).toFixed(1)});
    divH.push({y:yr,v:+(dp/1e6).toFixed(1)});
    buyH.push({y:yr,v:+(bb/1e6).toFixed(1)});
  });
  bsA.forEach(function(y){
    var yr=getYr(y);if(!yr)return;
    var so=gf(y,'commonStockSharesOutstanding');
    if(so===0)so=gf(y,'weightedAverageShsOut');
    soH.push({y:yr,v:+(so/1e6).toFixed(1)});
  });
  // Historical market cap from income statement (price × shares is rough, use profile for current)
  // We'll calculate from shares × approx price, or just use shares for now
  // Better: compute from EV proxy per year = not ideal, skip mcH for historical, use shares + current price as rough

  var years=rev.map(function(r){return r.y;});

  return{
    t:p.symbol||tk,n:p.companyName||tk,p:px,pd:new Date().toISOString().split('T')[0],
    sh:mcap&&px?+(mcap/px/1e6).toFixed(1):0,
    ca:+((gf(bsA[0]||{},'cashAndShortTermInvestments')||gf(bsA[0]||{},'cashAndCashEquivalents'))/1e6).toFixed(1),
    de:+((gf(bsA[0]||{},'shortTermDebt')+gf(bsA[0]||{},'longTermDebt'))/1e6).toFixed(1),
    cfo:+((gf(cf0,'operatingCashFlow','netCashProvidedByOperatingActivities'))/1e6).toFixed(1),
    sbc:+((gf(cf0,'stockBasedCompensation'))/1e6).toFixed(1),
    cx:+(capex/1e6).toFixed(1),mp:mpct,
    fy:'FY'+(getYr(cf0)||''),fyEnd:(cf0.date||'').slice(0,10),
    bsDate:(bsA[0]||{}).date||'',bsPeriod:(bsA[0]||{}).period||'annual',
    filingLink:cf0.finalLink||cf0.link||'',
    years:years,rev:rev,gm:gm,cfoH:cfoH,fcf:fcfH,sbcH:sbcH,soH:soH,divH:divH,buyH:buyH,
    sec:sec,exch:p.exchangeFullName||p.exchange||'',industry:p.industry||'',ipoDate:p.ipoDate||'',
    mcap:mcap?+(mcap/1e6).toFixed(1):0,
  };
}

var ST={d:null,co:[],indMult:15};
function gv(id){var e=document.getElementById(id);return e?parseFloat(e.value)||0:0;}
function reCalc(){var d=ST.d;if(!d)return;d.p=gv('fp');d.sh=gv('fsh');d.ca=gv('fca');d.de=gv('fde');d.cfo=gv('fcfo');d.sbc=gv('fsbc');d.cx=gv('fcx');d.mp=gv('fmp2');ST.indMult=gv('indm')||15;render();}
function mkEI(id,lb,val,unit){return'<div class="ei"><label>'+lb+'</label><div style="display:flex;align-items:center;gap:3px"><input id="'+id+'" type="number" step="any" value="'+(val||'')+'" oninput="reCalc()"/><span class="u">'+unit+'</span></div></div>';}
function mkRo(lb,val,bold,op,bt){var oH=op?'<span style="margin-right:4px;font-weight:700;font-family:var(--m);color:'+(op==='+'?'var(--bl)':'var(--rd)')+'">'+op+'</span>':'';return'<div class="rw'+(bt?' bt':'')+'"><span style="font-size:12px;color:var(--lb)">'+oH+lb+'</span><span style="font-family:var(--m);font-size:12px;color:'+(bold?'var(--br)':'#a0aab8')+';font-weight:'+(bold?700:400)+'">'+val+'</span></div>';}

async function addComps(){
  var inp=document.getElementById('ci2').value.trim();if(!inp||!ST.d)return;
  var tks=inp.split(/[,\s]+/).map(function(x){return x.trim().toUpperCase();}).filter(Boolean);
  document.getElementById('ld').style.display='block';
  try{var pd=await Promise.all(tks.map(function(x){return buildCo(x).catch(function(){return null;});}));ST.co=pd.filter(Boolean);render();}
  catch(e){document.getElementById('er').textContent=e.message;document.getElementById('er').style.display='block';}
  finally{document.getElementById('ld').style.display='none';}
}

function render(){
  var d=ST.d,co=ST.co;if(!d)return;
  var c=calcM(d);
  var qC=c.qr>=0.25?'var(--gn)':c.qr>=0.20?'var(--yw)':'var(--rd)';
  var qB=c.qr>=0.25?'#052e1688':c.qr>=0.20?'#42200688':'#450a0a88';
  var qL=c.qr>=0.25?'Ready to Invest':c.qr>=0.20?'Watchlist':'Below Threshold';
  var all=[d].concat(co);
  var cms=all.map(function(x){var m=calcM(x);return{t:x.t,mc:m.mc,ev:m.ev,iNC:m.iNC,ncP:m.ncP,af:m.af,fy2:m.fy2,rc2:m.rc2,qr:m.qr,sbcP:m.sbcP,evF:m.evF};});
  var years=d.years||[];
  // Helper to get value by index (positional, not lookup)
  function vi(arr,i){return arr&&arr[i]!=null?arr[i].v:null;}

  var h='';
  // Header
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;background:var(--cd);border-radius:8px;padding:14px 16px;border:1px solid var(--bd);margin-bottom:12px"><div><div style="font-size:18px;font-weight:800;color:var(--br)">'+d.n+'</div><div style="font-size:11px;color:var(--dm)">'+d.t+' · '+d.exch+' · '+d.sec+' · '+d.industry+'</div></div><div style="text-align:right"><div style="font-size:24px;font-weight:800;font-family:var(--m);color:var(--bl)">'+pr(d.p)+'</div><div style="font-size:10px;color:var(--dm)">'+d.pd+'</div></div></div>';

  // Quality
  h+='<div style="background:'+qB+';border-radius:8px;padding:14px 16px;margin-bottom:12px;border:1px solid '+qC+'33"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--lb)">Quality Ratio</div><div style="font-size:28px;font-weight:800;font-family:var(--m);color:var(--br)">'+pc(c.qr)+'</div><div style="font-size:10px;color:var(--lb)">FCF/EV '+pc(c.fy2)+' + Rev CAGR '+pc(c.rc2)+'</div></div><span class="bg" style="background:'+qC+'22;color:'+qC+'">'+qL+'</span></div></div>';

  // MktCap→EV
  h+='<div class="card"><div class="ci"><div class="cm"><div class="ct" style="color:var(--bl)">Market Cap → Enterprise Value</div>'+mkEI('fp','Stock Price',d.p,'USD')+mkEI('fsh','Shares Out.',d.sh,'M')+mkRo('Market Cap',$(c.mc),1,null,1)+mkEI('fca','Cash & Equiv.',d.ca,'$M')+mkEI('fde','Total Debt',d.de,'$M')+mkRo('Enterprise Value',$(c.ev),1,null,1)+'<div style="margin-top:6px;padding:6px 8px;border-radius:4px;background:'+(c.iNC?'#052e1644':'#450a0a44')+';border:1px solid '+(c.iNC?'#22c55e':'#ef4444')+'22;display:flex;justify-content:space-between;font-size:11px"><span style="color:'+(c.iNC?'#86efac':'#fca5a5')+'">'+(c.iNC?'✦ Net Cash':'⚠ Net Debt')+'</span><span style="font-family:var(--m);color:'+(c.iNC?'#86efac':'#fca5a5')+';font-weight:600">'+$(Math.abs(c.nd))+' ('+pc(c.ncP)+' MCap)</span></div></div><div class="cs"><b class="s">Filing:</b> 10-K ('+d.fy+', '+d.fyEnd+')'+(d.filingLink?'<br><a href="'+d.filingLink+'" target="_blank" style="color:var(--bl);font-size:9px">View Filing →</a>':'')+'<br><b class="s">Price:</b> '+d.pd+'<br><b class="s">BS:</b> '+d.bsDate+'</div></div></div>';

  // Adj FCF
  h+='<div class="card"><div class="ci"><div class="cm"><div class="ct" style="color:var(--pu)">Adjusted FCF ('+d.fy+')</div>'+mkEI('fcfo','CFO',d.cfo,'$M')+mkEI('fsbc','Stock-Based Comp',d.sbc,'$M')+mkEI('fcx','Total CapEx',d.cx,'$M')+mkEI('fmp2','Maint CapEx %',d.mp,'%')+mkRo('Maint CapEx ('+c.mp+'% × '+$(c.tc)+')',$(c.mce),0,'−')+mkRo('Adjusted FCF',$(c.af),1,null,1)+'</div><div class="cs"><b class="s">Filing:</b> 10-K cash flow stmt<br><b class="s">Maint CapEx:</b> '+c.mp+'% of total. D&A floor. 40–60% SW, 60–80% ind, 80%+ util.</div></div></div>';

  // FCF/EV
  h+='<div class="card"><div class="ci"><div class="cm"><div class="ct" style="color:var(--pu)">Adjusted FCF / EV Yield</div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:22px;font-weight:800;font-family:var(--m);color:'+(c.fy2>=0.10?'var(--gn)':'var(--rd)')+'">'+pc(c.fy2)+'</span><span class="bg" style="background:'+(c.fy2>=0.10?'#052e1688':'#450a0a88')+';color:'+(c.fy2>=0.10?'var(--gn)':'var(--rd)')+'">'+(c.fy2>=0.10?'≥10%':'<10%')+'</span></div>';
  h+='<div style="font-size:11px;color:var(--lb);margin-bottom:6px">'+$(c.af)+' ÷ '+$(c.ev)+' = '+pc(c.fy2)+'</div>';
  h+='<div style="display:flex;gap:14px;margin-bottom:6px;font-size:11px"><div><span style="color:var(--dm)">3Y Avg:</span> <span style="font-family:var(--m);font-weight:600">'+pc(c.a3y)+'</span></div><div><span style="color:var(--dm)">5Y Avg:</span> <span style="font-family:var(--m);font-weight:600">'+pc(c.a5y)+'</span></div></div>';
  if(c.tp!=null)h+='<div class="mc"><div style="font-size:10px;color:var(--dm);margin-bottom:3px">Price for 10% yield:</div><span style="font-size:16px;font-weight:700;font-family:var(--m);color:var(--pu)">'+pr(c.tp)+'</span><span style="font-size:12px;font-family:var(--m);color:'+(c.pdif>=0?'var(--rd)':'var(--gn)')+';margin-left:6px">'+(c.pdif>=0?'▲':'▼')+' '+pr(Math.abs(c.pdif))+' ('+((c.pdif/c.sp)*100).toFixed(1)+'%)</span></div>';
  h+='</div><div class="cs">≥10% strong. 3Y/5Y avg smooths cycles.</div></div></div>';

  // ──── FINANCIALS TABLE ────
  h+='<div class="card"><div class="ci"><div class="cm"><div class="ct" style="color:var(--tl)">Financial Summary — '+d.t+'</div>';
  h+='<div style="overflow-x:auto"><table class="t"><thead><tr><th></th>';
  years.forEach(function(y){h+='<th>'+y+'</th>';});
  h+='<th>Avg</th><th>CAGR</th></tr></thead><tbody>';

  function row(label,arr,bold,yoy,doCagr){
    var vals=arr.map(function(x){return x.v;});
    h+='<tr><td'+(bold?' style="color:var(--bl);font-weight:600"':'')+'>'+label+'</td>';
    vals.forEach(function(v){h+='<td'+(bold?' style="font-weight:600"':'')+'>'+$(v)+'</td>';});
    var a=av(vals);h+='<td style="font-weight:600">'+$(a)+'</td>';
    if(doCagr&&vals.length>=2){var vf=vals.filter(function(x){return x>0;});h+='<td style="color:var(--tl);font-weight:600">'+(vf.length>=2?pc(cagr(vf[vf.length-1],vf[0],vf.length-1)):'—')+'</td>';}else h+='<td></td>';
    h+='</tr>';
    if(yoy){h+='<tr class="yoy"><td>YoY</td>';vals.forEach(function(v,i){h+='<td>'+(i<vals.length-1&&vals[i+1]>0?colG(v/vals[i+1]-1):'—')+'</td>';});h+='<td></td><td></td></tr>';}
  }

  function pctRow(label,numArr,denArr,colorFn){
    var vals=numArr.map(function(x,i){var d2=denArr[i];return(x&&d2&&d2.v>0)?x.v/d2.v:null;});
    h+='<tr><td>'+label+'</td>';
    vals.forEach(function(v){h+='<td>'+(colorFn?colorFn(v):pc(v))+'</td>';});
    h+='<td>'+(colorFn?colorFn(av(vals)):pc(av(vals)))+'</td><td></td></tr>';
  }

  if(d.rev.length)row('Revenue',d.rev,true,true,true);
  // Fix: gm values are already ratios, display directly
  if(d.gm.length){
    h+='<tr><td>Gross Margin</td>';d.gm.forEach(function(x){h+='<td>'+pc(x.v)+'</td>';});
    h+='<td>'+pc(av(d.gm.map(function(x){return x.v;})))+'</td><td></td></tr>';
    // Remove the pctRow we just added - actually let me just not call pctRow above
  }
  // Oops, I called both. Let me restructure. Actually the pctRow will produce wrong output since gm is already a pct. Let me just remove the pctRow call and keep the manual one. But I already wrote both... Let me just fix by only using manual rows.
  // I'll clean this up - delete the gm pctRow line above and keep the manual block.

  if(d.cfoH.length)row('CFO',d.cfoH,false,true,true);
  if(d.fcf.length)row('Adj FCF',d.fcf,true,true,true);
  if(d.sbcH.length)row('SBC',d.sbcH,false,false,false);
  if(d.sbcH.length&&d.rev.length){
    h+='<tr><td>SBC / Rev</td>';
    var sbcPcts=[];
    d.sbcH.forEach(function(x,i){var rv=d.rev[i];var p2=(rv&&rv.v>0)?x.v/rv.v:null;sbcPcts.push(p2);h+='<td>'+colS(p2)+'</td>';});
    h+='<td>'+colS(av(sbcPcts))+'</td><td></td></tr>';
  }

  // Shares outstanding
  if(d.soH.length){
    h+='<tr><td>Shares Out. (M)</td>';
    var soVals=d.soH.map(function(x){return x.v;});
    soVals.forEach(function(v){h+='<td>'+$n(v)+'</td>';});
    h+='<td>'+$n(av(soVals))+'</td>';
    if(soVals.length>=2){var sc=cagr(soVals[soVals.length-1],soVals[0],soVals.length-1);h+='<td style="color:'+(sc<0?'var(--rd)':'var(--tl)')+'">'+pc(sc)+'</td>';}else h+='<td></td>';
    h+='</tr>';
    h+='<tr class="yoy"><td>YoY</td>';soVals.forEach(function(v,i){h+='<td>'+(i<soVals.length-1&&soVals[i+1]>0?colG(v/soVals[i+1]-1):'—')+'</td>';});h+='<td></td><td></td></tr>';
  }

  // Market Cap (historical approx: shares × current price is wrong, use shares from each year × ???)
  // Better: just show from profile for current, note it's approximate for historical
  // Actually FMP income stmt has weightedAverageShsOut and we can multiply by... we don't have historical prices.
  // Skip historical mcap for now, just show current.

  // Dividends
  if(d.divH.length&&d.divH.some(function(x){return x.v>0;})){
    row('Dividends Paid',d.divH,false,false,false);
    // Div yield: div / (shares that year × current price) as rough proxy
    h+='<tr><td>Div Yield (est.)</td>';
    d.divH.forEach(function(x,i){
      var so2=d.soH[i]?d.soH[i].v:null;
      var mc2=so2?so2*d.p:null;// rough: use current price × that year's shares
      var dy=mc2>0?x.v/mc2:null;
      h+='<td>'+(dy!=null?pc(dy):'—')+'</td>';
    });
    h+='<td></td><td></td></tr>';
  }

  // Buybacks
  if(d.buyH.length&&d.buyH.some(function(x){return x.v>0;}))row('Share Buybacks',d.buyH,false,false,false);

  h+='</tbody></table></div>';
  h+='</div><div class="cs"><b class="s">Filing:</b> 10-K (income stmt, cash flow stmt, balance sheet)<br><br><b class="s">Shares CAGR:</b> Positive = growing (dilution). Negative = shrinking (buybacks).<br><br><b class="s">SBC/Rev:</b><br>🟢 &lt;8% minimal<br>🟡 8–15% moderate<br>🔴 &gt;15% heavy<br>S&P 500 ~2–3%</div></div></div>';

  // ──── COMPETITIVE LANDSCAPE ────
  if(co.length>0){
    var crs=[{l:'Market Cap',f:function(m){return $(m.mc)}},{l:'Enterprise Value',f:function(m){return $(m.ev)}},{l:'Net Cash/Debt %',f:function(m){return(m.iNC?'':'-')+pc(m.ncP)}},{l:'Adj FCF',f:function(m){return $(m.af)}},{l:'FCF/EV',f:function(m){return pc(m.fy2)}},{l:'Rev CAGR',f:function(m){return pc(m.rc2)}},{l:'SBC/Rev',f:function(m){return colS(m.sbcP)}},{l:'EV/FCF',f:function(m){return m.evF?fx(m.evF):'—'}},{l:'Quality',f:function(m){return pc(m.qr)}}];
    var ths='<th></th>';cms.forEach(function(m,i){ths+='<th style="color:'+(i===0?'var(--bl)':'var(--lb)')+'">'+m.t+'</th>';});
    var trs='';crs.forEach(function(r){var td='<td>'+r.l+'</td>';cms.forEach(function(m,j){var v=r.f(m);var isQ=r.l==='Quality';var qc2=isQ?(m.qr>=0.25?'var(--gn)':m.qr>=0.20?'var(--yw)':'var(--rd)'):null;td+='<td style="color:'+(qc2||(j===0?'#e0e7f0':'#a0aab8'))+';font-weight:'+(j===0?600:400)+'">'+v+'</td>';});trs+='<tr>'+td+'</tr>';});

    h+='<div class="card"><div class="ci"><div class="cm"><div class="ct" style="color:var(--yw)">Competitive Landscape</div>';
    // Narrative
    var bQ=cms.reduce(function(a,b){return a.qr>b.qr?a:b;});
    var bY=cms.reduce(function(a,b){return a.fy2>b.fy2?a:b;});
    var bG=cms.reduce(function(a,b){return(a.rc2||0)>(b.rc2||0)?a:b;});
    var pam=av(co.map(function(x){return calcM(x).evF;}).filter(function(x){return x!=null;}));
    h+='<div style="font-size:11px;color:var(--lb);margin-bottom:10px;padding:8px 10px;background:#0a0e18;border-radius:5px;border:1px solid var(--bd);line-height:1.6">';
    h+='<b style="color:var(--br)">'+d.industry+' — '+d.sec+'</b><br>';
    h+=d.t+' at '+fx(c.evF)+' EV/FCF'+(pam?' vs peer avg '+fx(pam):'')+'. ';
    h+='Best quality: <span style="color:var(--tl)">'+bQ.t+' '+pc(bQ.qr)+'</span>. ';
    h+='Best yield: <span style="color:var(--tl)">'+bY.t+' '+pc(bY.fy2)+'</span>. ';
    h+='Fastest growth: <span style="color:var(--tl)">'+bG.t+' '+pc(bG.rc2)+'</span>.';
    h+='</div>';
    h+='<div style="overflow-x:auto"><table class="t"><thead><tr>'+ths+'</tr></thead><tbody>'+trs+'</tbody></table></div>';

    // Revenue comp
    h+='<div style="font-size:9px;font-weight:700;letter-spacing:1px;color:var(--dm);text-transform:uppercase;margin:10px 0 4px">Revenue</div><table class="t"><thead><tr><th></th>';
    years.forEach(function(y){h+='<th>'+y+'</th>';});h+='<th>CAGR</th></tr></thead><tbody>';
    all.forEach(function(x,xi){h+='<tr><td style="color:'+(xi===0?'var(--bl)':'')+'">'+x.t+'</td>';
      years.forEach(function(y,yi){var found=(x.rev||[])[yi];h+='<td>'+(found?$(found.v):'—')+'</td>';});
      var vals=x.rev||[];if(vals.length>=2){h+='<td style="color:var(--tl)">'+pc(cagr(vals[vals.length-1].v,vals[0].v,vals.length-1))+'</td>';}else h+='<td>—</td>';h+='</tr>';});
    h+='</tbody></table>';

    // FCF comp
    h+='<div style="font-size:9px;font-weight:700;letter-spacing:1px;color:var(--dm);text-transform:uppercase;margin:10px 0 4px">Adj FCF</div><table class="t"><thead><tr><th></th>';
    years.forEach(function(y){h+='<th>'+y+'</th>';});h+='<th>CAGR</th></tr></thead><tbody>';
    all.forEach(function(x,xi){h+='<tr><td style="color:'+(xi===0?'var(--bl)':'')+'">'+x.t+'</td>';
      years.forEach(function(y,yi){var found=(x.fcf||[])[yi];h+='<td>'+(found?$(found.v):'—')+'</td>';});
      var vals=x.fcf||[];if(vals.length>=2){var vf=vals.filter(function(a){return a.v>0;});h+='<td style="color:var(--tl)">'+(vf.length>=2?pc(cagr(vf[vf.length-1].v,vf[0].v,vf.length-1)):'—')+'</td>';}else h+='<td>—</td>';h+='</tr>';});
    h+='</tbody></table>';

    // SBC/Rev comp
    h+='<div style="font-size:9px;font-weight:700;letter-spacing:1px;color:var(--dm);text-transform:uppercase;margin:10px 0 4px">SBC / Revenue</div><table class="t"><thead><tr><th></th>';
    years.forEach(function(y){h+='<th>'+y+'</th>';});h+='<th>Avg</th></tr></thead><tbody>';
    all.forEach(function(x,xi){var pcts=[];h+='<tr><td style="color:'+(xi===0?'var(--bl)':'')+'">'+x.t+'</td>';
      (x.sbcH||[]).forEach(function(s,i){var rv=(x.rev||[])[i];var p3=(rv&&rv.v>0)?s.v/rv.v:null;pcts.push(p3);h+='<td>'+colS(p3)+'</td>';});
      // Pad if fewer years
      for(var pad=x.sbcH?x.sbcH.length:0;pad<years.length;pad++)h+='<td>—</td>';
      h+='<td>'+colS(av(pcts))+'</td></tr>';});
    h+='<tr><td>S&P 500</td>';years.forEach(function(){h+='<td style="color:var(--dm)">~2-3%</td>';});h+='<td style="color:var(--dm)">~2-3%</td></tr>';
    h+='</tbody></table>';

    h+='</div><div class="cs"><b class="s">Peers:</b> Auto or manually entered<br><br><b class="s">SBC/Rev:</b><br>🟢 &lt;8%<br>🟡 8–15%<br>🔴 &gt;15%</div></div></div>';
  }else{
    h+='<div style="background:var(--cd);border-radius:8px;border:1px solid var(--bd);padding:14px 16px;margin-bottom:12px;text-align:center"><div style="font-size:11px;color:var(--dm)">Add competitors above to see Competitive Landscape</div></div>';
  }

  // ──── PATH + UPSIDE ────
  h+='<div class="card"><div class="ci"><div class="cm"><div class="ct" style="color:var(--yw)">Path to 25% + Valuation Upside</div>';
  if(c.gap<=0)h+='<div style="color:var(--gn);font-size:12px;margin-bottom:10px">✦ Meets 25%.</div>';
  else{var pb=c.np!=null&&c.np>0?'<div style="font-size:16px;font-weight:800;font-family:var(--m);color:var(--yw)">'+pr(c.np)+'</div><div style="font-size:10px;color:var(--dm)">'+((c.np-c.sp)/c.sp*100).toFixed(1)+'% from current</div>':'<div style="font-size:10px;color:var(--dm)">Not via price alone</div>';
    h+='<div style="font-size:11px;color:var(--lb);margin-bottom:8px">Gap: <span style="color:var(--yw);font-weight:700;font-family:var(--m)">'+(c.gap*100).toFixed(1)+'pp</span></div><div class="g2" style="margin-bottom:12px"><div class="mc"><div style="font-size:9px;font-weight:700;letter-spacing:1px;color:var(--dm);text-transform:uppercase;margin-bottom:4px">Via Price</div>'+pb+'</div><div class="mc"><div style="font-size:9px;font-weight:700;letter-spacing:1px;color:var(--dm);text-transform:uppercase;margin-bottom:4px">Via Growth</div><div style="font-size:16px;font-weight:800;font-family:var(--m);color:var(--yw)">'+(c.nr!=null?c.nr.toFixed(1):'—')+'%</div><div style="font-size:10px;color:var(--dm)">vs '+((c.rc2||0)*100).toFixed(1)+'%</div></div></div>';}
  h+='<div style="border-top:1px solid #1e2a3a;padding-top:10px"><div style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--pu);margin-bottom:6px">Valuation Multiples</div>';
  h+='<table class="t"><thead><tr><th>EV/FCF</th><th>Current</th><th>3Y Avg</th><th>5Y Avg</th>';
  if(co.length>0)h+='<th>Peer Avg</th>';
  h+='<th>Industry</th></tr></thead><tbody><tr><td>Multiple</td><td style="font-weight:600;color:var(--br)">'+fx(c.evF)+'</td><td>'+fx(c.evF3)+'</td><td>'+fx(c.evF5)+'</td>';
  if(co.length>0){h+='<td>'+fx(av(co.map(function(x){return calcM(x).evF;}).filter(Boolean)))+'</td>';}
  h+='<td><input id="indm" type="number" step="any" value="'+ST.indMult+'" oninput="reCalc()" style="width:45px;background:var(--ib);border:1px solid var(--ibd);border-radius:3px;padding:2px 3px;color:#e0e7f0;font-size:10px;font-family:var(--m);outline:none;text-align:right"/>x</td></tr></tbody></table>';
  var indM=ST.indMult||15;var cM=c.evF5||c.evF3||c.evF;
  if(cM&&cM>0&&indM>0){
    var uF=c.a5f||c.a3f||c.af;var fEV=uF*indM;var fMC=fEV-c.nd;
    var fP=c.sh>0?fMC/c.sh:null;var up=fP?((fP/c.sp)-1):null;
    var ry=gv('ryr')||5;var aR=up!=null?Math.pow(1+up,1/ry)-1:null;
    var tR=aR!=null?(aR+(c.fy2||0)):null;
    h+='<div style="margin-top:8px;padding:8px 10px;background:#0a0e18;border-radius:5px;border:1px solid var(--bd)">';
    h+='<div style="font-size:10px;color:var(--dm)">Re-rate to '+fx(indM)+' over <input id="ryr" type="number" step="1" value="'+ry+'" oninput="reCalc()" style="width:28px;background:var(--ib);border:1px solid var(--ibd);border-radius:3px;padding:1px 3px;color:#e0e7f0;font-size:10px;font-family:var(--m);outline:none;text-align:center"/>yr using '+(c.a5f?'5Y':'3Y')+' avg FCF ('+$(uF)+'):</div>';
    h+='<div style="display:flex;gap:14px;margin-top:4px;font-size:11px;flex-wrap:wrap">';
    h+='<div><span style="color:var(--dm)">Fair:</span> <span style="font-family:var(--m);font-weight:700;color:var(--br)">'+(fP?pr(fP):'—')+'</span></div>';
    h+='<div><span style="color:var(--dm)">Upside:</span> <span style="font-family:var(--m);font-weight:700;color:'+(up>=0?'var(--gn)':'var(--rd)')+'">'+pc(up)+'</span></div>';
    h+='<div><span style="color:var(--dm)">Ann. rerate:</span> <span style="font-family:var(--m);font-weight:700;color:var(--pu)">'+pc(aR)+'</span></div></div>';
    h+='<div style="margin-top:6px;font-size:11px;color:var(--lb)">Total return (rerate+yield): <span style="font-family:var(--m);font-weight:700;font-size:13px;color:'+(tR>=0.15?'var(--gn)':tR>=0.10?'var(--yw)':'var(--rd)')+'">'+pc(tR)+'</span></div></div>';}
  h+='</div></div><div class="cs"><b class="s">EV/FCF:</b> Lower = cheaper<br><b class="s">Industry:</b> Editable<br><b class="s">Total = rerate + yield</b></div></div></div>';

  h+='<div style="font-size:10px;color:#2a3040;line-height:1.5;padding-top:8px;border-top:1px solid var(--bd)">Adj. FCF = CFO − SBC − Maint CapEx · EV = MCap + Net Debt · Quality = FCF/EV + Rev CAGR · ≥25% 🟢 · 20–25% 🟡 · &lt;20% 🔴 · Source: FMP (SEC 10-K)</div>';
  document.getElementById('out').innerHTML=h;
}

document.getElementById('qi').addEventListener('keydown',function(e){if(e.key==='Enter')go();});
document.getElementById('ci2').addEventListener('keydown',function(e){if(e.key==='Enter')addComps();});
async function go(){
  var t=document.getElementById('qi').value.trim().toUpperCase();if(!t)return;
  document.getElementById('gb').disabled=true;document.getElementById('gb').textContent='…';
  document.getElementById('ld').style.display='block';document.getElementById('er').style.display='none';
  document.getElementById('out').innerHTML='';document.getElementById('es').style.display='none';
  try{
    var main=await buildCo(t);ST.d=main;ST.co=[];
    var peers=await fmp('stock-peers?symbol='+t).catch(function(){return null;});
    if(peers){var pA=Array.isArray(peers)?peers:[peers];var pL=((pA[0]||{}).peersList||[]).slice(0,3);
      if(pL.length>0){var pd=await Promise.all(pL.map(function(x){return buildCo(x).catch(function(){return null;});}));ST.co=pd.filter(Boolean);}}
    render();
    if(!ST.co.length)document.getElementById('ci2').placeholder='No auto peers — type tickers e.g. MSFT, GOOG';
  }catch(e){document.getElementById('er').textContent=e.message;document.getElementById('er').style.display='block';
  }finally{document.getElementById('ld').style.display='none';document.getElementById('gb').disabled=false;document.getElementById('gb').textContent='Analyze';}
}
</script>
