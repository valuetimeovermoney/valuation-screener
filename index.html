<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Valuation Screener</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#090c14;--cd:#0f1320;--bd:#1a2234;--ib:#141a28;--ibd:#232d3f;--dm:#4a5568;--lb:#7a8494;--br:#f0f4f8;--bl:#38bdf8;--pu:#818cf8;--gn:#22c55e;--rd:#ef4444;--yw:#eab308;--tl:#34d399;--f:'DM Sans',system-ui,sans-serif;--m:'JetBrains Mono',monospace}
body.light{--bg:#f8fafc;--cd:#ffffff;--bd:#e2e8f0;--ib:#f0f4f8;--ibd:#dbeafe;--dm:#64748b;--lb:#475569;--br:#0f172a;--bl:#0284c7;--pu:#6366f1;--gn:#16a34a;--rd:#dc2626;--yw:#ca8a04;--tl:#0d9488}
*{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;background:var(--bg);font-family:var(--f);color:#c8d0dc;transition:background .3s}
body.light{color:#1e293b}
.w{max-width:980px;margin:0 auto;padding:24px 16px}
h1{font-size:20px;font-weight:800;color:var(--br);margin:2px 0 0}
.sb{display:flex;gap:6px;margin-bottom:10px;background:var(--cd);border-radius:8px;padding:5px;border:1px solid var(--bd)}
.sb input{flex:1;background:0 0;border:none;outline:none;color:var(--br);font-size:14px;padding:8px 10px;font-family:var(--f)}
.sb button{background:linear-gradient(135deg,var(--bl),var(--pu));border:none;border-radius:6px;padding:8px 20px;color:#fff;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap}
.sb button:disabled{background:var(--bd);cursor:wait}
.cb{display:flex;gap:6px;margin-bottom:20px;align-items:center}
.cb label{font-size:11px;color:var(--lb);white-space:nowrap}
.cb input{width:180px;background:var(--ib);border:1px solid var(--ibd);border-radius:6px;padding:6px 10px;color:var(--br);font-size:12px;font-family:var(--m);outline:none}
.cb button{background:var(--bd);border:none;border-radius:6px;padding:6px 14px;color:var(--lb);font-weight:600;font-size:12px;cursor:pointer;font-family:var(--f)}
.card{background:var(--cd);border-radius:8px;border:1px solid var(--bd);margin-bottom:12px;overflow:hidden}
.ci{display:flex;padding:12px 16px}.cm{flex:1;min-width:0}
.cs{width:230px;flex-shrink:0;padding-left:14px;border-left:1px solid var(--bd);margin-left:12px;font-size:10px;color:var(--dm);line-height:1.5}
.ct{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.rw{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0}
.bt{border-top:1px solid #1e2a3a}
.ei{display:flex;align-items:center;justify-content:space-between;padding:3px 0}
.ei label{font-size:12px;color:var(--lb)}.ei input{width:100px;background:var(--ib);border:1px solid var(--ibd);border-radius:4px;padding:3px 6px;color:#e0e7f0;font-size:12px;font-family:var(--m);outline:none;text-align:right}
.ei .u{font-size:10px;color:var(--dm);width:28px;margin-left:3px}
.bg{padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;display:inline-block}
.sp{width:28px;height:28px;border:3px solid var(--bd);border-top-color:var(--bl);border-radius:50%;margin:0 auto 12px;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
table.t{width:100%;border-collapse:collapse;font-size:10px}
table.t th{text-align:right;padding:3px 5px;font-weight:700;font-family:var(--m);font-size:10px;border-bottom:1px solid #1e2a3a;color:var(--lb);white-space:nowrap}
table.t th:first-child{text-align:left}
table.t td{text-align:right;padding:3px 5px;font-family:var(--m);font-size:10px;border-bottom:1px solid #131a28;color:#a0aab8;white-space:nowrap}
table.t td:first-child{text-align:left;font-family:var(--f);color:var(--lb)}
table.t tr.yoy td{font-size:9px;color:var(--dm);border-bottom:1px solid #0d1220}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.mc{background:#0a0e18;border-radius:5px;padding:10px 12px;border:1px solid var(--bd)}
.val-box{background:#0a0e18;border-radius:5px;padding:10px;border:1px solid #232d3f;text-align:center}
.val-label{font-size:9px;color:var(--dm);font-weight:600;text-transform:uppercase;margin-bottom:4px}
.val-num{font-size:16px;font-weight:800;font-family:var(--m);color:var(--bl);margin-bottom:2px}
.val-note{font-size:9px;color:var(--dm)}
.tog{display:inline-block;padding:4px 10px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--ib);color:var(--lb);margin:2px}
.tog.on{background:var(--bl)22;color:var(--bl);border-color:var(--bl)44}
b.s{color:var(--lb)}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.val-box{background:#0a0e18;border-radius:5px;padding:10px;border:1px solid #232d3f;text-align:center}
.val-label{font-size:9px;color:var(--dm);font-weight:600;text-transform:uppercase;margin-bottom:4px}
.val-num{font-size:16px;font-weight:800;font-family:var(--m);color:var(--bl);margin-bottom:2px}
.val-note{font-size:9px;color:var(--dm)}
@media(max-width:640px){.cs{display:none}.ci{padding:10px 12px}}

.chart-svg{overflow:visible}
.chart-label{font-size:9px;font-family:var(--m);fill:var(--lb)}
.chart-title{font-size:9px;font-weight:700;fill:var(--dm);text-transform:uppercase;letter-spacing:1px}
</style>
</head>
<body>
<div class="w">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><div><div style="font-size:9px;font-weight:800;letter-spacing:3px;color:var(--bl)">VALUATION SCREENER</div><h1>Company Analysis</h1></div><button id="thbtn" onclick="toggleTheme()" style="padding:6px 14px;border-radius:6px;border:1px solid var(--bd);background:var(--ib);color:var(--lb);font-size:11px;cursor:pointer;font-weight:600">Day Mode</button></div>
  <div class="sb"><input id="qi" placeholder="Ticker (e.g. AAPL, MSFT, GOOG)"/><button id="gb" onclick="go()">Analyze</button></div>
  <div class="cb"><label>Competitors:</label><input id="ci2" placeholder="e.g. MSFT, GOOG, META"/><button onclick="addComps()">Load Comps</button></div>
  <div id="ld" style="display:none;text-align:center;padding:50px 0;color:var(--dm)"><div class="sp"></div><div>Fetching…</div></div>
  <div id="er" style="display:none;background:#450a0a;border:1px solid #dc2626;border-radius:6px;padding:12px;color:#fca5a5;font-size:13px;margin-bottom:16px"></div>
  <div id="out"></div>
  <div id="es" style="text-align:center;padding:60px 20px;color:#1e2a3a"><div style="font-size:36px;margin-bottom:10px">⬡</div><div style="font-size:13px;color:var(--dm)">Enter a ticker to auto-populate</div></div>
</div>
<script>
var AK='zT4AbJZ4WU2SMLjcOQ98PMqIa3NErK3J',BASE='https://financialmodelingprep.com/stable/';
async function fmp(ep,req){var u=BASE+ep+(ep.includes('?')?'&':'?')+'apikey='+AK;var r=await fetch(u);if(r.status===402||r.status===403){if(req)throw new Error('FMP '+r.status);return null;}if(!r.ok)throw new Error('FMP '+r.status);return r.json();}

function getYr(o){return o.calendarYear?''+o.calendarYear:o.date?o.date.substring(0,4):'';}
function cm(x){return(''+x).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function D(n){if(n==null||isNaN(n))return'—';var a=Math.abs(n),s=n<0?'-':'';if(a>=1000000)return s+'$'+cm((a/1000000).toFixed(2))+'T';if(a>=1000)return s+'$'+cm((a/1000).toFixed(1))+'B';if(a>=1)return s+'$'+cm(Math.round(a))+'M';return s+'$'+a.toFixed(1)+'M';}
function SH(n){if(n==null||isNaN(n)||n===0)return'—';var a=Math.abs(n);if(a>=1000)return cm((a/1000).toFixed(2))+'B';return cm(Math.round(a))+'M';}
function pc(n){return n==null||isNaN(n)?'—':(n*100).toFixed(1)+'%';}
function pr(n){return n==null||isNaN(n)?'—':'$'+cm(n.toFixed(2));}
function fx(n){return n==null||isNaN(n)?'—':n.toFixed(1)+'x';}
function gf(o){for(var i=1;i<arguments.length;i++){if(o[arguments[i]]!=null)return o[arguments[i]];}return 0;}
function yrOf(o){var y=o.calendarYear?''+o.calendarYear:'';if(y&&y!='0')return y;if(o.date&&o.date.length>=4)return o.date.substring(0,4);return '';}
function av(a){var v=a.filter(function(x){return x!=null&&!isNaN(x);});return v.length?v.reduce(function(s,x){return s+x;},0)/v.length:null;}
function cagr(s,e,y){return(s>0&&e>0&&y>0)?Math.pow(e/s,1/y)-1:null;}
function colG(v){return v==null?'—':'<span style="color:'+(v>=0?'var(--tl)':'var(--rd)')+'">'+pc(v)+'</span>';}
function colS(v){return v==null?'—':'<span style="color:'+(v>0.15?'var(--rd)':v>0.08?'var(--yw)':'var(--gn)')+'">'+pc(v)+'</span>';}
function lk(arr,yr,f){var x=(arr||[]).find(function(a){return a.y===yr;});return x?(x[f||'v']):null;}

function calcM(d){
  var sp=d.p||0,sh=d.sh||0,mc=sp*sh,ca=d.ca||0,de=d.de||0;
  var nd=de-ca,ev=mc+nd,iNC=nd<0,ncP=mc>0?Math.abs(nd)/mc:0;
  var cfo=d.cfo||0,sbc=d.sbc||0,tc=d.cx||0,mp=d.mp||50;
  var mce=tc*(mp/100),af=cfo-sbc-mce,fy=ev>0?af/ev:0;
  var tev=af/0.10,tmc=tev-nd,tp=sh>0?tmc/sh:null,pdif=tp!=null?tp-sp:null;
  var revs=d.rev||[];var rc=null,ny=0;
  if(revs.length>=2){ny=revs.length-1;rc=cagr(revs[revs.length-1].v,revs[0].v,ny);}
  var qr=(fy||0)+(rc||0),gap=0.25-qr;
  var np=null,nr=null;
  if(gap>0){var nf=0.25-(rc||0);if(nf>0)np=sh>0?(af/nf-nd)/sh:null;nr=(0.25-fy)*100;}
  var sbcP=(revs[0]&&revs[0].v>0)?sbc/revs[0].v:0;
  var fh=d.fcf||[];
  var fya=fh.map(function(x){return ev>0?x.v/ev:0;});
  var a3y=av(fya.slice(0,3)),a5y=av(fya.slice(0,5));
  var evF=af>0?ev/af:null;
  var a3f=av(fh.slice(0,3).map(function(x){return x.v;}));
  var a5f=av(fh.slice(0,5).map(function(x){return x.v;}));
  var evF3=a3f>0?ev/a3f:null,evF5=a5f>0?ev/a5f:null;
  return{sp:sp,sh:sh,mc:mc,ca:ca,de:de,nd:nd,ev:ev,iNC:iNC,ncP:ncP,cfo:cfo,sbc:sbc,tc:tc,mp:mp,mce:mce,af:af,fy:fy,tp:tp,pdif:pdif,rc:rc,ny:ny,qr:qr,gap:gap,np:np,nr:nr,sbcP:sbcP,a3y:a3y,a5y:a5y,evF:evF,evF3:evF3,evF5:evF5,a3f:a3f,a5f:a5f};
}

async function buildCo(tk){
  var[prof,cfs,bss,incs,mcapHist]=await Promise.all([
    fmp('profile?symbol='+tk,true),fmp('cash-flow-statement?symbol='+tk+'&period=annual&limit=5',true),
    fmp('balance-sheet-statement?symbol='+tk+'&period=annual&limit=5',true),
    fmp('income-statement?symbol='+tk+'&period=annual&limit=5',true),
    fmp('historical-market-capitalization?symbol='+tk+'&limit=2000').catch(function(){return null;})]);
  var p=(Array.isArray(prof)?prof[0]:prof)||{};
  var cfA=Array.isArray(cfs)?cfs:[];var cf0=cfA[0]||{};
  var bsA=Array.isArray(bss)?bss:[];var bs0=bsA[0]||{};
  var incA=Array.isArray(incs)?incs:[];
  var sec=p.sector||'';var isL=sec.match(/tech|software|communication|media/i);
  var mcap=gf(p,'marketCap','mktCap');var px=gf(p,'price');
  var capex=Math.abs(gf(cf0,'capitalExpenditure'));var mpct=isL?50:70;

  var years=incA.map(function(y){return getYr(y);}).filter(Boolean);
  var rev=incA.filter(Boolean).slice(0,5).map(function(y){return{y:yrOf(y),r:+((gf(y,'revenue'))/1e6).toFixed(1)};});
  var gm=incA.filter(Boolean).slice(0,5).map(function(y){var r=gf(y,'revenue');var gp=gf(y,'grossProfit');return{y:yrOf(y),v:r>0?gp/r:0};});
  var cfoH=cfA.filter(Boolean).slice(0,5).map(function(y){return{y:yrOf(y),v:+((gf(y,'operatingCashFlow','netCashProvidedByOperatingActivities'))/1e6).toFixed(1)};});
  var fcfH=cfA.filter(Boolean).slice(0,5).map(function(y){var c2=gf(y,'operatingCashFlow','netCashProvidedByOperatingActivities');var s2=gf(y,'stockBasedCompensation');var cx2=Math.abs(gf(y,'capitalExpenditure'));return{y:yrOf(y),v:+((c2-s2-cx2*(isL?0.5:0.7))/1e6).toFixed(1)};});
  var sbcH=cfA.filter(Boolean).slice(0,5).map(function(y){return{y:yrOf(y),v:+((gf(y,'stockBasedCompensation'))/1e6).toFixed(1)};});
  var divH=cfA.filter(Boolean).slice(0,5).map(function(y){return{y:yrOf(y),v:+(Math.abs(gf(y,'dividendsPaid'))/1e6).toFixed(1)};});
  var buyH=cfA.filter(Boolean).slice(0,5).map(function(y){return{y:yrOf(y),v:+(Math.abs(gf(y,'commonStockRepurchased'))/1e6).toFixed(1)};});
  var soH=incA.filter(Boolean).slice(0,5).map(function(y){var s=gf(y,'weightedAverageShsOut');if(!s)s=gf(y,'weightedAverageShsOutDil');return{y:yrOf(y),v:s>0?+(s/1e6).toFixed(1):null};});

  var fyEnd=cf0.date?(cf0.date.substring(5)):'';

  return{
    t:p.symbol||tk,n:p.companyName||tk,p:px,pd:new Date().toISOString().split('T')[0],
    sh:mcap&&px?+(mcap/px/1e6).toFixed(1):0,
    ca:+((gf(bs0,'cashAndShortTermInvestments')||gf(bs0,'cashAndCashEquivalents'))/1e6).toFixed(1),
    de:+((gf(bs0,'shortTermDebt')+gf(bs0,'longTermDebt'))/1e6).toFixed(1),
    cfo:+(gf(cf0,'operatingCashFlow','netCashProvidedByOperatingActivities')/1e6).toFixed(1),
    sbc:+(gf(cf0,'stockBasedCompensation')/1e6).toFixed(1),
    cx:+(capex/1e6).toFixed(1),mp:mpct,
    fy:'FY'+(gf(cf0,'calendarYear')||''),fyEnd:fyEnd,bsDate:(bs0.date||'').slice(0,10),filingLink:cf0.finalLink||cf0.link||'',
    rv:rev,gm:gm,cfoH:cfoH,fcf:fcfH,sbcH:sbcH,soH:soH,divH:divH,buyH:buyH,
    sec:sec,exch:p.exchangeFullName||p.exchange||'',industry:p.industry||'',
    mcapHist:Array.isArray(mcapHist)?mcapHist:[],
  };
}


// S&P 500 annual close prices (Dec 31 each year)
var SP500={2015:2043.94,2016:2238.83,2017:2673.61,2018:2506.85,2019:3230.78,
  2020:3756.07,2021:4766.18,2022:3839.50,2023:4769.83,2024:5881.63};

function buildPriceChart(ticker,mcapData,soData,years){
  // mcapData: [{date,marketCap}] from FMP (most recent first)
  // soData: [{y,v}] shares per year (millions)
  // years: ['2020','2021',...] from financial summary
  if(!mcapData||!mcapData.length)return'<div style="font-size:10px;color:var(--dm);padding:10px">Historical price data unavailable</div>';

  // Extract year-end prices from MCap data
  var pricesByYear={};
  mcapData.forEach(function(d){
    if(!d.date)return;
    var yr=d.date.substring(0,4);
    var mo=parseInt(d.date.substring(5,7));
    // Take the last entry we see for each year (data is newest first, so first occurrence = latest in year)
    if(!pricesByYear[yr]&&d.marketCap>0){
      // Find matching shares for that year
      var so=soData.find(function(s){return s.y===yr;});
      if(so&&so.v>0){pricesByYear[yr]=+(d.marketCap/1e6/so.v).toFixed(2);}
    }
  });

  var dataYears=Object.keys(pricesByYear).sort();
  if(dataYears.length<2)return'<div style="font-size:10px;color:var(--dm);padding:10px">Insufficient price history</div>';

  // Normalize both series to 100 at first year
  var firstYr=dataYears[0];
  var stockBase=pricesByYear[firstYr];
  var sp500Base=SP500[parseInt(firstYr)];
  if(!stockBase||!sp500Base)return'<div style="font-size:10px;color:var(--dm);padding:10px">Cannot normalize chart</div>';

  var stockNorm=[],sp500Norm=[],chartYrs=[];
  dataYears.forEach(function(yr){
    var sp=SP500[parseInt(yr)];
    if(pricesByYear[yr]&&sp){
      stockNorm.push(+(pricesByYear[yr]/stockBase*100).toFixed(1));
      sp500Norm.push(+(sp/sp500Base*100).toFixed(1));
      chartYrs.push(yr);
    }
  });
  if(chartYrs.length<2)return'';

  // Calculate CAGRs
  var n=chartYrs.length-1;
  var stockCagr=Math.pow(stockNorm[n]/100,1/n)-1;
  var spCagr=Math.pow(sp500Norm[n]/100,1/n)-1;

  // SVG chart
  var W=500,H=160,pad={l:30,r:10,t:15,b:25};
  var cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  var allVals=stockNorm.concat(sp500Norm);
  var minV=Math.min.apply(null,allVals)*0.95,maxV=Math.max.apply(null,allVals)*1.05;
  function xp(i){return pad.l+i/(chartYrs.length-1)*cw;}
  function yp(v){return pad.t+ch-(v-minV)/(maxV-minV)*ch;}

  var stockPath='',spPath='';
  chartYrs.forEach(function(y,i){
    var cmd=i===0?'M':'L';
    stockPath+=cmd+xp(i).toFixed(1)+','+yp(stockNorm[i]).toFixed(1)+' ';
    spPath+=cmd+xp(i).toFixed(1)+','+yp(sp500Norm[i]).toFixed(1)+' ';
  });

  var stockColor=stockCagr>spCagr?'#34d399':'#38bdf8';
  var svg='<svg viewBox="0 0 '+W+' '+H+'" class="chart-svg">';
  // Grid lines
  svg+='<line x1="'+pad.l+'" y1="'+pad.t+'" x2="'+pad.l+'" y2="'+(H-pad.b)+'" stroke="#1a2234" stroke-width="1"/>';
  svg+='<line x1="'+pad.l+'" y1="'+(H-pad.b)+'" x2="'+(W-pad.r)+'" y2="'+(H-pad.b)+'" stroke="#1a2234" stroke-width="1"/>';
  // Base line (100)
  var y100=yp(100);
  svg+='<line x1="'+pad.l+'" y1="'+y100.toFixed(1)+'" x2="'+(W-pad.r)+'" y2="'+y100.toFixed(1)+'" stroke="#232d3f" stroke-width="1" stroke-dasharray="3,3"/>';
  svg+='<text x="'+pad.l+'" y="'+(y100-3).toFixed(1)+'" class="chart-label">100</text>';
  // Year labels
  chartYrs.forEach(function(y,i){if(i%Math.ceil(chartYrs.length/5)===0||i===chartYrs.length-1)svg+='<text x="'+xp(i).toFixed(1)+'" y="'+(H-6)+'" class="chart-label" text-anchor="middle">'+y+'</text>';});
  // S&P line
  svg+='<path d="'+spPath.trim()+'" fill="none" stroke="#4a5568" stroke-width="2"/>';
  // Stock line
  svg+='<path d="'+stockPath.trim()+'" fill="none" stroke="'+stockColor+'" stroke-width="2.5"/>';
  // End dots
  var lastI=chartYrs.length-1;
  svg+='<circle cx="'+xp(lastI).toFixed(1)+'" cy="'+yp(stockNorm[lastI]).toFixed(1)+'" r="3" fill="'+stockColor+'"/>';
  svg+='<circle cx="'+xp(lastI).toFixed(1)+'" cy="'+yp(sp500Norm[lastI]).toFixed(1)+'" r="3" fill="#4a5568"/>';
  // End value labels
  svg+='<text x="'+(xp(lastI)+4)+'" y="'+(yp(stockNorm[lastI])+4).toFixed(1)+'" class="chart-label" fill="'+stockColor+'">'+stockNorm[lastI]+'</text>';
  svg+='<text x="'+(xp(lastI)+4)+'" y="'+(yp(sp500Norm[lastI])+4).toFixed(1)+'" class="chart-label">' +sp500Norm[lastI]+'</text>';
  svg+='</svg>';

  var stockColor2=stockCagr>spCagr?'var(--gn)':'var(--rd)';
  var legend='<div style="display:flex;gap:16px;font-size:10px;margin-top:6px;flex-wrap:wrap">';
  legend+='<div><span style="display:inline-block;width:16px;height:2px;background:'+stockColor+';vertical-align:middle;margin-right:4px"></span><b>'+ticker+'</b> CAGR: <span style="color:'+stockColor2+';font-weight:600">'+(stockCagr*100).toFixed(1)+'%</span></div>';
  legend+='<div><span style="display:inline-block;width:16px;height:2px;background:#4a5568;vertical-align:middle;margin-right:4px"></span><b>S&P 500</b> CAGR: <span style="color:var(--lb)">'+(spCagr*100).toFixed(1)+'%</span></div>';
  legend+='<div style="color:var(--dm)">Indexed to 100 from '+chartYrs[0]+'</div></div>';

  return svg+legend;
}

function calcDCF(){
  var d=ST.d,v=ST.dcf;
  if(!d||!d.rv||!d.rv.length)return null;
  var latRev=d.rv[0].r,latSh=d.soH&&d.soH[0]?d.soH[0].v:d.sh;
  var rates=[v.r1/100,v.r2/100,v.r3/100,v.r4/100,v.r5/100];
  var fm=v.fm/100,wacc=v.wacc/100,tg=v.tg/100,sc=v.sc/100;
  var pR=[],pF=[],pS=[],pV=[];
  var cR=latRev,cS=latSh;
  for(var i=0;i<5;i++){
    cR=cR*(1+rates[i]);pR.push(cR);
    var f=cR*fm;pF.push(f);
    cS=cS*(1+sc);pS.push(cS);
    pV.push(f/Math.pow(1+wacc,i+1));
  }
  var tvF=pF[4]*(1+tg),tv=tvF/(wacc-tg),tvPv=tv/Math.pow(1+wacc,5);
  var totPv=pV.reduce(function(a,b){return a+b;},0)+tvPv;
  var eq=totPv-(d.de||0)+(d.ca||0);if(eq<0)eq=0;
  var iv=pS[4]>0?eq/pS[4]:0,mos=d.p>0?(iv-d.p)/d.p:0;
  return{pR:pR,pF:pF,pS:pS,pV:pV,tv:tv,tvPv:tvPv,totPv:totPv,iv:iv,mos:mos};
}

    h+='<div><label>Terminal Growth %</label><input id="dcf_tg" type="number" step="0.5" value="'+ST.dcf.tg+'" oninput="updDCF()" style="width:100%;background:var(--ib);border:1px solid var(--ibd);border-radius:3px;padding:3px;color:#e0e7f0;font-family:var(--m);outline:none;text-align:center"/></div>';
    h+='</div>';
    h+='<div style="overflow-x:auto"><table class="t"><thead><tr><th></th><th>Y1</th><th>Y2</th><th>Y3</th><th>Y4</th><th>Y5</th></tr></thead><tbody>';
    h+='<tr><td>Revenue ($M)</td>';dcf.projRev.forEach(function(x){h+='<td>'+D(x)+'</td>';});h+='</tr>';
    h+='<tr><td>Shares (M)</td>';dcf.projShares.forEach(function(x){h+='<td>'+SH(x)+'</td>';});h+='</tr>';
    h+='<tr><td>Adj FCF ($M)</td>';dcf.projFcf.forEach(function(x){h+='<td style="font-weight:600">'+D(x)+'</td>';});h+='</tr>';
    h+='<tr><td>PV @ WACC</td>';dcf.pv.forEach(function(x){h+='<td>'+D(x)+'</td>';});h+='</tr>';
    h+='<tr style="border-top:2px solid #1e2a3a"><td>Terminal Value</td><td colspan="5" style="font-weight:600">'+D(dcf.tv)+' | PV: '+D(dcf.tvPv)+'</td></tr>';
    h+='<tr><td style="font-weight:600">Total PV</td><td colspan="5" style="font-weight:600;color:var(--bl)">'+D(dcf.totalPv)+'</td></tr>';
    h+='<tr><td style="font-weight:600">Intrinsic Value</td><td colspan="5" style="font-weight:600;color:var(--pu)">'+pr(dcf.iv)+' / share (Current: '+pr(d.p)+')</td></tr>';
    var mosColor=dcf.mos>=1?'var(--gn)':dcf.mos>=0.5?'var(--yw)':'var(--rd)';
    var mosLabel=dcf.mos>=1?'Ready ✓':dcf.mos>=0.5?'Watch ◐':'Below ✗';
    h+='<tr style="border-top:2px solid #1e2a3a"><td style="font-weight:600">Margin of Safety</td><td colspan="5" style="font-weight:600;color:'+mosColor+'">'+pc(dcf.mos)+' — '+mosLabel+'</td></tr>';
    h+='</tbody></table></div>';
    h+='</div>';
  }
  h+='</div></div></div>';

  // ──── PATH TO 25% + VALUATION UPSIDE ────
  h+='<div class="card"><div class="ci"><div class="cm"><div style="display:flex;justify-content:space-between"><div class="ct" style="color:var(--yw)">Path to 25% + Valuation Upside</div><span class="tog'+(ST.showPath?' on':'')+'" onclick="togSection(\'Path\')">'+(ST.showPath?'▼':'▶')+'</span></div>';
  if(ST.showPath){
    if(c.gap<=0)h+='<div style="color:var(--gn);font-size:12px;margin-bottom:10px">✦ Meets 25%.</div>';
    else{var pb=c.np!=null&&c.np>0?'<div style="font-size:16px;font-weight:800;font-family:var(--m);color:var(--yw)">'+pr(c.np)+'</div><div style="font-size:10px;color:var(--dm)">'+((c.np-c.sp)/c.sp*100).toFixed(1)+'%</div>':'<div style="font-size:10px;color:var(--dm)">Not via price</div>';
      h+='<div style="font-size:11px;color:var(--lb);margin-bottom:8px">Gap: <span style="color:var(--yw);font-weight:700;font-family:var(--m)">'+(c.gap*100).toFixed(1)+'pp</span></div><div class="g2" style="margin-bottom:12px"><div class="mc"><div style="font-size:9px;font-weight:700;color:var(--dm);text-transform:uppercase;margin-bottom:4px">Via Price</div>'+pb+'</div><div class="mc"><div style="font-size:9px;font-weight:700;color:var(--dm);text-transform:uppercase;margin-bottom:4px">Via Growth</div><div style="font-size:16px;font-weight:800;font-family:var(--m);color:var(--yw)">'+(c.nr!=null?c.nr.toFixed(1):'—')+'%</div><div style="font-size:10px;color:var(--dm)">vs '+((c.rc||0)*100).toFixed(1)+'%</div></div></div>';}
    h+='<div style="border-top:1px solid #1e2a3a;padding-top:10px"><div style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--pu);margin-bottom:6px">Valuation Multiples</div>';
    h+='<table class="t"><thead><tr><th>EV/FCF</th><th>Current</th><th>3Y</th><th>5Y</th>';
    if(co.length>0)h+='<th>Peer Avg</th>';
    h+='<th>Industry</th></tr></thead><tbody><tr><td>Multiple</td><td style="font-weight:600;color:var(--br)">'+fx(c.evF)+'</td><td>'+fx(c.evF3)+'</td><td>'+fx(c.evF5)+'</td>';
    if(co.length>0){h+='<td>'+fx(av(co.map(function(x){return calcM(x).evF;}).filter(Boolean)))+'</td>';}
    h+='<td><input id="indm" type="number" step="any" value="'+ST.indMult+'" oninput="reCalc()" style="width:42px;background:var(--ib);border:1px solid var(--ibd);border-radius:3px;padding:2px 3px;color:#e0e7f0;font-size:10px;font-family:var(--m);outline:none;text-align:right"/>x</td></tr></tbody></table>';
    h+='</div>';
  }
  h+='</div></div></div>';

    // DCF calc
  var dcf=calcDCF();

  // SECTION 6: 5-Year DCF
  h+='<div class="card"><div class="ci"><div class="cm">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
  h+='<div class="ct" style="margin-bottom:0">5-Year DCF Projection</div>';
  h+='<span class="tog'+(ST.showDCF?' on':'')+'" onclick="togS(\'DCF\')">'+(ST.showDCF?'Hide':'Expand')+'</span></div>';
  if(ST.showDCF&&dcf){
    h+='<div style="background:var(--ib);border-radius:6px;padding:10px;border:1px solid var(--bd);margin-bottom:10px">';
    h+='<div style="font-size:9px;font-weight:700;color:var(--dm);text-transform:uppercase;margin-bottom:6px">YoY Revenue Growth Per Year</div>';
    h+='<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:10px">';
    var dcfRateKeys=['r1','r2','r3','r4','r5'];
    for(var di=0;di<5;di++){
      h+='<div style="text-align:center"><div style="font-size:9px;color:var(--dm);margin-bottom:3px">Y'+(di+1)+'</div>';
      h+='<input id="d'+dcfRateKeys[di]+'" type="number" step="0.5" value="'+ST.dcf[dcfRateKeys[di]]+'" oninput="updDCF()" style="width:100%;background:var(--cd);border:1px solid var(--ibd);border-radius:3px;padding:4px;color:var(--br);font-family:var(--m);outline:none;text-align:center;font-size:11px"/>%</div>';
    }
    h+='</div>';
    h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">';
    var dcfOther=[{k:'fm',l:'FCF Margin %'},{k:'wacc',l:'WACC %'},{k:'tg',l:'Terminal Growth %'},{k:'sc',l:'Shares CAGR %'}];
    for(var di2=0;di2<dcfOther.length;di2++){
      var dx=dcfOther[di2];
      h+='<div style="text-align:center"><div style="font-size:9px;color:var(--dm);margin-bottom:3px">'+dx.l+'</div>';
      h+='<input id="d'+dx.k+'" type="number" step="0.5" value="'+ST.dcf[dx.k]+'" oninput="updDCF()" style="width:100%;background:var(--cd);border:1px solid var(--ibd);border-radius:3px;padding:4px;color:var(--br);font-family:var(--m);outline:none;text-align:center;font-size:11px"/>%</div>';
    }
    h+='</div></div>';
    var histRv=d.rv.slice(0,3);
    h+='<div style="overflow-x:auto"><table class="t"><thead><tr><th></th>';
    for(var hi=0;hi<histRv.length;hi++)h+='<th style="color:var(--dm)">'+histRv[hi].y+'</th>';
    h+='<th style="border-left:2px solid var(--bd);color:var(--bl)">Y1</th><th>Y2</th><th>Y3</th><th>Y4</th><th>Y5</th></tr></thead><tbody>';
    h+='<tr><td style="font-weight:600;color:var(--bl)">Revenue</td>';
    for(var hi2=0;hi2<histRv.length;hi2++)h+='<td style="color:var(--dm)">'+D(histRv[hi2].r)+'</td>';
    for(var pi=0;pi<5;pi++)h+='<td style="'+(pi===0?'border-left:2px solid var(--bd);':'')+';font-weight:600">'+D(dcf.pR[pi])+'</td>';
    h+='</tr>';
    h+='<tr><td>Shares (M)</td>';
    for(var hi3=0;hi3<histRv.length;hi3++)h+='<td style="color:var(--dm)">'+(d.soH&&d.soH[hi3]?SH(d.soH[hi3].v):'—')+'</td>';
    for(var pi2=0;pi2<5;pi2++)h+='<td style="'+(pi2===0?'border-left:2px solid var(--bd)':'')+'">'+SH(dcf.pS[pi2])+'</td>';
    h+='</tr>';
    h+='<tr><td style="font-weight:600;color:var(--bl)">Adj FCF</td>';
    for(var hi4=0;hi4<histRv.length;hi4++)h+='<td style="color:var(--dm)">'+(d.fcf&&d.fcf[hi4]?D(d.fcf[hi4].v):'—')+'</td>';
    for(var pi3=0;pi3<5;pi3++)h+='<td style="'+(pi3===0?'border-left:2px solid var(--bd);':'')+';font-weight:600">'+D(dcf.pF[pi3])+'</td>';
    h+='</tr>';
    h+='<tr><td>PV @ WACC</td>';
    for(var hi5=0;hi5<histRv.length;hi5++)h+='<td></td>';
    for(var pi4=0;pi4<5;pi4++)h+='<td style="'+(pi4===0?'border-left:2px solid var(--bd)':'')+'">'+D(dcf.pV[pi4])+'</td>';
    h+='</tr>';
    h+='<tr style="border-top:2px solid var(--bd)"><td>Terminal Value</td>';
    for(var hi6=0;hi6<histRv.length;hi6++)h+='<td></td>';
    h+='<td colspan="5" style="border-left:2px solid var(--bd);font-weight:600">'+D(dcf.tv)+' (PV: '+D(dcf.tvPv)+')</td></tr>';
    h+='<tr><td style="font-weight:600">Total PV</td>';
    for(var hi7=0;hi7<histRv.length;hi7++)h+='<td></td>';
    h+='<td colspan="5" style="border-left:2px solid var(--bd);font-weight:600;color:var(--bl)">'+D(dcf.totPv)+'</td></tr>';
    h+='<tr><td style="font-weight:600">Intrinsic Value</td>';
    for(var hi8=0;hi8<histRv.length;hi8++)h+='<td></td>';
    h+='<td colspan="5" style="border-left:2px solid var(--bd);font-weight:700;color:var(--pu)">'+pr(dcf.iv)+' / share (current: '+pr(d.p)+')</td></tr>';
    var mosC=dcf.mos>=1?'var(--gn)':dcf.mos>=0.5?'var(--yw)':'var(--rd)';
    var mosL=dcf.mos>=1?'Ready to Invest':dcf.mos>=0.5?'Watch':'Below Threshold';
    h+='<tr style="border-top:2px solid var(--bd)"><td style="font-weight:600">Margin of Safety</td>';
    for(var hi9=0;hi9<histRv.length;hi9++)h+='<td></td>';
    h+='<td colspan="5" style="border-left:2px solid var(--bd);font-weight:700;color:'+mosC+'">'+pc(dcf.mos)+' ('+mosL+')</td></tr>';
    h+='</tbody></table></div>';
  }
  h+='</div></div></div>';

  // SECTION 7: Valuation Triangle
  h+='<div class="card"><div class="ci"><div class="cm">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
  h+='<div class="ct" style="margin-bottom:0">Valuation Triangle</div>';
  h+='<span class="tog'+(ST.showTri?' on':'')+'" onclick="togS(\'Tri\')">'+(ST.showTri?'Hide':'Expand')+'</span></div>';
  if(ST.showTri){
    var tm1=c.ev>0&&d.sh>0?c.ev/d.sh:null,tm2=dcf?dcf.iv:null;
    h+='<div class="g3" style="margin-top:10px;margin-bottom:12px">';
    h+='<div class="val-box"><div class="val-label">FCF Yield (EV/sh)</div><div class="val-num">'+(tm1?pr(tm1):'—')+'</div><div class="val-note">Weight <input id="tw1" type="number" value="33" min="0" max="100" style="width:36px;background:var(--cd);border:1px solid var(--ibd);border-radius:3px;padding:1px 3px;color:var(--br);font-family:var(--m);outline:none;text-align:center"/>%</div></div>';
    h+='<div class="val-box"><div class="val-label">DCF 5-Year</div><div class="val-num">'+(tm2?pr(tm2):'—')+'</div><div class="val-note">Weight <input id="tw2" type="number" value="50" min="0" max="100" style="width:36px;background:var(--cd);border:1px solid var(--ibd);border-radius:3px;padding:1px 3px;color:var(--br);font-family:var(--m);outline:none;text-align:center"/>%</div></div>';
    h+='<div class="val-box"><div class="val-label">Balance Sheet</div><div class="val-num" style="font-size:11px;color:var(--dm)">Coming soon</div><div class="val-note">Weight <input id="tw3" type="number" value="17" min="0" max="100" style="width:36px;background:var(--cd);border:1px solid var(--ibd);border-radius:3px;padding:1px 3px;color:var(--br);font-family:var(--m);outline:none;text-align:center"/>%</div></div>';
    h+='</div>';
    if(tm1&&tm2){
      var tw1=33,tw2=50,tw3=17,wfv=(tm1*tw1+tm2*tw2)/(tw1+tw2);
      var ups=(wfv-d.p)/d.p;
      h+='<div style="padding:10px;background:var(--ib);border-radius:5px;border:1px solid var(--bd);font-size:11px">';
      h+='<b>Weighted Fair Value:</b> <span style="font-family:var(--m);color:var(--bl);font-weight:600">'+pr(wfv)+'</span>';
      h+=' | <b>Current:</b> '+pr(d.p);
      h+=' | <b>Upside:</b> <span style="color:'+(ups>0?'var(--gn)':'var(--rd)')+';font-weight:600">'+pc(ups)+'</span>';
      h+='</div>';
    }
  }
  h+='</div></div></div>';


  h+='<div style="font-size:10px;color:#2a3040;line-height:1.5;padding-top:8px;border-top:1px solid var(--bd)">Quality Ratio ≥25% 🟢 ready to invest, 20–25% 🟡 watchlist, <20% 🔴. Three valuation methods to triangulate fair value. Data: FMP (SEC 10-K)</div>';
  document.getElementById('out').innerHTML=h;
}

document.getElementById('qi').addEventListener('keydown',function(e){if(e.key==='Enter')go();});
document.getElementById('ci2').addEventListener('keydown',function(e){if(e.key==='Enter')addComps();});
async function go(){
  var t=document.getElementById('qi').value.trim().toUpperCase();if(!t)return;
  document.getElementById('gb').disabled=true;document.getElementById('gb').textContent='…';
  document.getElementById('ld').style.display='block';document.getElementById('er').style.display='none';
  document.getElementById('out').innerHTML='';document.getElementById('es').style.display='none';
  try{
    ST.d=await buildCo(t);ST.co=[];
    var peers=await fmp('stock-peers?symbol='+t).catch(function(){return null;});
    if(peers){var pA=Array.isArray(peers)?peers:[peers];var pL=((pA[0]||{}).peersList||[]).slice(0,3);
      if(pL.length>0){var pd=await Promise.all(pL.map(function(x){return buildCo(x).catch(function(){return null;});}));ST.co=pd.filter(Boolean);}}
    render();
    if(!ST.co.length)document.getElementById('ci2').placeholder='Type competitors: MSFT, GOOG';
  }catch(e){document.getElementById('er').textContent=e.message;document.getElementById('er').style.display='block';
  }finally{document.getElementById('ld').style.display='none';document.getElementById('gb').disabled=false;document.getElementById('gb').textContent='Analyze';}
}
</script>
