<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Valuation Screener</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#090c14;--cd:#0f1320;--bd:#1a2234;--ib:#141a28;--ibd:#232d3f;--dm:#4a5568;--lb:#7a8494;--br:#f0f4f8;--bl:#38bdf8;--pu:#818cf8;--gn:#22c55e;--rd:#ef4444;--yw:#eab308;--tl:#34d399;--f:'DM Sans',system-ui,sans-serif;--m:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;background:var(--bg);font-family:var(--f);color:#c8d0dc}
.w{max-width:960px;margin:0 auto;padding:24px 16px}
h1{font-size:20px;font-weight:800;color:var(--br);margin:2px 0 0}
.sb{display:flex;gap:6px;margin-bottom:10px;background:var(--cd);border-radius:8px;padding:5px;border:1px solid var(--bd)}
.sb input{flex:1;background:0 0;border:none;outline:none;color:var(--br);font-size:14px;padding:8px 10px;font-family:var(--f)}
.sb button{background:linear-gradient(135deg,var(--bl),var(--pu));border:none;border-radius:6px;padding:8px 20px;color:#fff;font-weight:700;font-size:13px;cursor:pointer;font-family:var(--f);white-space:nowrap}
.sb button:disabled{background:var(--bd);cursor:wait}
.comp-bar{display:flex;gap:6px;margin-bottom:20px;align-items:center}
.comp-bar label{font-size:11px;color:var(--lb);white-space:nowrap}
.comp-bar input{width:180px;background:var(--ib);border:1px solid var(--ibd);border-radius:6px;padding:6px 10px;color:var(--br);font-size:12px;font-family:var(--m);outline:none}
.comp-bar button{background:var(--bd);border:none;border-radius:6px;padding:6px 14px;color:var(--lb);font-weight:600;font-size:12px;cursor:pointer;font-family:var(--f)}
.comp-bar button:hover{background:#232d3f}
.card{background:var(--cd);border-radius:8px;border:1px solid var(--bd);margin-bottom:12px;overflow:hidden}
.ci{display:flex;padding:12px 16px}.cm{flex:1;min-width:0}
.cs{width:230px;flex-shrink:0;padding-left:14px;border-left:1px solid var(--bd);margin-left:12px;font-size:10px;color:var(--dm);line-height:1.5}
.ct{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.rw{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0}
.bt{border-top:1px solid #1e2a3a}
.ei{display:flex;align-items:center;justify-content:space-between;padding:3px 0}
.ei label{font-size:12px;color:var(--lb)}.ei input{width:100px;background:var(--ib);border:1px solid var(--ibd);border-radius:4px;padding:3px 6px;color:#e0e7f0;font-size:12px;font-family:var(--m);outline:none;text-align:right}
.ei .u{font-size:10px;color:var(--dm);width:28px;margin-left:3px}
.bg{padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;display:inline-block}
.sp{width:28px;height:28px;border:3px solid var(--bd);border-top-color:var(--bl);border-radius:50%;margin:0 auto 12px;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
table.t{width:100%;border-collapse:collapse;font-size:10px}
table.t th{text-align:right;padding:3px 5px;font-weight:700;font-family:var(--m);font-size:10px;border-bottom:1px solid #1e2a3a;color:var(--lb);white-space:nowrap}
table.t th:first-child{text-align:left}
table.t td{text-align:right;padding:3px 5px;font-family:var(--m);font-size:10px;border-bottom:1px solid #131a28;color:#a0aab8;white-space:nowrap}
table.t td:first-child{text-align:left;font-family:var(--f);color:var(--lb)}
table.t tr.yoy td{font-size:9px;color:var(--dm);border-bottom:1px solid #0d1220}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mc{background:#0a0e18;border-radius:5px;padding:10px 12px;border:1px solid var(--bd)}
b.s{color:var(--lb)}
@media(max-width:640px){.cs{display:none}.ci{padding:10px 12px}}
</style>
</head>
<body>
<div class="w">
  <div style="margin-bottom:20px"><div style="font-size:9px;font-weight:800;letter-spacing:3px;color:var(--bl)">QUICK VALUATION</div><h1>Company Screener</h1></div>
  <div class="sb"><input id="qi" placeholder="Ticker (e.g. AAPL, MSFT, GOOG)"/><button id="gb" onclick="go()">Analyze</button></div>
  <div class="comp-bar">
    <label>Competitors:</label>
    <input id="ci2" placeholder="e.g. MSFT, GOOG, META"/>
    <button onclick="addComps()">Load Comps</button>
  </div>
  <div id="ld" style="display:none;text-align:center;padding:50px 0;color:var(--dm)"><div class="sp"></div><div>Fetching…</div></div>
  <div id="er" style="display:none;background:#450a0a;border:1px solid #dc2626;border-radius:6px;padding:12px;color:#fca5a5;font-size:13px;margin-bottom:16px"></div>
  <div id="out"></div>
  <div id="es" style="text-align:center;padding:60px 20px;color:#1e2a3a"><div style="font-size:36px;margin-bottom:10px">⬡</div><div style="font-size:13px;color:var(--dm)">Enter a ticker to auto-populate</div><div style="font-size:10px;margin-top:4px;color:var(--dm)">Add competitors manually or auto-detected via FMP</div></div>
</div>
<script>
const AK='zT4AbJZ4WU2SMLjcOQ98PMqIa3NErK3J',SB='https://financialmodelingprep.com/stable/';
async function fmp(ep,req){const s=ep.includes('?')?'&':'?';const r=await fetch(SB+ep+s+'apikey='+AK);if(r.status===402||r.status===403){if(req)throw new Error('FMP '+r.status);return null;}if(!r.ok)throw new Error('FMP '+r.status);return r.json();}
function cm(x){return x.toString().replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function fb(n){if(n==null||isNaN(n))return'—';var a=Math.abs(n),s=n<0?'-':'';if(a>=1e6)return s+'$'+cm((a/1e6).toFixed(1))+'T';if(a>=1e3)return s+'$'+cm((a/1e3).toFixed(1))+'B';if(a>=1)return s+'$'+cm(a.toFixed(0))+'M';return s+'$'+a.toFixed(1)+'M';}
function fbn(n){if(n==null||isNaN(n))return'—';var a=Math.abs(n),s=n<0?'-':'';if(a>=1e3)return s+cm((a/1e3).toFixed(1))+'B';return s+cm(a.toFixed(0))+'M';}
function pc(n){return n==null||isNaN(n)?'—':(n*100).toFixed(1)+'%';}
function pr(n){return n==null||isNaN(n)?'—':'$'+cm(n.toFixed(2));}
function fx(n){return n==null||isNaN(n)?'—':cm(n.toFixed(1))+'x';}
function g(o){for(var i=1;i<arguments.length;i++){if(o[arguments[i]]!=null)return o[arguments[i]];}return 0;}
function av(a){var v=a.filter(function(x){return x!=null&&!isNaN(x)&&x!==0;});return v.length?v.reduce(function(a2,b){return a2+b;},0)/v.length:null;}
function cg(s,e,y){return(s>0&&e>0&&y>0)?Math.pow(e/s,1/y)-1:null;}
function colPc(v){return v==null?'—':'<span style="color:'+(v>=0?'var(--tl)':'var(--rd)')+'">'+pc(v)+'</span>';}
function colSbc(v){return v==null?'—':'<span style="color:'+(v>0.15?'var(--rd)':v>0.08?'var(--yw)':'var(--gn)')+'">'+pc(v)+'</span>';}
function lk(arr,yr,f){var x=(arr||[]).find(function(a){return a.y===yr;});return x?(x[f||'v']):null;}

function calcM(d){
  var sp=d.p||0,sh=d.sh||0,mc=sp*sh,ca=d.ca||0,de=d.de||0;
  var nd=de-ca,ev=mc+nd,iNC=nd<0,ncP=mc>0?Math.abs(nd)/mc:0;
  var cfo=d.cfo||0,sbc=d.sbc||0,tc=d.cx||0,mp=d.mp||50;
  var mce=tc*(mp/100),af=cfo-sbc-mce,fy=ev>0?af/ev:0;
  var tev=af/0.10,tmc=tev-nd,tp=sh>0?tmc/sh:null,pd2=tp!=null?tp-sp:null;
  var revs=(d.rv||[]).filter(function(r){return r.r>0;});
  var rc=null,yrs=0;
  if(revs.length>=2){yrs=revs.length-1;rc=cg(revs[revs.length-1].r,revs[0].r,yrs);}
  var qr=(fy||0)+(rc||0),gap=0.25-qr;
  var np=null,nr=null;
  if(gap>0){var nf=0.25-(rc||0);if(nf>0){var ne=af/nf;np=sh>0?(ne-nd)/sh:null;}nr=(0.25-fy)*100;}
  var latR=revs.length>0?revs[0].r:0;var sbcP=latR>0?sbc/latR:0;
  var fcfH=d.fcfHist||[];
  var fcfY=fcfH.map(function(x){return ev>0?x.v/ev:0;});
  var avg3y=av(fcfY.slice(0,3)),avg5y=av(fcfY.slice(0,5));
  var evFcf=af>0?ev/af:null;
  var a3f=av(fcfH.slice(0,3).map(function(x){return x.v;}));
  var a5f=av(fcfH.slice(0,5).map(function(x){return x.v;}));
  var evFcf3=a3f>0?ev/a3f:null,evFcf5=a5f>0?ev/a5f:null;
  return{sp:sp,sh:sh,mc:mc,ca:ca,de:de,nd:nd,ev:ev,iNC:iNC,ncP:ncP,cfo:cfo,sbc:sbc,tc:tc,mp:mp,mce:mce,af:af,fy:fy,tp:tp,pd2:pd2,revs:revs,rc:rc,yrs:yrs,qr:qr,gap:gap,np:np,nr:nr,sbcP:sbcP,avg3y:avg3y,avg5y:avg5y,evFcf:evFcf,evFcf3:evFcf3,evFcf5:evFcf5,a3f:a3f,a5f:a5f};
}

async function buildCo(tk){
  var[prof,cfs,bss,incs]=await Promise.all([
    fmp('profile?symbol='+tk,true),fmp('cash-flow-statement?symbol='+tk+'&period=annual&limit=5',true),
    fmp('balance-sheet-statement?symbol='+tk+'&period=annual&limit=5',true),fmp('income-statement?symbol='+tk+'&period=annual&limit=5',true)]);
  var p=(Array.isArray(prof)?prof[0]:prof)||{};
  var cfA=Array.isArray(cfs)?cfs:cfs?[cfs]:[];var cf0=cfA[0]||{};
  var bsA=Array.isArray(bss)?bss:bss?[bss]:[];var bs0=bsA[0]||{};
  var incA=Array.isArray(incs)?incs:incs?[incs]:[];
  var capex=Math.abs(g(cf0,'capitalExpenditure'));
  var sec=p.sector||'';var isL=sec.match(/tech|software|communication|media/i);
  var mc2=g(p,'marketCap','mktCap');var px=g(p,'price');
  return{
    t:p.symbol||tk,n:p.companyName||tk,p:px,pd:new Date().toISOString().split('T')[0],
    sh:mc2&&px?+(mc2/px/1e6).toFixed(1):0,
    ca:+((g(bs0,'cashAndShortTermInvestments')||g(bs0,'cashAndCashEquivalents'))/1e6).toFixed(1),
    de:+((g(bs0,'shortTermDebt')+g(bs0,'longTermDebt'))/1e6).toFixed(1),
    cfo:+((g(cf0,'operatingCashFlow','netCashProvidedByOperatingActivities'))/1e6).toFixed(1),
    sbc:+((g(cf0,'stockBasedCompensation'))/1e6).toFixed(1),
    cx:+(capex/1e6).toFixed(1),mp:isL?50:70,
    fy:'FY'+(g(cf0,'calendarYear')||''),fyEnd:(cf0.date||'').slice(0,10),
    bsDate:(bs0.date||'').slice(0,10),bsPeriod:bs0.period||'annual',
    filingLink:cf0.finalLink||cf0.link||'',
    rv:incA.filter(Boolean).slice(0,5).map(function(y){return{y:''+(g(y,'calendarYear')||''),r:+((g(y,'revenue'))/1e6).toFixed(1)};}),
    gmHist:incA.filter(Boolean).slice(0,5).map(function(y){var rev=g(y,'revenue');var gp=g(y,'grossProfit');return{y:''+(g(y,'calendarYear')||''),v:rev>0?gp/rev:0};}),
    cfoHist:cfA.filter(Boolean).slice(0,5).map(function(y){return{y:''+(g(y,'calendarYear')||''),v:+((g(y,'operatingCashFlow','netCashProvidedByOperatingActivities'))/1e6).toFixed(1)};}),
    fcfHist:cfA.filter(Boolean).slice(0,5).map(function(y){
      var c2=g(y,'operatingCashFlow','netCashProvidedByOperatingActivities');var s2=g(y,'stockBasedCompensation');
      var cx2=Math.abs(g(y,'capitalExpenditure'));return{y:''+(g(y,'calendarYear')||''),v:+((c2-s2-cx2*(isL?0.5:0.7))/1e6).toFixed(1)};
    }),
    sbcHist:cfA.filter(Boolean).slice(0,5).map(function(y){return{y:''+(g(y,'calendarYear')||''),v:+((g(y,'stockBasedCompensation'))/1e6).toFixed(1)};}),
    // Shares outstanding over years
    soHist:bsA.filter(Boolean).slice(0,5).map(function(y){return{y:''+(g(y,'calendarYear')||''),v:+((g(y,'commonStockSharesOutstanding','weightedAverageShsOut')||g(y,'totalStockholdersEquity',0)>0?g(y,'commonStockSharesOutstanding'):0)/1e6).toFixed(1)};}),
    // Dividends
    divHist:cfA.filter(Boolean).slice(0,5).map(function(y){return{y:''+(g(y,'calendarYear')||''),v:+((Math.abs(g(y,'dividendsPaid')))/1e6).toFixed(1)};}),
    // Buybacks
    buyHist:cfA.filter(Boolean).slice(0,5).map(function(y){return{y:''+(g(y,'calendarYear')||''),v:+((Math.abs(g(y,'commonStockRepurchased')))/1e6).toFixed(1)};}),
    sec:sec,exch:p.exchangeFullName||p.exchange||'',ipoDate:p.ipoDate||'',industry:p.industry||'',
  };
}

var ST={d:null,co:[],indMult:15};
function gv(id){var e=document.getElementById(id);return e?parseFloat(e.value)||0:0;}
function reCalc(){var d=ST.d;if(!d)return;d.p=gv('fp');d.sh=gv('fsh');d.ca=gv('fca');d.de=gv('fde');d.cfo=gv('fcfo');d.sbc=gv('fsbc');d.cx=gv('fcx');d.mp=gv('fmp2');ST.indMult=gv('indm')||15;(d.rv||[]).forEach(function(_,i){var e=document.getElementById('rv'+i);if(e)d.rv[i].r=parseFloat(e.value)||0;});render();}
function mkEI(id,lb,val,unit){return'<div class="ei"><label>'+lb+'</label><div style="display:flex;align-items:center;gap:3px"><input id="'+id+'" type="number" step="any" value="'+(val||'')+'" oninput="reCalc()"/><span class="u">'+unit+'</span></div></div>';}
function mkRo(lb,val,bold,op,bt){var oH=op?'<span style="margin-right:4px;font-weight:700;font-family:var(--m);color:'+(op==='+'?'var(--bl)':'var(--rd)')+'">'+op+'</span>':'';return'<div class="rw'+(bt?' bt':'')+'"><span style="font-size:12px;color:var(--lb)">'+oH+lb+'</span><span style="font-family:var(--m);font-size:12px;color:'+(bold?'var(--br)':'#a0aab8')+';font-weight:'+(bold?700:400)+'">'+val+'</span></div>';}

// Add comps manually
async function addComps(){
  var inp=document.getElementById('ci2').value.trim();if(!inp||!ST.d)return;
  var tks=inp.split(/[,\s]+/).map(function(x){return x.trim().toUpperCase();}).filter(Boolean);
  document.getElementById('ld').style.display='block';
  try{
    var pd=await Promise.all(tks.map(function(x){return buildCo(x).catch(function(){return null;});}));
    ST.co=pd.filter(Boolean);
    render();
  }catch(e){document.getElementById('er').textContent=e.message;document.getElementById('er').style.display='block';}
  finally{document.getElementById('ld').style.display='none';}
}

function render(){
  var d=ST.d,co=ST.co;if(!d)return;
  var c=calcM(d);
  var qC=c.qr>=0.25?'var(--gn)':c.qr>=0.20?'var(--yw)':'var(--rd)';
  var qB=c.qr>=0.25?'#052e1688':c.qr>=0.20?'#42200688':'#450a0a88';
  var qL=c.qr>=0.25?'Ready to Invest':c.qr>=0.20?'Watchlist':'Below Threshold';
  var all=[d].concat(co);
  var cms=all.map(function(x){var m=calcM(x);return{t:x.t,mc:m.mc,ev:m.ev,iNC:m.iNC,ncP:m.ncP,af:m.af,fy:m.fy,rc:m.rc,qr:m.qr,sbcP:m.sbcP,evFcf:m.evFcf,evFcf5:m.evFcf5};});
  var years=d.rv.map(function(r){return r.y;});

  var h='';
  // Header
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;background:var(--cd);border-radius:8px;padding:14px 16px;border:1px solid var(--bd);margin-bottom:12px"><div><div style="font-size:18px;font-weight:800;color:var(--br)">'+d.n+'</div><div style="font-size:11px;color:var(--dm)">'+d.t+' · '+d.exch+' · '+d.sec+' · '+d.industry+'</div></div><div style="text-align:right"><div style="font-size:24px;font-weight:800;font-family:var(--m);color:var(--bl)">'+pr(d.p)+'</div><div style="font-size:10px;color:var(--dm)">'+d.pd+'</div></div></div>';

  // Quality Ratio
  h+='<div style="background:'+qB+';border-radius:8px;padding:14px 16px;margin-bottom:12px;border:1px solid '+qC+'33"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--lb)">Quality Ratio</div><div style="font-size:28px;font-weight:800;font-family:var(--m);color:var(--br)">'+pc(c.qr)+'</div><div style="font-size:10px;color:var(--lb)">FCF/EV '+pc(c.fy)+' + Rev CAGR '+pc(c.rc)+'</div></div><span class="bg" style="background:'+qC+'22;color:'+qC+'">'+qL+'</span></div></div>';

  // MktCap → EV
  h+='<div class="card"><div class="ci"><div class="cm"><div class="ct" style="color:var(--bl)">Market Cap → Enterprise Value</div>'+mkEI('fp','Stock Price',d.p,'USD')+mkEI('fsh','Shares Out.',d.sh,'M')+mkRo('Market Cap',fb(c.mc),1,null,1)+mkEI('fca','Cash & Equiv.',d.ca,'$M')+mkEI('fde','Total Debt',d.de,'$M')+mkRo('Enterprise Value',fb(c.ev),1,null,1)+'<div style="margin-top:6px;padding:6px 8px;border-radius:4px;background:'+(c.iNC?'#052e1644':'#450a0a44')+';border:1px solid '+(c.iNC?'#22c55e':'#ef4444')+'22;display:flex;justify-content:space-between;font-size:11px"><span style="color:'+(c.iNC?'#86efac':'#fca5a5')+'">'+(c.iNC?'✦ Net Cash':'⚠ Net Debt')+'</span><span style="font-family:var(--m);color:'+(c.iNC?'#86efac':'#fca5a5')+';font-weight:600">'+fb(Math.abs(c.nd))+' ('+pc(c.ncP)+' MCap)</span></div></div><div class="cs"><b class="s">Filing:</b> 10-K ('+d.fy+', '+d.fyEnd+')'+(d.filingLink?'<br><a href="'+d.filingLink+'" target="_blank" style="color:var(--bl);font-size:9px">View Filing →</a>':'')+'<br><b class="s">Price:</b> '+d.pd+'<br><b class="s">Shares:</b> 10-K cover<br><b class="s">BS:</b> '+d.bsDate+' ('+d.bsPeriod+')</div></div></div>';

  // Adj FCF
  h+='<div class="card"><div class="ci"><div class="cm"><div class="ct" style="color:var(--pu)">Adjusted FCF ('+d.fy+' ending '+d.fyEnd+')</div>'+mkEI('fcfo','CFO',d.cfo,'$M')+mkEI('fsbc','Stock-Based Comp',d.sbc,'$M')+mkEI('fcx','Total CapEx',d.cx,'$M')+mkEI('fmp2','Maint CapEx %',d.mp,'%')+mkRo('Maint CapEx ('+c.mp+'% × '+fb(c.tc)+')',fb(c.mce),0,'−')+mkRo('Adjusted FCF',fb(c.af),1,null,1)+'</div><div class="cs"><b class="s">Filing:</b> 10-K cash flow stmt<br><b class="s">Maint CapEx:</b> '+c.mp+'% of total. D&A as floor. 40–60% SW, 60–80% ind, 80%+ util.</div></div></div>';

  // FCF/EV Yield
  h+='<div class="card"><div class="ci"><div class="cm"><div class="ct" style="color:var(--pu)">Adjusted FCF / EV Yield</div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:22px;font-weight:800;font-family:var(--m);color:'+(c.fy>=0.10?'var(--gn)':'var(--rd)')+'">'+pc(c.fy)+'</span><span class="bg" style="background:'+(c.fy>=0.10?'#052e1688':'#450a0a88')+';color:'+(c.fy>=0.10?'var(--gn)':'var(--rd)')+'">'+(c.fy>=0.10?'≥10%':'<10%')+'</span></div>';
  h+='<div style="font-size:11px;color:var(--lb);margin-bottom:6px">'+fb(c.af)+' ÷ '+fb(c.ev)+' = '+pc(c.fy)+'</div>';
  h+='<div style="display:flex;gap:14px;margin-bottom:6px;font-size:11px"><div><span style="color:var(--dm)">3Y Avg:</span> <span style="font-family:var(--m);font-weight:600">'+pc(c.avg3y)+'</span></div><div><span style="color:var(--dm)">5Y Avg:</span> <span style="font-family:var(--m);font-weight:600">'+pc(c.avg5y)+'</span></div></div>';
  if(c.tp!=null)h+='<div class="mc"><div style="font-size:10px;color:var(--dm);margin-bottom:3px">Price for 10% yield:</div><span style="font-size:16px;font-weight:700;font-family:var(--m);color:var(--pu)">'+pr(c.tp)+'</span><span style="font-size:12px;font-family:var(--m);color:'+(c.pd2>=0?'var(--rd)':'var(--gn)')+';margin-left:6px">'+(c.pd2>=0?'▲':'▼')+' '+pr(Math.abs(c.pd2))+' ('+((c.pd2/c.sp)*100).toFixed(1)+'%)</span></div>';

  var soF=soVals.filter(function(x){return x>0;});
  h+='<td>'+(soF.length?cm(Math.round(av(soVals))):'—')+'</td>';
  h+='<td style="color:'+(soF.length>=2&&soF[0]>soF[soF.length-1]?'var(--rd)':'var(--tl)')+'">'+(soF.length>=2?pc(cg(soF[soF.length-1],soF[0],soF.length-1)):'—')+'</td></tr>';

  soVals.forEach(function(v,i){if(i<soVals.length-1&&soVals[i+1]>0)h+='<td>'+colPc(v/soVals[i+1]-1)+'</td>';else h+='<td>—</td>';});
  h+='<td></td><td></td></tr>';

  // Dividends

  h+='</tbody></table></div>';
  h+='</div><div class="cs"><b class="s">Filing:</b> 10-K income stmt, cash flow stmt, balance sheet<br><br><b class="s">Shares CAGR:</b> Negative = dilution increasing. Positive = shrinking (buybacks).<br><br><b class="s">SBC/Rev:</b><br>🟢 &lt;8% minimal dilution<br>🟡 8–15% moderate<br>🔴 &gt;15% heavy<br>S&P 500 ~2–3%<br><br><b class="s">Div Yield:</b> Approximated using current mkt cap.</div></div></div>';

  // ──── COMPETITIVE LANDSCAPE ────
  if(co.length>0){
    var crs=[{l:'Market Cap',f:function(m){return fb(m.mc)}},{l:'Enterprise Value',f:function(m){return fb(m.ev)}},{l:'Net Cash/Debt %',f:function(m){return(m.iNC?'':'-')+pc(m.ncP)}},{l:'Adj. FCF',f:function(m){return fb(m.af)}},{l:'FCF/EV Yield',f:function(m){return pc(m.fy)}},{l:'Rev CAGR',f:function(m){return pc(m.rc)}},{l:'SBC/Rev',f:function(m){return colSbc(m.sbcP)}},{l:'EV/FCF',f:function(m){return m.evFcf?fx(m.evFcf):'—'}},{l:'Quality Ratio',f:function(m){return pc(m.qr)}}];
    var ths='<th></th>';cms.forEach(function(m,i){ths+='<th style="color:'+(i===0?'var(--bl)':'var(--lb)')+'">'+m.t+'</th>';});
    var trs='';crs.forEach(function(r){var td='<td>'+r.l+'</td>';cms.forEach(function(m,j){var v=r.f(m);var isQ=r.l==='Quality Ratio';var qc2=isQ?(m.qr>=0.25?'var(--gn)':m.qr>=0.20?'var(--yw)':'var(--rd)'):null;td+='<td style="color:'+(qc2||(j===0?'#e0e7f0':'#a0aab8'))+';font-weight:'+(j===0?600:400)+'">'+v+'</td>';});trs+='<tr>'+td+'</tr>';});

    h+='<div class="card"><div class="ci"><div class="cm"><div class="ct" style="color:var(--yw)">Competitive Landscape</div>';
    // Narrative
    var bestQR=cms.reduce(function(a,b){return a.qr>b.qr?a:b;});
    var bestY=cms.reduce(function(a,b){return a.fy>b.fy?a:b;});
    var bestG=cms.reduce(function(a,b){return(a.rc||0)>(b.rc||0)?a:b;});
    var peerAvgM=av(co.map(function(x){return calcM(x).evFcf;}).filter(function(x){return x!=null;}));
    h+='<div style="font-size:11px;color:var(--lb);margin-bottom:10px;padding:8px 10px;background:#0a0e18;border-radius:5px;border:1px solid var(--bd);line-height:1.6">';
    h+='<b style="color:var(--br)">'+d.industry+' — '+d.sec+'</b><br>';
    h+=d.t+' trades at '+fx(c.evFcf)+' EV/FCF'+(peerAvgM?' vs peer avg '+fx(peerAvgM):'')+'. ';
    h+='Best quality ratio: <span style="color:var(--tl)">'+bestQR.t+' '+pc(bestQR.qr)+'</span>. ';
    h+='Best FCF yield: <span style="color:var(--tl)">'+bestY.t+' '+pc(bestY.fy)+'</span>. ';
    h+='Fastest growth: <span style="color:var(--tl)">'+bestG.t+' '+pc(bestG.rc)+'</span>.';
    h+='</div>';

    // Summary table
    h+='<div style="overflow-x:auto"><table class="t"><thead><tr>'+ths+'</tr></thead><tbody>'+trs+'</tbody></table></div>';

    // Revenue comparison
    h+='<div style="font-size:9px;font-weight:700;letter-spacing:1px;color:var(--dm);text-transform:uppercase;margin:10px 0 4px">Revenue</div>';
    h+='<table class="t"><thead><tr><th></th>';years.forEach(function(y){h+='<th>'+y+'</th>';});h+='<th>CAGR</th></tr></thead><tbody>';
    all.forEach(function(x,xi){var v2=years.map(function(y){return lk(x.rv,y,'r');});h+='<tr><td style="color:'+(xi===0?'var(--bl)':'')+'">'+x.t+'</td>';v2.forEach(function(v){h+='<td>'+fb(v)+'</td>';});var vf=v2.filter(function(a){return a>0;});h+='<td style="color:var(--tl)">'+(vf.length>=2?pc(cg(vf[vf.length-1],vf[0],vf.length-1)):'—')+'</td></tr>';});
    h+='</tbody></table>';

    // Adj FCF comparison
    h+='<div style="font-size:9px;font-weight:700;letter-spacing:1px;color:var(--dm);text-transform:uppercase;margin:10px 0 4px">Adj FCF</div>';
    h+='<table class="t"><thead><tr><th></th>';years.forEach(function(y){h+='<th>'+y+'</th>';});h+='<th>CAGR</th></tr></thead><tbody>';
    all.forEach(function(x,xi){var v3=years.map(function(y){return lk(x.fcfHist,y);});h+='<tr><td style="color:'+(xi===0?'var(--bl)':'')+'">'+x.t+'</td>';v3.forEach(function(v){h+='<td>'+fb(v)+'</td>';});var vf2=v3.filter(function(a){return a>0;});h+='<td style="color:var(--tl)">'+(vf2.length>=2?pc(cg(vf2[vf2.length-1],vf2[0],vf2.length-1)):'—')+'</td></tr>';});
    h+='</tbody></table>';

    // SBC/Rev comparison
    h+='<div style="font-size:9px;font-weight:700;letter-spacing:1px;color:var(--dm);text-transform:uppercase;margin:10px 0 4px">SBC / Revenue</div>';
    h+='<table class="t"><thead><tr><th></th>';years.forEach(function(y){h+='<th>'+y+'</th>';});h+='<th>Avg</th></tr></thead><tbody>';
    all.forEach(function(x,xi){var pcts=[];h+='<tr><td style="color:'+(xi===0?'var(--bl)':'')+'">'+x.t+'</td>';years.forEach(function(y){var rv2=lk(x.rv,y,'r');var sb2=lk(x.sbcHist,y);var p3=(rv2&&sb2&&rv2>0)?sb2/rv2:null;pcts.push(p3);h+='<td>'+colSbc(p3)+'</td>';});h+='<td>'+colSbc(av(pcts))+'</td></tr>';});
    h+='<tr><td>S&P 500</td>';years.forEach(function(){h+='<td style="color:var(--dm)">~2-3%</td>';});h+='<td style="color:var(--dm)">~2-3%</td></tr>';
    h+='</tbody></table>';

    h+='</div><div class="cs"><b class="s">Peers:</b> Auto-detected or manually entered.<br><br><b class="s">SBC/Rev:</b><br>🟢 &lt;8% minimal<br>🟡 8–15% moderate<br>🔴 &gt;15% heavy<br>S&P 500 ~2–3%</div></div></div>';
  }

  // ──── PATH TO 25% + VALUATION UPSIDE ────
  h+='<div class="card"><div class="ci"><div class="cm"><div class="ct" style="color:var(--yw)">Path to 25% + Valuation Upside</div>';
  if(c.gap<=0)h+='<div style="color:var(--gn);font-size:12px;margin-bottom:10px">✦ Meets 25% — passes screen.</div>';
  else{var pb2=c.np!=null&&c.np>0?'<div style="font-size:16px;font-weight:800;font-family:var(--m);color:var(--yw)">'+pr(c.np)+'</div><div style="font-size:10px;color:var(--dm)">'+((c.np-c.sp)/c.sp*100).toFixed(1)+'% from current</div>':'<div style="font-size:10px;color:var(--dm)">Not achievable via price alone</div>';
    h+='<div style="font-size:11px;color:var(--lb);margin-bottom:8px">Gap: <span style="color:var(--yw);font-weight:700;font-family:var(--m)">'+(c.gap*100).toFixed(1)+'pp</span></div><div class="g2" style="margin-bottom:12px"><div class="mc"><div style="font-size:9px;font-weight:700;letter-spacing:1px;color:var(--dm);text-transform:uppercase;margin-bottom:4px">Via Price</div>'+pb2+'</div><div class="mc"><div style="font-size:9px;font-weight:700;letter-spacing:1px;color:var(--dm);text-transform:uppercase;margin-bottom:4px">Via Rev Growth</div><div style="font-size:16px;font-weight:800;font-family:var(--m);color:var(--yw)">'+(c.nr!=null?c.nr.toFixed(1):'—')+'%</div><div style="font-size:10px;color:var(--dm)">vs '+((c.rc||0)*100).toFixed(1)+'% now</div></div></div>';}
  // Multiples
  h+='<div style="border-top:1px solid #1e2a3a;padding-top:10px"><div style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--pu);margin-bottom:6px">Valuation Multiples & Rerating</div>';
  h+='<table class="t"><thead><tr><th>EV/Adj FCF</th><th>Current</th><th>3Y Avg</th><th>5Y Avg</th>';
  if(co.length>0)h+='<th>Peer Avg</th>';
  h+='<th>Industry</th></tr></thead><tbody><tr><td>Multiple</td><td style="font-weight:600;color:var(--br)">'+fx(c.evFcf)+'</td><td>'+fx(c.evFcf3)+'</td><td>'+fx(c.evFcf5)+'</td>';
  if(co.length>0){var pam2=av(co.map(function(x){return calcM(x).evFcf;}).filter(function(x){return x!=null;}));h+='<td>'+fx(pam2)+'</td>';}
  h+='<td><input id="indm" type="number" step="any" value="'+ST.indMult+'" oninput="reCalc()" style="width:45px;background:var(--ib);border:1px solid var(--ibd);border-radius:3px;padding:2px 3px;color:#e0e7f0;font-size:10px;font-family:var(--m);outline:none;text-align:right"/>x</td></tr></tbody></table>';
  var indM=ST.indMult||15;var currM=c.evFcf5||c.evFcf3||c.evFcf;
  if(currM&&currM>0&&indM>0){
    var useFcf=c.a5f||c.a3f||c.af;var fairEV=useFcf*indM;var fairMC=fairEV-c.nd;
    var fairP=c.sh>0?fairMC/c.sh:null;var upside=fairP?((fairP/c.sp)-1):null;
    var rerYrs=gv('ryr')||5;var annR=upside!=null?Math.pow(1+upside,1/rerYrs)-1:null;
    var totR=annR!=null?(annR+(c.fy||0)):null;
    h+='<div style="margin-top:8px;padding:8px 10px;background:#0a0e18;border-radius:5px;border:1px solid var(--bd)">';
    h+='<div style="font-size:10px;color:var(--dm);margin-bottom:4px">Re-rate to '+fx(indM)+' over <input id="ryr" type="number" step="1" value="'+rerYrs+'" oninput="reCalc()" style="width:28px;background:var(--ib);border:1px solid var(--ibd);border-radius:3px;padding:1px 3px;color:#e0e7f0;font-size:10px;font-family:var(--m);outline:none;text-align:center"/> yrs using '+(c.a5f?'5Y':'3Y')+' avg FCF ('+fb(useFcf)+'):</div>';
    h+='<div style="display:flex;gap:14px;margin-top:4px;font-size:11px;flex-wrap:wrap">';
    h+='<div><span style="color:var(--dm)">Fair value:</span> <span style="font-family:var(--m);font-weight:700;color:var(--br)">'+(fairP?pr(fairP):'—')+'</span></div>';
    h+='<div><span style="color:var(--dm)">Upside:</span> <span style="font-family:var(--m);font-weight:700;color:'+(upside>=0?'var(--gn)':'var(--rd)')+'">'+pc(upside)+'</span></div>';
    h+='<div><span style="color:var(--dm)">Annual rerate:</span> <span style="font-family:var(--m);font-weight:700;color:var(--pu)">'+pc(annR)+'</span></div></div>';
    h+='<div style="margin-top:6px;font-size:11px;color:var(--lb)">Total annual return (rerate + yield): <span style="font-family:var(--m);font-weight:700;font-size:13px;color:'+(totR>=0.15?'var(--gn)':totR>=0.10?'var(--yw)':'var(--rd)')+'">'+pc(totR)+'</span></div></div>';}
  h+='</div></div><div class="cs"><b class="s">EV/FCF:</b> Years of FCF to pay for enterprise.<br><br><b class="s">Industry:</b> Editable. Damodaran sector median.<br><br><b class="s">Rerate + yield = total return.</b></div></div></div>';

  h+='<div style="font-size:10px;color:#2a3040;line-height:1.5;padding-top:8px;border-top:1px solid var(--bd)">Adj. FCF = CFO − SBC − Maint. CapEx · EV = MCap + Net Debt · Quality = FCF/EV + Rev CAGR · ≥25% 🟢 · 20–25% 🟡 · &lt;20% 🔴 · Source: FMP API (SEC 10-K)</div>';
  document.getElementById('out').innerHTML=h;
}

document.getElementById('qi').addEventListener('keydown',function(e){if(e.key==='Enter')go();});
document.getElementById('ci2').addEventListener('keydown',function(e){if(e.key==='Enter')addComps();});
async function go(){
  var t=document.getElementById('qi').value.trim().toUpperCase();if(!t)return;
  document.getElementById('gb').disabled=true;document.getElementById('gb').textContent='…';
  document.getElementById('ld').style.display='block';document.getElementById('er').style.display='none';
  document.getElementById('out').innerHTML='';document.getElementById('es').style.display='none';
  try{
    var main=await buildCo(t);ST.d=main;ST.co=[];
    // Try auto peers
    var peers=await fmp('stock-peers?symbol='+t).catch(function(){return null;});
    if(peers){var pArr=Array.isArray(peers)?peers:[peers];var pList=((pArr[0]||{}).peersList||[]).slice(0,3);
      if(pList.length>0){var pd=await Promise.all(pList.map(function(x){return buildCo(x).catch(function(){return null;});}));ST.co=pd.filter(Boolean);}}
    render();
    // If no auto peers, hint
    if(ST.co.length===0)document.getElementById('ci2').setAttribute('placeholder','No auto peers — type tickers e.g. MSFT, GOOG');
  }catch(e){document.getElementById('er').textContent=e.message;document.getElementById('er').style.display='block';
  }finally{document.getElementById('ld').style.display='none';document.getElementById('gb').disabled=false;document.getElementById('gb').textContent='Analyze';}
}
</script>
