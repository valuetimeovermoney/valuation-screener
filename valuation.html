<div class="wrap">
  <div class="hdr">
    <div class="label">INVESTMENT ANALYSIS TERMINAL</div>
    <h1>Valuation Engine</h1>
    <p>All numbers sourced from FMP API + SEC filings. No estimates without disclosure.</p>
  </div>

  <div class="row-in">
    <input id="tkr" placeholder="TICKER (e.g. AAPL)" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')analyze()"/>
    <button class="btn" id="btnAnalyze" onclick="analyze()">ANALYZE</button>
    <button class="btn-sm" onclick="testAPI()">TEST API</button>
  </div>
  <div id="testMsg" class="test-msg" style="display:none"></div>
  <div id="errBox" class="err" style="display:none"></div>

  <div id="results" style="display:none">
    <div class="company-bar" id="companyBar"></div>
    <div class="flags" id="flagsBox"></div>
    <div class="tabs" id="tabBar"></div>
    <div id="tabContent"></div>
  </div>
</div>

<script>
const FMP = "zT4AbJZ4WU2SMLjcOQ98PMqIa3NErK3J";
let D = null;
let openSections = {};

const fmt = (n,d=1) => n==null||isNaN(n) ? "—" : Number(n).toLocaleString("en-US",{maximumFractionDigits:d});
const fmtM = n => n==null||isNaN(n) ? "—" : `$${fmt(n/1e6)}M`;
const fmtB = n => n==null||isNaN(n) ? "—" : `$${fmt(n/1e9,2)}B`;
const fmtP = n => n==null||isNaN(n) ? "—" : `${fmt(n*100,1)}%`;
const fmtX = n => n==null||isNaN(n) ? "—" : `${fmt(n,1)}x`;
const fmtD = n => n==null||isNaN(n) ? "—" : `$${fmt(n,2)}`;

async function fmpGet(endpoint) {
  const sep = endpoint.includes("?") ? "&" : "?";
  const url = `https://financialmodelingprep.com/stable/${endpoint}${sep}apikey=${FMP}`;
  const r = await fetch(url);
  if (r.status === 402 || r.status === 403) return null;
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const j = await r.json();
  if (j?.["Error Message"]) throw new Error(j["Error Message"]);
  if (j?.["message"]) throw new Error(j["message"]);
  return j;
}

async function testAPI() {
  const el = document.getElementById("testMsg");
  el.style.display = "block"; el.textContent = "Testing…"; el.style.color = "#94a3b8";
  try {
    const j = await fmpGet("profile?symbol=AAPL");
    if (Array.isArray(j) && j[0]?.symbol) {
      el.textContent = "✅ Connected — AAPL: $" + j[0].price; el.style.color = "#4ade80";
    } else { el.textContent = "⚠ " + JSON.stringify(j).slice(0,80); el.style.color = "#f59e0b"; }
  } catch(e) { el.textContent = "❌ " + e.message; el.style.color = "#f87171"; }
}

async function analyze() {
  const sym = document.getElementById("tkr").value.trim().toUpperCase();
  if (!sym) return;
  const btn = document.getElementById("btnAnalyze");
  btn.disabled = true; btn.textContent = "LOADING…";
  document.getElementById("errBox").style.display = "none";
  document.getElementById("results").style.display = "none";

  try {
    const [profile,incomeA,balanceA,cashflowA,ratios,keyMetrics,quote,analystEst,insiderTx,dcfFmp,treasury] = await Promise.allSettled([
      fmpGet(`profile?symbol=${sym}`),
      fmpGet(`income-statement?symbol=${sym}&period=annual&limit=5`),
      fmpGet(`balance-sheet-statement?symbol=${sym}&period=annual&limit=5`),
      fmpGet(`cash-flow-statement?symbol=${sym}&period=annual&limit=5`),
      fmpGet(`ratios?symbol=${sym}&period=annual&limit=1`),
      fmpGet(`key-metrics?symbol=${sym}&period=annual&limit=2`),
      fmpGet(`quote?symbol=${sym}`),
      fmpGet(`analyst-estimates?symbol=${sym}&limit=3`),
      fmpGet(`insider-trading?symbol=${sym}&limit=10`),
      fmpGet(`discounted-cash-flow?symbol=${sym}`),
      fmpGet(`treasury?from=2024-01-01&to=2025-12-31`),
    ]);

    const get = r => r.status === "fulfilled" ? r.value : null;
    const profRaw = get(profile);
    const p = Array.isArray(profRaw) ? profRaw[0] : (profRaw?.profile || profRaw);
    if (!p || !p.symbol) {
      throw new Error("Ticker not found. Please check the symbol and try again.");
    }

    const iaRaw = get(incomeA); const ia = Array.isArray(iaRaw) ? iaRaw : (iaRaw?.financials || iaRaw?.data || []);
    const baRaw = get(balanceA); const ba = Array.isArray(baRaw) ? baRaw : (baRaw?.financials || baRaw?.data || []);
    const caRaw = get(cashflowA); const ca = Array.isArray(caRaw) ? caRaw : (caRaw?.financials || caRaw?.data || []);
    const ratRaw = get(ratios);
    const rat = Array.isArray(ratRaw) ? ratRaw[0] : (ratRaw || {});
    const kmRaw = get(keyMetrics);
    const km = Array.isArray(kmRaw) ? kmRaw[0] : (kmRaw || {});
    const quoteRaw = get(quote);
    const q = Array.isArray(quoteRaw) ? quoteRaw[0] : (quoteRaw || {});
    const aeRaw = get(analystEst); const ae = Array.isArray(aeRaw) ? aeRaw : [];
    const insRaw = get(insiderTx); const ins = Array.isArray(insRaw) ? insRaw : (insRaw?.data || []);
    const dcfRaw = get(dcfFmp); const dcfRef = Array.isArray(dcfRaw) ? (dcfRaw[0]||{}) : (dcfRaw||{});
    const tRaw = get(treasury); const tData = Array.isArray(tRaw) ? tRaw : [];

    const li = ia[0]||{}, lb = ba[0]||{}, lc = ca[0]||{};
    const rfr = tData.length ? (tData[tData.length-1]?.year10||4.3)/100 : 0.043;
    const rfrSrc = tData.length ? "FMP /v4/treasury (10Y UST)" : "Fallback 4.3%";
    const erp = 0.046, beta = p.beta||1.0;
    const ke = rfr + beta * erp;

    const grossDebt = (lb.longTermDebt||0)+(lb.shortTermDebt||0);
    const cashEq = (lb.cashAndCashEquivalents||0)+(lb.shortTermInvestments||0);
    const netDebt = grossDebt - cashEq;
    const intExp = Math.abs(li.interestExpense||0);
    const kdPre = grossDebt>0 ? intExp/grossDebt : 0;
    const taxRate = li.incomeBeforeTax>0 ? Math.max(0,Math.min(0.35,li.incomeTaxExpense/li.incomeBeforeTax)) : 0.21;
    const kdPost = kdPre*(1-taxRate);
    const mktCap = p.mktCap||0;
    const totCap = mktCap+grossDebt;
    const we = totCap>0?mktCap/totCap:1, wd = totCap>0?grossDebt/totCap:0;
    const wacc = we*ke + wd*kdPost;

    const fcfArr = ca.slice(0,4).map(y=>({year:y.calendarYear,ocf:y.operatingCashFlow,capex:Math.abs(y.capitalExpenditure||0),fcf:(y.operatingCashFlow||0)-Math.abs(y.capitalExpenditure||0),src:`FMP /v3/cash-flow-statement (10-K ${y.calendarYear})`}));
    const incArr = ia.slice(0,4).map(y=>({year:y.calendarYear,rev:y.revenue,ebitda:y.ebitda,ebit:y.operatingIncome,ni:y.netIncome,ebm:y.revenue>0?y.ebitda/y.revenue:null,nm:y.revenue>0?y.netIncome/y.revenue:null}));

    const revCAGR = ia[0]?.revenue&&ia[3]?.revenue&&ia[3].revenue>0 ? Math.pow(ia[0].revenue/ia[3].revenue,1/3)-1 : null;
    const fcfCAGR = fcfArr[0]?.fcf&&fcfArr[3]?.fcf&&fcfArr[3].fcf>0 ? Math.pow(fcfArr[0].fcf/fcfArr[3].fcf,1/3)-1 : null;

    const nopat = (li.operatingIncome||0)*(1-taxRate);
    const ic = (lb.totalEquity||0)+grossDebt-cashEq;
    const roic = ic>0?nopat/ic:null;
    const roicSpread = roic!=null?roic-wacc:null;
    const fcfConv = li.netIncome>0?(fcfArr[0]?.fcf||0)/li.netIncome:null;
    const avgAssets = ((ba[0]?.totalAssets||0)+(ba[1]?.totalAssets||0))/2;
    const accruals = avgAssets>0?((li.netIncome||0)-(fcfArr[0]?.fcf||0))/avgAssets:null;
    const dilSh = li.weightedAverageShsOutDil||li.weightedAverageShsOut;

    const growthCap = Math.min(revCAGR||0.05,0.15);
    const tg = 0.025, baseFCF = fcfArr[0]?.fcf||0;
    const proj = Array.from({length:5},(_,i)=>({year:(ia[0]?.calendarYear||2023)+i+1,fcf:baseFCF*Math.pow(1+growthCap,i+1),pv:baseFCF*Math.pow(1+growthCap,i+1)/Math.pow(1+wacc,i+1)}));
    const pvSum = proj.reduce((s,y)=>s+y.pv,0);
    const termFCF = proj[4].fcf*(1+tg);
    const termVal = wacc>tg?termFCF/(wacc-tg):null;
    const pvTV = termVal?termVal/Math.pow(1+wacc,5):null;
    const evDCF = pvTV?pvSum+pvTV:null;
    const eqVal = evDCF!=null?evDCF-netDebt:null;
    const intrinsic = eqVal&&dilSh>0?eqVal/dilSh:null;
    const tvPct = evDCF&&pvTV?pvTV/evDCF:null;

    const wRange = [wacc-0.02,wacc-0.01,wacc,wacc+0.01,wacc+0.02];
    const gRange = [0.01,0.015,0.02,0.025,0.03];
    const sensFn = (w,g)=>{
      if(w<=g||baseFCF<=0||!dilSh) return null;
      const pv5=proj.reduce((s,y,i)=>s+(baseFCF*Math.pow(1+growthCap,i+1))/Math.pow(1+w,i+1),0);
      const tv=(proj[4].fcf*(1+g))/(w-g);
      return (pv5+tv/Math.pow(1+w,5)-netDebt)/dilSh;
    };

    const evFMP = km.enterpriseValue||mktCap+netDebt;
    const ebitda = li.ebitda;
    const evEbLTM = rat.enterpriseValueMultiple||(ebitda>0?evFMP/ebitda:null);
    const evEbFwd = ae[0]?.estimatedEbitdaAvg?evFMP/ae[0].estimatedEbitdaAvg:null;

    const dso = lb.netReceivables&&li.revenue?(lb.netReceivables/li.revenue)*365:null;
    const dpo = lb.accountPayables&&li.costOfRevenue?(lb.accountPayables/li.costOfRevenue)*365:null;
    const dio = lb.inventory&&li.costOfRevenue?(lb.inventory/li.costOfRevenue)*365:null;
    const ccc = dso!=null&&dpo!=null&&dio!=null?dso+dio-dpo:null;

    const flags=[];
    if(tvPct>0.8) flags.push({t:"warn",m:`Terminal value is ${fmtP(tvPct)} of EV — heavily assumption-dependent`});
    if(fcfConv!=null&&fcfConv<0.7) flags.push({t:"warn",m:`FCF conversion ${fmtP(fcfConv)} < 70% — earnings quality concern`});
    if(fcfConv!=null&&fcfConv>=0.9) flags.push({t:"ok",m:`FCF conversion ${fmtP(fcfConv)} — strong earnings quality`});
    if(accruals!=null&&Math.abs(accruals)>0.05) flags.push({t:"warn",m:`Accruals ratio ${fmtP(accruals)} — elevated non-cash earnings`});
    if(roicSpread!=null&&roicSpread>0.02) flags.push({t:"ok",m:`ROIC (${fmtP(roic)}) exceeds WACC (${fmtP(wacc)}) by ${fmtP(roicSpread)} — value creating`});
    if(roicSpread!=null&&roicSpread<-0.02) flags.push({t:"bad",m:`ROIC (${fmtP(roic)}) below WACC (${fmtP(wacc)}) — destroying capital`});
    if(ebitda>0&&netDebt/ebitda>4) flags.push({t:"bad",m:`Net leverage ${fmtX(netDebt/ebitda)} > 4x EBITDA — elevated credit risk`});
    if(intrinsic&&q.price){const ud=(intrinsic-q.price)/q.price;if(ud>0.2)flags.push({t:"ok",m:`DCF implies ${fmtP(ud)} upside`});if(ud<-0.2)flags.push({t:"bad",m:`DCF implies ${fmtP(Math.abs(ud))} downside`});}

    const iBuys = ins.filter(x=>x.transactionType==="P-Purchase").length;
    const iSells = ins.filter(x=>x.transactionType==="S-Sale").length;

    D = {sym,p,q,rat,km,ae,ia:incArr,ca:fcfArr,proj,li,lb,lc,rfr,rfrSrc,erp,beta,ke,kdPre,kdPost,taxRate,we,wd,wacc,grossDebt,cashEq,netDebt,intExp,dilSh,growthCap,tg,baseFCF,pvSum,termVal,pvTV,evDCF,eqVal,intrinsic,tvPct,wRange,gRange,sensFn,evFMP,ebitda,evEbLTM,evEbFwd,revCAGR,fcfCAGR,roic,nopat,ic,roicSpread,fcfConv,accruals,dso,dpo,dio,ccc,flags,iBuys,iSells,ins,dcfRef,fetchedAt:new Date().toISOString()};

    renderResults();
  } catch(e) {
    const eb = document.getElementById("errBox");
    eb.textContent = "✗ " + e.message; eb.style.display = "block";
  }
  btn.disabled = false; btn.textContent = "ANALYZE";
}

function section(id, title, color, content, badge="") {
  const isOpen = openSections[id] !== false;
  return `<div class="section" style="border:1px solid ${color}33">
    <div class="sec-hdr" style="background:${color}15;color:${color}" onclick="toggleSection('${id}')">
      <span>${title.toUpperCase()}</span>
      <span style="display:flex;gap:8px;align-items:center">
        ${badge?`<span style="font-size:10px;background:${color}22;color:${color};border:1px solid ${color}55;border-radius:3px;padding:1px 5px;font-family:'Courier New',monospace">${badge}</span>`:""}
        <span style="color:#475569;font-size:12px" id="arr_${id}">${isOpen?"▲":"▼"}</span>
      </span>
    </div>
    <div id="sec_${id}" style="display:${isOpen?"block":"none"}" class="sec-body">${content}</div>
  </div>`;
}

function toggleSection(id) {
  const el = document.getElementById("sec_"+id);
  const arr = document.getElementById("arr_"+id);
  const open = el.style.display !== "none";
  el.style.display = open ? "none" : "block";
  arr.textContent = open ? "▼" : "▲";
  openSections[id] = !open;
}

function row(label, value, src="", sub=false, indent=0, flag="") {
  return `<div class="drow" style="padding-left:${indent*16}px">
    <span class="lbl${sub?" sub":""}">${label}${flag?`<span class="flg">⚠ ${flag}</span>`:""}</span>
    <span><span class="val">${value}</span>${src?`<span class="src">[${src}]</span>`:""}</span>
  </div>`;
}

function flagHtml(f) {
  const colors={warn:"#f59e0b",ok:"#4ade80",bad:"#f87171"}, icons={warn:"⚠",ok:"✓",bad:"✗"};
  return `<div class="flag" style="background:${colors[f.t]}15;border:1px solid ${colors[f.t]}44;color:${colors[f.t]}"><span>${icons[f.t]}</span><span>${f.m}</span></div>`;
}

function sensTable() {
  const d = D;
  let h = `<div style="overflow-x:auto"><table class="sens"><thead><tr><th style="background:#0f172a;color:#64748b">WACC→/g↓</th>`;
  d.wRange.forEach(w=>h+=`<th style="background:#0f172a;color:#38bdf8">${(w*100).toFixed(1)}%</th>`);
  h += `</tr></thead><tbody>`;
  d.gRange.forEach(g=>{
    h+=`<tr><td style="background:#0f172a;color:#38bdf8">${(g*100).toFixed(1)}%</td>`;
    d.wRange.forEach(w=>{
      const v=d.sensFn(w,g);
      const above = d.q.price && v > d.q.price;
      const bg = v==null?"#1e293b":v<0?"#f8717122":above?"#4ade8022":"#1e293b";
      const col = v<0?"#f87171":"#f8fafc";
      h+=`<td style="background:${bg};color:${col}">${v==null||isNaN(v)?"—":"$"+fmt(v,0)}</td>`;
    });
    h+=`</tr>`;
  });
  return h+`</tbody></table></div>`;
}

function tabOverview() {
  const d=D;
  let html = section("snap","Key Metrics Snapshot","#38bdf8",
    row("Revenue (LTM)",fmtB(d.li.revenue),`FMP /v3/income-statement · 10-K ${d.ia[0]?.year}`)+
    row("EBITDA (LTM)",fmtB(d.li.ebitda),`FMP /v3/income-statement · 10-K ${d.ia[0]?.year}`)+
    row("EBIT (Operating Income)",fmtB(d.li.operatingIncome),`FMP /v3/income-statement · 10-K ${d.ia[0]?.year}`)+
    row("Net Income (LTM)",fmtB(d.li.netIncome),`FMP /v3/income-statement · 10-K ${d.ia[0]?.year}`)+
    row("FCF (LTM)",fmtB(d.ca[0]?.fcf),`FMP /v3/cash-flow-statement · 10-K ${d.ca[0]?.year} [OCF − CapEx]`)+
    row("EBITDA Margin",fmtP(d.ia[0]?.ebm),"Calc: EBITDA ÷ Revenue")+
    row("Net Margin",fmtP(d.ia[0]?.nm),"Calc: Net Income ÷ Revenue")+
    row("Revenue CAGR (3Y)",fmtP(d.revCAGR),`FMP · 10-K ${d.ia[3]?.year}–${d.ia[0]?.year}`)+
    row("FCF CAGR (3Y)",fmtP(d.fcfCAGR),`FMP · 10-K ${d.ca[3]?.year}–${d.ca[0]?.year}`)
  );

  let tbl = `<div style="overflow-x:auto"><table><thead><tr>${["Year","Revenue","EBITDA","EBIT","Net Inc","EBITDA%","Net%"].map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>`;
  d.ia.forEach(y=>{ tbl+=`<tr><td style="color:#38bdf8">${y.year}</td><td>${fmtB(y.rev)}</td><td>${fmtB(y.ebitda)}</td><td>${fmtB(y.ebit)}</td><td>${fmtB(y.ni)}</td><td style="color:${y.ebm>0.2?"#4ade80":"#f8fafc"}">${fmtP(y.ebm)}</td><td>${fmtP(y.nm)}</td></tr>`; });
  tbl+=`</tbody></table><div class="src-note">Source: FMP /v3/income-statement · Annual 10-K filings</div></div>`;
  html += section("hist","Historical Income Trends","#a78bfa",tbl);

  let ae = d.ae.length===0?`<div style="color:#64748b;font-size:12px">No analyst estimates available</div>`:d.ae.slice(0,3).map(e=>`<div style="margin-bottom:8px"><div style="color:#fb923c;font-size:12px;margin-bottom:4px">FY${e.date?.slice(0,4)} Estimates <span style="font-size:10px;color:#64748b">[FMP /v3/analyst-estimates]</span></div>${row("Revenue (consensus)",fmtB(e.estimatedRevenueAvg),"",true,1)+row("EPS (consensus)",fmtD(e.estimatedEpsAvg),"",true,1)+row("EBITDA (consensus)",fmtB(e.estimatedEbitdaAvg),"",true,1)+row("Analyst count",fmt(e.numberAnalystEstimatedRevenue,0),"",true,1)}</div>`).join("");
  html += section("ae","Analyst Estimates","#fb923c",ae);
  return html;
}

function tabWACC() {
  const d=D;
  return section("wacc","WACC — Full Build","#f59e0b",
    `<div class="note">Formula: WACC = (E/V × Ke) + (D/V × Kd × (1 − T))</div>`+
    `<div class="sub-hdr" style="color:#f59e0b">COST OF EQUITY (CAPM)</div>`+
    row("Risk-Free Rate (10Y UST)",fmtP(d.rfr),d.rfrSrc)+
    row("Equity Risk Premium",fmtP(d.erp),"Damodaran Jan 2024 (damodaran.com)")+
    row("Beta (levered, 5Y monthly)",fmt(d.beta,2),"FMP /v3/profile")+
    row("Cost of Equity (Ke = Rf + β × ERP)",fmtP(d.ke),`Calc: ${fmtP(d.rfr)} + ${fmt(d.beta,2)} × ${fmtP(d.erp)}`)+
    `<div class="divider"></div><div class="sub-hdr" style="color:#f59e0b">COST OF DEBT</div>`+
    row("Gross Debt",fmtB(d.grossDebt),`FMP /v3/balance-sheet · 10-K ${d.ia[0]?.year} [LT + ST Debt]`)+
    row("Interest Expense (LTM)",fmtM(d.intExp),`FMP /v3/income-statement · 10-K ${d.ia[0]?.year}`)+
    row("Pre-tax Cost of Debt",fmtP(d.kdPre),"Calc: Interest Expense ÷ Gross Debt")+
    row("Effective Tax Rate",fmtP(d.taxRate),`FMP · 10-K ${d.ia[0]?.year} [Tax ÷ Pre-tax Income]`,false,0,d.taxRate<0.1?"Low — verify 10-K footnotes":"")+
    row("After-tax Cost of Debt (Kd)",fmtP(d.kdPost),`Calc: ${fmtP(d.kdPre)} × (1 − ${fmtP(d.taxRate)})`)+
    `<div class="divider"></div><div class="sub-hdr" style="color:#f59e0b">CAPITAL STRUCTURE WEIGHTS</div>`+
    row("Market Cap (E)",fmtB(d.p.mktCap),"FMP /v3/profile (live price × diluted shares)")+
    row("Gross Debt (D)",fmtB(d.grossDebt),`FMP /v3/balance-sheet · 10-K ${d.ia[0]?.year}`)+
    row("Total Capital (V = E + D)",fmtB(d.p.mktCap+d.grossDebt),"Calc: Market Cap + Gross Debt")+
    row("Equity Weight (E/V)",fmtP(d.we),"Calc: Market Cap ÷ Total Capital")+
    row("Debt Weight (D/V)",fmtP(d.wd),"Calc: Gross Debt ÷ Total Capital")+
    `<div class="divider"></div><div class="sub-hdr" style="color:#f59e0b">WACC RESULT</div>`+
    row("WACC",fmtP(d.wacc),`Calc: (${fmtP(d.we)} × ${fmtP(d.ke)}) + (${fmtP(d.wd)} × ${fmtP(d.kdPost)})`)
  ,fmtP(d.wacc));
}

function tabDCF() {
  const d=D;
  let fcfHist="";
  d.ca.forEach(y=>{ fcfHist+=row(`${y.year} OCF`,fmtB(y.ocf),y.src)+row(`${y.year} CapEx`,`(${fmtB(y.capex)})`,y.src,true,1)+row(`${y.year} FCF`,fmtB(y.fcf),"Calc: OCF − CapEx")+`<div class="divider"></div>`; });

  let projRows="";
  d.proj.forEach((y,i)=>{ projRows+=row(`Year ${i+1} (${y.year}) FCF`,fmtB(y.fcf),"",true,1,"")+`<span style="font-size:10px;color:#64748b;padding-left:16px;display:block;margin-bottom:2px">PV: ${fmtB(y.pv)}</span>`; });

  const dcfBody =
    row("Base FCF (LTM)",fmtB(d.baseFCF),`FMP /v3/cash-flow-statement · 10-K ${d.ca[0]?.year}`)+
    row("FCF Growth Rate (Stage 1, 5Y)",fmtP(d.growthCap),`Calc: min(Rev CAGR ${fmtP(d.revCAGR)}, 15% cap)`)+
    row("Terminal Growth Rate",fmtP(d.tg),"IMF long-run nominal GDP 2.5%")+
    row("Discount Rate (WACC)",fmtP(d.wacc),"See WACC tab")+
    `<div class="divider"></div><div class="sub-hdr" style="color:#4ade80">PROJECTED FREE CASH FLOWS</div>`+projRows+
    `<div class="divider"></div>`+
    row("PV of Explicit FCFs (5Y)",fmtB(d.pvSum),"Calc: Σ FCF_t ÷ (1+WACC)^t")+
    row("Terminal FCF (Year 6)",fmtB(d.proj[4]?.fcf*(1+d.tg)),`Calc: FCF_5 × (1 + ${fmtP(d.tg)})`)+
    row("Terminal Value (Gordon Growth)",fmtB(d.termVal),`Calc: Terminal FCF ÷ (WACC ${fmtP(d.wacc)} − g ${fmtP(d.tg)})`)+
    row("PV of Terminal Value",fmtB(d.pvTV),"Calc: TV ÷ (1+WACC)^5",false,0,d.tvPct>0.8?"> 80% of EV":"")+
    row("Terminal Value as % of EV",fmtP(d.tvPct),"Sanity check — >80% = high risk")+
    `<div class="divider"></div>`+
    row("Enterprise Value (DCF)",fmtB(d.evDCF),"Calc: PV FCFs + PV Terminal")+
    row("Net Debt",fmtB(d.netDebt),`FMP /v3/balance-sheet · 10-K ${d.ia[0]?.year} [Gross Debt − Cash − ST Inv]`)+
    row("Equity Value",fmtB(d.eqVal),"Calc: EV − Net Debt")+
    row("Diluted Shares",fmt(d.dilSh/1e6,0)+"M",`FMP /v3/income-statement · 10-K ${d.ia[0]?.year}`)+
    row("Intrinsic Value Per Share",fmtD(d.intrinsic),"Calc: Equity Value ÷ Diluted Shares")+
    row("Current Price",fmtD(d.q.price),"FMP /v3/quote (live)")+
    row("Upside / (Downside)",d.intrinsic&&d.q.price?fmtP((d.intrinsic-d.q.price)/d.q.price):"—","Calc: (Intrinsic − Price) ÷ Price")+
    `<div style="color:#38bdf8;font-size:12px;font-weight:700;margin:10px 0 6px">FMP REFERENCE DCF</div>`+
    row("FMP DCF Estimate",fmtD(d.dcfRef.dcf),"FMP /v3/discounted-cash-flow (cross-check)");

  const sensBody = `<div class="note">WACC (columns) × Terminal Growth (rows). Green = above current price.</div>${sensTable()}<div class="src-note">Base case: WACC ${fmtP(d.wacc)}, g ${fmtP(d.tg)}</div>`;

  return section("fcfhist","FCF History","#4ade80",fcfHist)+
    section("dcfmain","DCF — 5Y Explicit + Terminal","#4ade80",dcfBody,fmtD(d.intrinsic))+
    section("sens","Sensitivity: Price Per Share","#4ade80",sensBody);
}

function tabBalance() {
  const d=D;
  const lev =
    row("Cash & Equivalents",fmtB(d.lb.cashAndCashEquivalents),`FMP /v3/balance-sheet · 10-K ${d.ia[0]?.year}`)+
    row("Short-Term Investments",fmtB(d.lb.shortTermInvestments),`FMP /v3/balance-sheet · 10-K ${d.ia[0]?.year}`)+
    row("Total Liquid Assets",fmtB(d.cashEq),"Calc: Cash + ST Investments")+
    row("Short-Term Debt",fmtB(d.lb.shortTermDebt),`FMP /v3/balance-sheet · 10-K ${d.ia[0]?.year}`)+
    row("Long-Term Debt",fmtB(d.lb.longTermDebt),`FMP /v3/balance-sheet · 10-K ${d.ia[0]?.year}`)+
    row("Gross Debt",fmtB(d.grossDebt),"Calc: ST Debt + LT Debt")+
    row("Net Debt",fmtB(d.netDebt),"Calc: Gross Debt − Liquid Assets",false,0,d.netDebt<0?"Net cash position":"")+
    row("Net Debt / EBITDA",d.ebitda>0?fmtX(d.netDebt/d.ebitda):"—","Calc: Net Debt ÷ EBITDA",false,0,d.ebitda>0&&d.netDebt/d.ebitda>4?"Elevated leverage":"")+
    row("Total Equity (Book)",fmtB(d.lb.totalEquity),`FMP /v3/balance-sheet · 10-K ${d.ia[0]?.year}`)+
    row("Diluted Shares",fmt(d.dilSh/1e6,0)+"M",`FMP /v3/income-statement · 10-K ${d.ia[0]?.year}`);

  const wc =
    `<div class="note">Source: FMP /v3/balance-sheet + income-statement · 10-K ${d.ia[0]?.year}</div>`+
    row("Days Sales Outstanding (DSO)",d.dso!=null?`${fmt(d.dso,0)} days`:"—","Calc: (Receivables ÷ Revenue) × 365")+
    row("Days Payable Outstanding (DPO)",d.dpo!=null?`${fmt(d.dpo,0)} days`:"—","Calc: (Payables ÷ COGS) × 365")+
    row("Days Inventory Outstanding (DIO)",d.dio!=null?`${fmt(d.dio,0)} days`:"—","Calc: (Inventory ÷ COGS) × 365")+
    row("Cash Conversion Cycle (CCC)",d.ccc!=null?`${fmt(d.ccc,0)} days`:"—","Calc: DSO + DIO − DPO");

  const insHtml = `<div class="note">Source: FMP /v4/insider-trading (SEC Form 4 filings)</div>`+
    row("Recent Insider Buys",fmt(d.iBuys,0),"FMP /v4/insider-trading (P-Purchase)")+
    row("Recent Insider Sales",fmt(d.iSells,0),"FMP /v4/insider-trading (S-Sale)")+
    d.ins.slice(0,5).map(t=>row(`${t.reportingName||"Unknown"} – ${t.transactionType}`,`${fmt(t.securitiesTransacted,0)} @ ${fmtD(t.price)}`,"Form 4 filed "+t.transactionDate,true,1)).join("");

  return section("lev","Capital Structure & Leverage","#fb923c",lev)+
    section("wc","Working Capital Efficiency","#fb923c",wc)+
    section("ins","Insider Transactions (Form 4)","#fb923c",insHtml);
}

function tabQuality() {
  const d=D;
  const roicBody =
    `<div class="note">ROIC &gt; WACC = value creation. ROIC &lt; WACC = capital destruction.</div>`+
    row("EBIT (Operating Income)",fmtB(d.li.operatingIncome),`FMP /v3/income-statement · 10-K ${d.ia[0]?.year}`)+
    row("Effective Tax Rate",fmtP(d.taxRate),`FMP · 10-K [Tax ÷ Pre-tax Income]`)+
    row("NOPAT (= EBIT × (1 − T))",fmtB(d.nopat),"Calc: EBIT × (1 − Tax Rate)")+
    row("Total Equity (Book)",fmtB(d.lb.totalEquity),`FMP /v3/balance-sheet · 10-K ${d.ia[0]?.year}`)+
    row("Gross Debt",fmtB(d.grossDebt),`FMP /v3/balance-sheet · 10-K ${d.ia[0]?.year}`)+
    row("Excess Cash Deducted",`(${fmtB(d.cashEq)})`,"Calc: Cash + ST Investments")+
    row("Invested Capital",fmtB(d.ic),"Calc: Equity + Gross Debt − Excess Cash")+
    row("ROIC",fmtP(d.roic),"Calc: NOPAT ÷ Invested Capital")+
    row("WACC",fmtP(d.wacc),"See WACC tab")+
    row("ROIC − WACC Spread",fmtP(d.roicSpread),"Value creation indicator");

  const eqBody =
    row("Net Income (LTM)",fmtB(d.li.netIncome),`FMP /v3/income-statement · 10-K ${d.ia[0]?.year}`)+
    row("FCF (LTM)",fmtB(d.ca[0]?.fcf),"FMP /v3/cash-flow-statement [OCF − CapEx]")+
    row("FCF Conversion (FCF ÷ Net Income)",fmtP(d.fcfConv),"Calc: FCF ÷ Net Income — target >80%",false,0,d.fcfConv<0.7?"Below 70%":"")+
    row("Accruals Ratio",fmtP(d.accruals),"Calc: (Net Income − FCF) ÷ Avg Assets — target ~0",false,0,Math.abs(d.accruals)>0.05?">5% elevated":"")+
    row("OCF / Revenue",fmtP((d.lc.operatingCashFlow||0)/(d.li.revenue||1)),"Calc: OCF ÷ Revenue")+
    row("CapEx / Revenue",fmtP((d.ca[0]?.capex||0)/(d.li.revenue||1)),"Calc: CapEx ÷ Revenue");

  const capBody =
    row("Dividends Paid",fmtB(Math.abs(d.lc.dividendsPaid||0)),`FMP /v3/cash-flow-statement · 10-K ${d.ca[0]?.year}`)+
    row("Buybacks",fmtB(Math.abs(d.lc.commonStockRepurchased||0)),`FMP /v3/cash-flow-statement · 10-K ${d.ca[0]?.year}`)+
    row("Total Capital Returned",fmtB(Math.abs(d.lc.dividendsPaid||0)+Math.abs(d.lc.commonStockRepurchased||0)),"Calc: Dividends + Buybacks")+
    row("FCF Yield",fmtP(d.km.freeCashFlowYield),"FMP /v3/key-metrics")+
    row("Dividend Yield",fmtP(d.p.lastDiv&&d.q.price?d.p.lastDiv/d.q.price:null),"FMP /v3/profile (ann. div ÷ price)");

  const badge = d.roicSpread!=null?(d.roicSpread>0?`+${fmtP(d.roicSpread)} spread`:fmtP(d.roicSpread)):"—";
  return section("roic","ROIC vs WACC — Value Creation Test","#a78bfa",roicBody,badge)+
    section("eq","Earnings Quality","#a78bfa",eqBody)+
    section("cap","Capital Allocation","#a78bfa",capBody);
}

function tabComps() {
  const d=D;
  return section("comps","Multiples & Relative Valuation","#f472b6",
    `<div class="note">All multiples sourced from FMP with formula shown.</div>`+
    row("P/E (LTM)",fmtX(d.rat.priceEarningsRatio),"FMP /v3/ratios (Price ÷ EPS LTM)")+
    row("P/E (NTM, consensus)",d.ae[0]?.estimatedEpsAvg&&d.q.price?fmtX(d.q.price/d.ae[0].estimatedEpsAvg):"—","Calc: Price ÷ FMP consensus NTM EPS")+
    row("P/B",fmtX(d.rat.priceToBookRatio),"FMP /v3/ratios (Price ÷ Book/Share)")+
    row("P/FCF",fmtX(d.rat.priceToFreeCashFlowsRatio),"FMP /v3/ratios")+
    row("EV (FMP)",fmtB(d.evFMP),"FMP /v3/key-metrics")+
    row("EV/EBITDA (LTM)",fmtX(d.evEbLTM),"FMP /v3/ratios [enterpriseValueMultiple]")+
    row("EV/EBITDA (NTM, consensus)",fmtX(d.evEbFwd),"Calc: EV ÷ FMP consensus NTM EBITDA")+
    row("EV/EBIT (LTM)",d.li.operatingIncome>0?fmtX(d.evFMP/d.li.operatingIncome):"—","Calc: EV ÷ EBIT")+
    row("EV/Revenue (LTM)",fmtX(d.rat.evToSales),"FMP /v3/ratios")+
    row("EV/FCF (LTM)",d.ca[0]?.fcf>0?fmtX(d.evFMP/d.ca[0].fcf):"—","Calc: EV ÷ LTM FCF")+
    row("Debt/Equity (Book)",fmtX(d.rat.debtEquityRatio),"FMP /v3/ratios")+
    row("Interest Coverage",d.intExp>0?fmtX(d.li.operatingIncome/d.intExp):"No debt","Calc: EBIT ÷ Interest Expense")
  );
}

function tabAI() {
  return `<div style="border:1px solid #38bdf833;border-radius:8px;overflow:hidden">
    <div class="sec-hdr" style="background:#38bdf815;color:#38bdf8">AI ANALYST OPINION</div>
    <div class="sec-body">
      <div class="note" style="margin-bottom:12px">Claude Sonnet 4 opinion based strictly on sourced data above. No hallucinated figures.</div>
      <button class="btn" onclick="runAI()" id="btnAI">RUN AI ANALYST</button>
      <div id="aiBox"></div>
    </div>
  </div>`;
}

async function runAI() {
  if (!D) return;
  const btn = document.getElementById("btnAI");
  btn.disabled=true; btn.textContent="ANALYZING…";
  const summary = {ticker:D.sym,price:D.q.price,intrinsicPerShare:D.intrinsic,wacc:D.wacc,roic:D.roic,fcfConversion:D.fcfConv,revCAGR:D.revCAGR,netLeverage:D.ebitda>0?D.netDebt/D.ebitda:null,flags:D.flags.map(f=>f.m),evEbitdaLTM:D.evEbLTM,sector:D.p.sector,description:D.p.description?.slice(0,300)};
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`You are a senior buy-side analyst. Based on these sourced financial metrics, write a concise investment opinion (4–5 paragraphs). Be direct about risks and opportunities. Do not make up numbers. Stick strictly to the data:\n\n${JSON.stringify(summary,null,2)}`}]})});
    const data = await res.json();
    const text = data.content?.map(b=>b.text||"").join("\n")||"No response.";
    document.getElementById("aiBox").innerHTML=`<div class="ai-box">${text}</div>`;
  } catch(e) { document.getElementById("aiBox").innerHTML=`<div class="ai-box" style="color:#f87171">Failed: ${e.message}</div>`; }
  btn.disabled=false; btn.textContent="RUN AI ANALYST";
}

const TABS = ["overview","wacc","dcf","balance","quality","comps","ai"];
let activeTab = "overview";

function setTab(t) {
  activeTab = t;
  document.querySelectorAll(".tab").forEach(el=>el.classList.toggle("active",el.dataset.tab===t));
  const fns = {overview:tabOverview,wacc:tabWACC,dcf:tabDCF,balance:tabBalance,quality:tabQuality,comps:tabComps,ai:tabAI};
  document.getElementById("tabContent").innerHTML = fns[t]();
}

function renderResults() {
  const d=D;
  const changeColor = d.q.change>=0?"#4ade80":"#f87171";
  document.getElementById("companyBar").innerHTML=`
    <div>
      <div class="name">${d.sym} <span style="color:#64748b;font-size:12px">${d.p.exchangeShortName||""}</span></div>
      <div class="sub">${d.p.companyName}</div>
      <div class="sub2">${d.p.sector||""} · ${d.p.industry||""}</div>
    </div>
    <div>
      <div class="price">${fmtD(d.q.price)}</div>
      <div style="font-size:11px;color:${changeColor}">${d.q.change>=0?"+":""}${fmtD(d.q.change)} (${fmtP((d.q.changesPercentage||0)/100)})</div>
      <div style="font-size:11px;color:#475569">52W: ${fmtD(d.q.yearLow)} – ${fmtD(d.q.yearHigh)}</div>
    </div>
    <div style="text-align:right">
      <div class="meta" style="color:#94a3b8">Mkt Cap: <span style="color:#f8fafc">${fmtB(d.p.mktCap)}</span></div>
      <div class="meta" style="color:#94a3b8">DCF Target: <span style="color:${d.intrinsic>d.q.price?"#4ade80":"#f87171"};font-weight:700">${fmtD(d.intrinsic)}</span></div>
      <div style="font-size:11px;color:#475569">As of ${new Date(d.fetchedAt).toLocaleString()}</div>
    </div>`;

  document.getElementById("flagsBox").innerHTML = d.flags.map(f=>flagHtml(f)).join("");
  document.getElementById("tabBar").innerHTML = TABS.map(t=>`<button class="tab${t===activeTab?" active":""}" data-tab="${t}" onclick="setTab('${t}')">${t.toUpperCase()}</button>`).join("");
  document.getElementById("results").style.display="block";
  setTab(activeTab);
}
</script>
</body>
</html>
